et.gap;\n         zone.classList.remove('filled', 'correct', 'wrong');\n         updateUsedItems();\n      }\n    }\n\n    function fillZone(zone, val) {\n       zone.innerText = val;\n       zone.classList.add('filled');\n       zone.classList.remove('correct', 'wrong');\n       updateUsedItems();\n    }\n    \n    function updateUsedItems() {\n       const used = [];\n       document.querySelectorAll('.drop-zone.filled').forEach(z => used.push(z.innerText));\n       document.querySelectorAll('.drag-item').forEach(item => {\n           if(used.includes(item.dataset.val)) item.classList.add('used');\n           else item.classList.remove('used');\n       });\n    }\n\n    function checkAll() {\n       document.querySelectorAll('.qitem').forEach((box, idx) => {\n          const q = questions[idx];\n          const res = box.querySelector('.res');\n          \n          if (q.type === 'mcq') {\n             const correctArr = q.ans.split(',').map(n=>parseInt(n)).sort();\n             const selected = Array.from(box.querySelectorAll('input:checked')).map(i=>parseInt(i.value)).sort();\n             const isOk = JSON.stringify(correctArr) === JSON.stringify(selected);\n             res.innerHTML = isOk ? '<p class=\"correct-msg\">Correct!</p>' : '<p class=\"wrong-msg\">Wrong. Answer: ' + q.ans + '</p>';\n          } else {\n             // Gap Fill Check\n             let score = 0;\n             let total = 0;\n             const zones = box.querySelectorAll('.drop-zone');\n             zones.forEach(z => {\n                total++;\n                const gapNum = z.dataset.gap;\n                const userAns = z.innerText.trim();\n                const correctAns = q.ans[gapNum];\n                if (userAns === correctAns) {\n                   z.classList.add('correct');\n                   score++;\n                } else {\n                   z.classList.add('wrong');\n                }\n             });\n             res.innerHTML = `<p class=\"${score===total?'correct-msg':'wrong-msg'}\">Score: ${score}/${total}</p>`;\n          }\n       });\n    }\n    \n    document.querySelectorAll('.pair').forEach(p => {\n      const e = p.querySelector('.en'), v = p.querySelector('.vn');\n      const toggle = () => {\n        document.querySelectorAll('.en, .vn').forEach(el=>el.classList.remove('active'));\n        e.classList.add('active'); v.classList.add('active');\n      };\n      e.onmouseenter = v.onmouseenter = toggle;\n      e.onclick = v.onclick = toggle;\n    });\n  <\/script>\n  <script type=\"text/javascript\">var lbplugin_event_opt={\"extension_enable\":true,\"dict_type\":1,\"dbclk_event\":{\"trigger\":\"none\",\"enable\":true,\"display\":1},\"select_event\":{\"trigger\":\"none\",\"enable\":true,\"display\":1}};function loadScript(t,e){var n=document.createElement(\"script\");n.type=\"text/javascript\",n.readyState?n.onreadystatechange=function(){(\"loaded\"===n.readyState||\"complete\"===n.readyState)&&(n.onreadystatechange=null,e())}:n.onload=function(){e()},n.src=t,document.getElementsByTagName(\"head\")[0].appendChild(n)}setTimeout(function(){null==document.getElementById(\"lbdictex_find_popup\")&&loadScript(\"https://stc-laban.zdn.vn/dictionary/js/plugin/lbdictplugin.min.js?\"+Date.now()%1e4,function(){lbDictPlugin.init(lbplugin_event_opt)})},1e3);<\/script>\n  </body></html>"},{"name":"Why we need to protect polar bears (Vocab).html","filename":"Why we need to protect polar bears (Vocab).html","content":"<!doctype html>\r\n<html lang=\"vi\">\r\n<head>\r\n<meta charset=\"utf-8\" />\r\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\" />\r\n<title>Vocabulary Matching Game — ENGLISH COACH - 0868911846</title>\r\n<style>\r\n  :root{\r\n    --bg:#0f1724;\r\n    --card:#0b1220;\r\n    --accent:#06b6d4;\r\n    --success:#10b981;\r\n    --muted:#94a3b8;\r\n    --neon-primary: rgba(6,182,212,0.95);\r\n    --neon-secondary: rgba(96,165,250,0.9);\r\n    --neon-warm: rgba(249,115,22,0.9);\r\n    --input-muted-bg: rgba(255,255,255,0.02);\r\n    --input-muted-border: rgba(255,255,255,0.04);\r\n    --input-muted-text: rgba(230,238,246,0.85);\r\n  }\r\n\r\n  /* page */\r\n  body{\r\n    margin:0; font-family:Inter,system-ui,Arial; background:linear-gradient(180deg,#071024 0%, #0b1220 100%); color:#e6eef6;\r\n    display:flex; align-items:flex-start; justify-content:center; min-height:100vh; padding:24px;\r\n  }\r\n  .container{width:100%; max-width:1200px;}\r\n  header{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}\r\n  h1{font-size:20px; margin:0; color:var(--accent);}\r\n  .controls{display:flex; gap:8px; align-items:center;}\r\n  button{background:linear-gradient(90deg,#0ea5a4,#06b6d4); border:0; color:#042027; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:600;}\r\n  .layout{display:flex; gap:18px; align-items:flex-start; overflow-x:auto; padding-bottom:6px;}\r\n  .card{flex: 0 0 48%; min-width:320px; box-sizing:border-box; max-height: calc(100vh - 180px); overflow:auto; -webkit-overflow-scrolling: touch; padding:12px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid rgba(255,255,255,0.03);}\r\n  .list{display:flex; flex-direction:column; gap:10px;}\r\n  .eng-item, .vie-item{display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:10px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.03);}\r\n  .eng-left{display:flex; align-items:center; gap:12px; flex: 0 0 220px; min-width:160px;}\r\n  .index{width:36px; height:36px; border-radius:8px; background:rgba(255,255,255,0.03); display:flex; align-items:center; justify-content:center; color:var(--muted); font-weight:700;}\r\n\r\n  /* slot base */\r\n  .slot{\r\n    flex:1; display:flex; align-items:center; justify-content:flex-start; gap:10px; padding:12px 16px; border-radius:12px;\r\n    background:rgba(255,255,255,0.01); border:2px dashed rgba(255,255,255,0.03); min-height:56px; transition:all 220ms ease; cursor:pointer;\r\n    position:relative; overflow:visible;\r\n  }\r\n  .slot .inner{position:relative; z-index:3;}\r\n  .slot.correct{padding-left:12px; font-size:15px; display:flex; align-items:center; border-style:solid; border-width:2px; background:linear-gradient(180deg, rgba(16,185,129,0.03), rgba(16,185,129,0.01));}\r\n\r\n  /* neon border: pseudo-element + blur glow */\r\n  .slot::before{\r\n    content:\"\"; position:absolute; inset:-4px; border-radius:16px; z-index:1;\r\n    background: linear-gradient(90deg, var(--neon-primary), var(--neon-secondary), var(--neon-warm));\r\n    filter: blur(8px); opacity:0; transform:scale(0.98);\r\n    transition:opacity 220ms ease, transform 220ms ease;\r\n    pointer-events:none;\r\n    mix-blend-mode:screen;\r\n  }\r\n  /* inner crisp border line (animated gradient) */\r\n  .slot::after{\r\n    content:\"\"; position:absolute; inset:-2px; border-radius:14px; z-index:2;\r\n    background: linear-gradient(90deg, var(--neon-primary), var(--neon-secondary), var(--neon-warm));\r\n    background-size:200% 100%;\r\n    opacity:0; transform:translateZ(0);\r\n    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);\r\n    -webkit-mask-composite: xor; mask-composite: exclude;\r\n    padding:2px;\r\n    transition:opacity 220ms ease;\r\n    pointer-events:none;\r\n  }\r\n\r\n  /* show neon when hover/dragover/focus/active */\r\n  .slot:hover::before, .slot:focus::before, .slot.active::before, .slot.highlight::before{\r\n    opacity:0.55; transform:scale(1); animation: neonPulse 2.6s linear infinite;\r\n  }\r\n  .slot:hover::after, .slot:focus::after, .slot.active::after, .slot.highlight::after{\r\n    opacity:1; animation: neonMove 2.2s linear infinite;\r\n  }\r\n\r\n  @keyframes neonMove{\r\n    0%{background-position:0% 50%}\r\n    100%{background-position:200% 50%}\r\n  }\r\n  @keyframes neonPulse{\r\n    0%{filter:blur(6px); opacity:0.45}\r\n    50%{filter:blur(12px); opacity:0.7}\r\n    100%{filter:blur(6px); opacity:0.45}\r\n  }\r\n\r\n  /* when correct: soft green neon */\r\n  .slot.correct::before{ background: linear-gradient(90deg, rgba(16,185,129,0.9), rgba(96,165,250,0.06)); opacity:0.6; filter:blur(10px); }\r\n  .slot.correct::after{ background: linear-gradient(90deg, rgba(16,185,129,0.95), rgba(6,182,212,0.06)); opacity:1; }\r\n\r\n  /* vie items */\r\n  .vie-list{display:flex; flex-wrap:wrap; gap:10px; padding-top:6px;}\r\n  .vie-item{cursor:grab; user-select:none; padding:8px 12px; border-radius:10px; background:linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border:1px solid rgba(255,255,255,0.03);}\r\n  .vie-item.dragging{opacity:0.5; transform:scale(0.98);}\r\n\r\n  .wrong{animation:shake 300ms; border-color:rgba(239,68,68,0.6);}\r\n  @keyframes shake{0%{transform:translateX(0)} 25%{transform:translateX(-6px)} 50%{transform:translateX(6px)} 75%{transform:translateX(-4px)} 100%{transform:translateX(0)}}\r\n\r\n  .badge{display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; background:rgba(255,255,255,0.02); color:var(--muted); font-weight:600;}\r\n  .confetti{position:fixed; left:0; top:0; width:100%; height:100%; pointer-events:none; overflow:hidden;}\r\n  .confetti .piece{position:absolute; width:10px; height:14px; opacity:0; transform:translateY(-20px) rotate(0deg); animation:fall 1200ms linear forwards;}\r\n  @keyframes fall{0%{opacity:1; transform:translateY(-10vh) rotate(0deg)} 100%{opacity:1; transform:translateY(110vh) rotate(720deg)}}\r\n\r\n  .footer{margin-top:14px; display:flex; justify-content:space-between; align-items:center; color:var(--muted); font-size:14px;}\r\n  .small{font-size:13px; color:var(--muted);}\r\n\r\n  /* FLASHCARD 3D FLIP (giữ nguyên) */\r\n  .flash-wrap{perspective:1200px; width:100%; max-width:520px;}\r\n  .flashcard{width:100%; height:140px; position:relative; transform-style:preserve-3d; transition:transform 600ms cubic-bezier(.2,.9,.3,1); border-radius:12px; cursor:pointer;}\r\n  .flashcard.flipped{transform:rotateY(180deg);}\r\n  .flash-face{position:absolute; inset:0; backface-visibility:hidden; border-radius:12px; display:flex; align-items:center; justify-content:center; padding:18px; font-size:18px; text-align:center; box-shadow: 0 6px 18px rgba(2,6,23,0.6); border:1px solid rgba(255,255,255,0.03);}\r\n  .flash-face.front{background:linear-gradient(180deg, rgba(6,182,212,0.08), rgba(96,165,250,0.03)); color:#e6f9fb;}\r\n  .flash-face.back{transform:rotateY(180deg); background:linear-gradient(180deg, rgba(16,185,129,0.06), rgba(96,165,250,0.02)); color:#eafff0;}\r\n\r\n  /* FILL-IN: muted inputs */\r\n  .fill-list{display:flex; flex-direction:column; gap:10px;}\r\n  .fill-row{display:flex; gap:12px; align-items:center;}\r\n  .fill-row .vie{flex:0 0 48%; min-width:160px; color:var(--muted);}\r\n  .fill-row input{\r\n    flex:1; padding:10px 12px; border-radius:10px; border:1px solid var(--input-muted-border);\r\n    background: var(--input-muted-bg); color:var(--input-muted-text); transition:box-shadow 180ms, border-color 180ms, background-color 180ms;\r\n    caret-color: var(--neon-primary);\r\n  }\r\n  /* subtle glow on focus but muted */\r\n  .fill-row input:focus{\r\n    outline:none;\r\n    border-color: rgba(6,182,212,0.45);\r\n    box-shadow: 0 6px 18px rgba(6,182,212,0.06);\r\n    background: rgba(255,255,255,0.025);\r\n  }\r\n  /* when correct: soft green tint */\r\n  .fill-row input.correct{\r\n    border-color: rgba(16,185,129,0.7);\r\n    box-shadow: 0 6px 18px rgba(16,185,129,0.04);\r\n    background: rgba(16,185,129,0.02);\r\n  }\r\n  /* when wrong: subtle red tint */\r\n  .fill-row input.wrong{\r\n    border-color: rgba(244,63,94,0.7);\r\n    box-shadow: 0 6px 18px rgba(244,63,94,0.03);\r\n    background: rgba(244,63,94,0.01);\r\n  }\r\n\r\n  /* responsive */\r\n  @media (max-width:880px){ .layout{grid-template-columns:1fr;} .slot{min-width:160px;} .card{flex-basis:100%;} .flash-wrap{max-width:100%} }\r\n</style>\r\n</head>\r\n<body>\r\n<div class=\"container\">\r\n  <header>\r\n    <h1>Vocabulary Matching Game</h1>\r\n    <div class=\"controls\">\r\n      <div class=\"badge\" id=\"score\">Đúng: 0 / 0</div>\r\n      <button id=\"shuffleBtn\">Trộn</button>\r\n      <button id=\"resetBtn\">Làm lại</button>\r\n    </div>\r\n  </header>\r\n\r\n  <!-- Flashcards -->\r\n  <section class=\"card\" style=\"margin-bottom:12px;\">\r\n    <h3 style=\"margin-top:0; color:var(--accent)\">Flashcards Ôn Tập</h3>\r\n    <div style=\"display:flex; gap:12px; align-items:center; flex-wrap:wrap;\">\r\n      <div class=\"flash-wrap\">\r\n        <div id=\"flashcard\" class=\"flashcard\" tabindex=\"0\" role=\"button\" aria-pressed=\"false\">\r\n          <div class=\"flash-face front\" id=\"flashFront\">Nhấn Next để bắt đầu</div>\r\n          <div class=\"flash-face back\" id=\"flashBack\">Back</div>\r\n        </div>\r\n      </div>\r\n      <div style=\"display:flex; flex-direction:column; gap:8px;\">\r\n        <div style=\"display:flex; gap:8px;\">\r\n          <button id=\"prevCard\">Prev</button>\r\n          <button id=\"flipCard\">Flip</button>\r\n          <button id=\"nextCard\">Next</button>\r\n        </div>\r\n        <div style=\"display:flex; gap:8px;\">\r\n          <button id=\"autoPlay\">Auto</button>\r\n          <button id=\"showBoth\">Show Both</button>\r\n        </div>\r\n      </div>\r\n    </div>\r\n    <div class=\"small\" style=\"margin-top:8px\">Nhấn flashcard để lật. Auto sẽ tự chuyển sau 2s. Show Both hiển thị cả 2 mặt tạm thời.</div>\r\n  </section>\r\n\r\n  <section class=\"layout\">\r\n    <!-- Matching game -->\r\n    <div class=\"card\">\r\n      <h3 style=\"margin-top:0; color:var(--accent)\">Phần 1 Matching</h3>\r\n      <div class=\"small\">Kéo nghĩa vào ô tương ứng. Hoặc chạm để chọn rồi chạm vào ô.</div>\r\n      <div class=\"list\" id=\"engList\" style=\"margin-top:12px;\"></div>\r\n    </div>\r\n\r\n    <!-- Vietnamese draggable -->\r\n    <div class=\"card\">\r\n      <h3 style=\"margin-top:0; color:var(--accent)\">Phần 2 Vietnamese</h3>\r\n      <div class=\"vie-list\" id=\"vieList\" style=\"margin-top:12px;\"></div>\r\n    </div>\r\n  </section>\r\n\r\n  <!-- Fill-in-the-blank -->\r\n  <section class=\"card\" style=\"margin-top:12px;\">\r\n    <h3 style=\"margin-top:0; color:var(--accent)\">Bài Điền Chữ</h3>\r\n    <div class=\"small\">Bên trái là tiếng Việt, bên phải học sinh điền tiếng Anh. Nhấn Kiểm tra để chấm.</div>\r\n    <div style=\"margin-top:10px;\">\r\n      <div class=\"fill-list\" id=\"fillList\"></div>\r\n      <div style=\"margin-top:10px; display:flex; gap:8px; align-items:center;\">\r\n        <button id=\"checkFill\">Kiểm tra</button>\r\n        <button id=\"showAnswers\">Hiện đáp án</button>\r\n        <button id=\"resetFill\">Làm lại</button>\r\n        <div class=\"small\" id=\"fillScore\" style=\"align-self:center\">Điểm: 0 / 0</div>\r\n      </div>\r\n    </div>\r\n  </section>\r\n\r\n  <div class=\"footer\">\r\n    <div class=\"small\">Gợi ý: sửa mảng <strong>pairs</strong> trong mã để thay từ.</div>\r\n    <div class=\"small\">Khi ghép đúng sẽ có hiệu ứng và từ sẽ được đọc to.</div>\r\n  </div>\r\n</div>\r\n\r\n<div class=\"confetti\" id=\"confetti\"></div>\r\n\r\n<script>\r\nconst pairs = [\n  {eng: \"threatened\", vie: \"bị đe dọa (at risk)\"},\n  {eng: \"far-reaching consequence\", vie: \"hậu quả sâu rộng (wide-ranging effects)\"},\n  {eng: \"adapt\", vie: \"đã thích nghi (adjusted, modified)\"},\n  {eng: \"underneath\", vie: \"bên dưới (beneath, below)\"},\n  {eng: \"comparative\", vie: \"mang tính so sánh (relative, comparative)\"},\n  {eng: \"suffer\", vie: \"chịu đựng (experience harm)\"},\n  {eng: \"sheds light on\", vie: \"làm sáng tỏ (clarifies, explains)\"},\n  {eng: \"survive\", vie: \"sống sót (remain alive)\"},\n  {eng: \"mutation\", vie: \"đột biến (genetic changes)\"},\n  {eng: \"reduced density\", vie: \"mật độ giảm (lower concentration)\"},\n  {eng: \"insufficient\", vie: \"không đủ (inadequate, lacking)\"},\n  {eng: \"starvation\", vie: \"chết đói (extreme hunger)\"},\n  {eng: \"remodel\", vie: \"được cải tạo (restructured, redesigned)\"},\n  {eng: \"nutrient availability\", vie: \"khả năng cung cấp dinh dưỡng (food resource levels)\"},\n  {eng: \"fasting\", vie: \"nhịn ăn (abstaining from food)\"},\n  {eng: \"reserve\", vie: \"nguồn dự trữ (stores, supplies)\"},\n  {eng: \"paradox\", vie: \"nghịch lý (contradiction, puzzle)\"},\n  {eng: \"reformation\", vie: \"sự cải tổ (restructuring, reform)\"},\n  {eng: \"conservation\", vie: \"bảo tồn (protection, preservation)\"},\n  {eng: \"primates\", vie: \"động vật linh trưởng (monkeys, apes)\"},\n  {eng: \"anecdotal\", vie: \"dựa trên giai thoại (informal, unverified)\"},\n  {eng: \"manipulate\", vie: \"thao túng, điều khiển (control, influence)\"},\n  {eng: \"deliberate\", vie: \"có chủ ý (intentional, planned)\"},\n  {eng: \"capable\", vie: \"có khả năng (able, competent)\"},\n  {eng: \"missed out on\", vie: \"bỏ lỡ (failed to get or experience)\"},\n  {eng: \"breakthrough\", vie: \"bước đột phá (major advances)\"},\n  {eng: \"majestic\", vie: \"hùng vĩ, tráng lệ (grand, impressive)\"}\n];\n\r\n\r\n\r\n\r\n\r\n\r\n/* ====== trạng thái ====== */\r\nlet state = { engOrder: [], shuffledVie: [], matches: {}, score: 0 };\r\n\r\nconst engListEl = document.getElementById('engList');\r\nconst vieListEl = document.getElementById('vieList');\r\nconst scoreEl = document.getElementById('score');\r\nconst confettiEl = document.getElementById('confetti');\r\n\r\n/* helper shuffle */\r\nfunction shuffleArray(arr){\r\n  const a = arr.slice();\r\n  for(let i=a.length-1;i>0;i--){\r\n    const j = Math.floor(Math.random()*(i+1));\r\n    [a[i], a[j]] = [a[j], a[i]];\r\n  }\r\n  return a;\r\n}\r\n\r\n/* init */\r\nfunction init(){\r\n  state.matches = {}; state.score = 0;\r\n  state.engOrder = shuffleArray(pairs.map((_,i)=>i));\r\n  state.shuffledVie = shuffleArray(pairs.map(p => p.vie));\r\n  renderEng(); renderVie(); attachSlotEvents(); updateScore(); initFlashcards(); renderFillList();\r\n}\r\n\r\n/* render eng */\r\nfunction renderEng(){\r\n  engListEl.innerHTML = '';\r\n  state.engOrder.forEach((origIndex, pos) => {\r\n    const p = pairs[origIndex];\r\n    const item = document.createElement('div');\r\n    item.className = 'eng-item';\r\n    item.dataset.origIndex = origIndex;\r\n    item.innerHTML = `\r\n      <div class=\"eng-left\">\r\n        <div class=\"index\">${pos+1}</div>\r\n        <div>\r\n          <div style=\"font-weight:700\">${p.eng}</div>\r\n          <div style=\"font-size:13px; color:var(--muted)\">English</div>\r\n        </div>\r\n      </div>\r\n      <div class=\"slot\" data-index=\"${origIndex}\" aria-label=\"drop slot\" tabindex=\"0\"><div class=\"inner\"></div></div>\r\n    `;\r\n    engListEl.appendChild(item);\r\n  });\r\n}\r\n\r\n/* render vie */\r\nfunction renderVie(){\r\n  vieListEl.innerHTML = '';\r\n  state.shuffledVie.forEach((text, idx) => {\r\n    const d = document.createElement('div');\r\n    d.className = 'vie-item';\r\n    d.draggable = true;\r\n    d.dataset.text = text;\r\n    d.id = 'vie-'+idx;\r\n    d.innerHTML = `<span style=\"font-weight:600\">${text}</span>`;\r\n    vieListEl.appendChild(d);\r\n\r\n    d.addEventListener('dragstart', e => {\r\n      d.classList.add('dragging');\r\n      e.dataTransfer.setData('text/plain', text);\r\n      currentPicked = {text, el:d};\r\n    });\r\n    d.addEventListener('dragend', ()=> d.classList.remove('dragging'));\r\n    d.addEventListener('click', () => {\r\n      if(currentPicked && currentPicked.el === d){ currentPicked = null; d.style.outline = ''; }\r\n      else { clearPicked(); currentPicked = {text, el:d}; d.style.outline = '2px solid rgba(6,182,212,0.18)'; }\r\n    });\r\n  });\r\n}\r\n\r\n/* drag & drop */\r\nfunction attachSlotEvents(){\r\n  const slots = document.querySelectorAll('.slot');\r\n  slots.forEach(slot => {\r\n    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('active'); });\r\n    slot.addEventListener('dragleave', () => slot.classList.remove('active'));\r\n    slot.addEventListener('drop', e => {\r\n      e.preventDefault(); slot.classList.remove('active');\r\n      const text = e.dataTransfer.getData('text/plain'); handleDrop(slot, text);\r\n    });\r\n    slot.addEventListener('click', () => { if(currentPicked) handleDrop(slot, currentPicked.text); });\r\n    slot.addEventListener('focus', () => slot.classList.add('highlight'));\r\n    slot.addEventListener('blur', () => slot.classList.remove('highlight'));\r\n    slot.addEventListener('keydown', e => { if(e.key === 'Enter' && currentPicked) handleDrop(slot, currentPicked.text); });\r\n  });\r\n}\r\n\r\nfunction handleDrop(slot, vieText){\r\n  const engIndex = Number(slot.dataset.index);\r\n  const correctVie = pairs[engIndex].vie;\r\n  if(state.matches[engIndex]) return;\r\n  if(vieText === correctVie){\r\n    slot.classList.add('correct');\r\n    slot.innerHTML = `<div class=\"inner\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"margin-right:6px\"><path d=\"M20 6L9 17l-5-5\" stroke=\"#10b981\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg><span style=\"font-weight:700;color:var(--success)\">${vieText}</span></div>`;\r\n    slot.style.borderColor = 'rgba(16,185,129,0.9)'; slot.style.boxShadow = '0 10px 30px rgba(16,185,129,0.06)';\r\n    state.matches[engIndex] = vieText; state.score++; updateScore(); celebrate(); speak(pairs[engIndex].eng); removeVieItem(vieText);\r\n    if(state.score === pairs.length){ setTimeout(()=> alert('Chúc mừng! Bạn đã ghép đúng tất cả.'), 300); }\r\n  } else {\r\n    slot.classList.add('wrong'); setTimeout(()=> slot.classList.remove('wrong'), 420);\r\n    const vieEl = findVieElement(vieText);\r\n    if(vieEl){ vieEl.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}], {duration:300}); }\r\n  }\r\n}\r\n\r\nfunction removeVieItem(text){ const el = findVieElement(text); if(el){ el.remove(); currentPicked = null; } }\r\nfunction findVieElement(text){ return Array.from(document.querySelectorAll('.vie-item')).find(x => x.dataset.text === text); }\r\nfunction updateScore(){ scoreEl.innerHTML = `Đúng: <strong>${state.score}</strong> / ${pairs.length}`; }\r\n\r\n/* confetti */\r\nfunction celebrate(){\r\n  const colors = ['#06b6d4','#f97316','#f43f5e','#10b981','#60a5fa'];\r\n  for(let i=0;i<18;i++){\r\n    const p = document.createElement('div'); p.className = 'piece';\r\n    p.style.left = Math.random()*100 + '%'; p.style.background = colors[Math.floor(Math.random()*colors.length)];\r\n    p.style.width = (8 + Math.random()*10) + 'px'; p.style.height = (10 + Math.random()*14) + 'px';\r\n    p.style.animationDuration = (900 + Math.random()*700) + 'ms'; confettiEl.appendChild(p); setTimeout(()=> p.remove(), 2000);\r\n  }\r\n}\r\n\r\n/* speech */\r\nfunction speak(text){\r\n  if(!('speechSynthesis' in window)) return;\r\n  const utter = new SpeechSynthesisUtterance(text); utter.lang = 'en-US';\r\n  const voices = speechSynthesis.getVoices(); const enVoice = voices.find(v => /en(-|_)?/i.test(v.lang));\r\n  if(enVoice) utter.voice = enVoice; utter.rate = 0.95; speechSynthesis.cancel(); speechSynthesis.speak(utter);\r\n}\r\n\r\n/* controls */\r\ndocument.getElementById('shuffleBtn').addEventListener('click', () => {\r\n  state.engOrder = shuffleArray(pairs.map((_,i)=>i)); state.shuffledVie = shuffleArray(pairs.map(p => p.vie));\r\n  renderEng(); renderVie(); attachSlotEvents(); state.matches = {}; state.score = 0; updateScore();\r\n});\r\ndocument.getElementById('resetBtn').addEventListener('click', () => init());\r\n\r\n/* touch fallback */\r\nlet currentPicked = null;\r\nfunction clearPicked(){ if(currentPicked && currentPicked.el) currentPicked.el.style.outline = ''; currentPicked = null; }\r\ndocument.addEventListener('click', (e) => { if(!e.target.closest('.vie-item') && !e.target.closest('.slot')) clearPicked(); });\r\n\r\nif (typeof speechSynthesis !== 'undefined') { speechSynthesis.onvoiceschanged = () => {}; }\r\n\r\n/* FLASHCARDS */\r\nlet flashIndex = 0; let flashAuto = null;\r\nconst flashFront = document.getElementById('flashFront'); const flashBack = document.getElementById('flashBack'); const flashcardEl = document.getElementById('flashcard');\r\n\r\nfunction initFlashcards(){ flashIndex = 0; renderFlash(); }\r\nfunction renderFlash(){\r\n  if(pairs.length === 0){ flashFront.textContent = 'Không có từ nào'; flashBack.textContent = ''; return; }\r\n  const p = pairs[flashIndex]; flashFront.textContent = p.eng; flashBack.textContent = p.vie; flashcardEl.classList.remove('flipped'); flashcardEl.setAttribute('aria-pressed','false');\r\n}\r\ndocument.getElementById('nextCard').addEventListener('click', () => { flashIndex = (flashIndex + 1) % pairs.length; renderFlash(); });\r\ndocument.getElementById('prevCard').addEventListener('click', () => { flashIndex = (flashIndex - 1 + pairs.length) % pairs.length; renderFlash(); });\r\ndocument.getElementById('flipCard').addEventListener('click', () => { flashcardEl.classList.toggle('flipped'); flashcardEl.setAttribute('aria-pressed', flashcardEl.classList.contains('flipped')); });\r\nflashcardEl.addEventListener('click', () => { flashcardEl.classList.toggle('flipped'); flashcardEl.setAttribute('aria-pressed', flashcardEl.classList.contains('flipped')); });\r\ndocument.getElementById('autoPlay').addEventListener('click', (e) => {\r\n  if(flashAuto){ clearInterval(flashAuto); flashAuto = null; e.target.textContent = 'Auto'; }\r\n  else { flashAuto = setInterval(()=>{ flashIndex = (flashIndex+1)%pairs.length; renderFlash(); }, 2000); e.target.textContent = 'Stop'; }\r\n});\r\ndocument.getElementById('showBoth').addEventListener('click', () => { flashcardEl.classList.add('flipped'); setTimeout(()=> flashcardEl.classList.remove('flipped'), 1600); });\r\n\r\n/* FILL-IN */\r\nconst fillListEl = document.getElementById('fillList'); const fillScoreEl = document.getElementById('fillScore');\r\nfunction renderFillList(){\r\n  fillListEl.innerHTML = '';\r\n  pairs.forEach((p, idx) => {\r\n    const row = document.createElement('div'); row.className = 'fill-row';\r\n    row.innerHTML = `<div class=\"vie\">${p.vie}</div><input type=\"text\" data-index=\"${idx}\" placeholder=\"Nhập tiếng Anh...\" /><div class=\"small\" style=\"min-width:120px\" id=\"hint-${idx}\"></div>`;\r\n    fillListEl.appendChild(row);\r\n    const input = row.querySelector('input');\r\n    input.addEventListener('focus', () => input.classList.remove('wrong'));\r\n    input.addEventListener('blur', () => {});\r\n  });\r\n  fillScoreEl.textContent = `Điểm: 0 / ${pairs.length}`;\r\n}\r\n\r\ndocument.getElementById('checkFill').addEventListener('click', () => {\r\n  let correct = 0;\r\n  pairs.forEach((p, idx) => {\r\n    const input = fillListEl.querySelector(`input[data-index=\"${idx}\"]`);\r\n    const hint = document.getElementById(`hint-${idx}`);\r\n    const val = (input.value || '').trim().toLowerCase();\r\n    const target = p.eng.trim().toLowerCase();\r\n    if(val === target){\r\n      correct++; input.classList.add('correct'); input.classList.remove('wrong'); input.style.borderColor = 'rgba(16,185,129,0.9)'; hint.innerHTML = `<span class=\"correct-answer\">Đúng</span>`;\r\n    } else {\r\n      input.classList.remove('correct'); input.classList.add('wrong'); input.style.borderColor = 'rgba(244,63,94,0.9)'; hint.innerHTML = `<span class=\"wrong-answer\">Sai</span>`;\r\n    }\r\n  });\r\n  fillScoreEl.textContent = `Điểm: ${correct} / ${pairs.length}`;\r\n});\r\n\r\ndocument.getElementById('showAnswers').addEventListener('click', () => {\r\n  pairs.forEach((p, idx) => {\r\n    const input = fillListEl.querySelector(`input[data-index=\"${idx}\"]`);\r\n    input.value = p.eng; input.classList.add('correct'); input.style.borderColor = 'rgba(6,182,212,0.6)';\r\n    const hint = document.getElementById(`hint-${idx}`); hint.innerHTML = `<span class=\"correct-answer\">Đáp án</span>`;\r\n  });\r\n  fillScoreEl.textContent = `Điểm: ${pairs.length} / ${pairs.length}`;\r\n});\r\n\r\ndocument.getElementById('resetFill').addEventListener('click', () => renderFillList());\r\n\r\n/* start */\r\ninit();\r\n<\/script>\r\n</body>\r\n</html>\r\n"}];
    const select = document.getElementById('selectBai');
    const openBtn = document.getElementById('openBtn');
    const clearBtn = document.getElementById('clearBtn');
    const frame = document.getElementById('frame');
    const controlsBar = document.getElementById('controlsBar');

    // populate select
    items.forEach((it, idx) => {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = it.name || it.filename || ('Bài ' + (idx+1));
      select.appendChild(opt);
    });

    function enterFullscreenMode() {
      // hide controls and expand iframe
      controlsBar.classList.add('hidden');
      frame.classList.add('fullscreen-frame');

      // create close button if chưa có
      if (!document.getElementById('closeFullscreen')) {
        const btn = document.createElement('button');
        btn.id = 'closeFullscreen';
        btn.textContent = 'Đóng toàn màn hình';
        btn.onclick = exitFullscreenMode;
        document.body.appendChild(btn);
      }
    }

    function exitFullscreenMode() {
      // restore controls and iframe
      controlsBar.classList.remove('hidden');
      frame.classList.remove('fullscreen-frame');
      const btn = document.getElementById('closeFullscreen');
      if (btn) btn.remove();
    }

    openBtn.onclick = () => {
      const v = select.value;
      if (v === '') {
        alert('Vui lòng chọn một bài.');
        return;
      }
      const it = items[+v];
      frame.srcdoc = it.content;

      // vào chế độ toàn màn hình
      enterFullscreenMode();
    };

    clearBtn.onclick = () => {
      select.value = '';
      frame.srcdoc = '<p>Chưa chọn bài</p>';
    };

    // allow Enter key to open when select focused
    select.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') openBtn.click();
    });

    // Escape để thoát toàn màn hình
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        exitFullscreenMode();
      }
    });
  </script>
