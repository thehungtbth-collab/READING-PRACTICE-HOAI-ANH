ss=\"small\" style=\"margin-top:8px; color:var(--muted); font-size:13px\">Nhấn flashcard để lật. Auto sẽ tự chuyển sau 2s. Show Both hiển thị cả 2 mặt tạm thời.</div>\n    </section>\n\n    <section class=\"g-layout\">\n      <div class=\"g-card\">\n        <h3 style=\"margin-top:0; color:var(--accent)\">Phần 1 Matching</h3>\n        <div class=\"small\" style=\"color:var(--muted); font-size:13px\">Kéo nghĩa vào ô tương ứng. Hoặc chạm để chọn rồi chạm vào ô.</div>\n        <div class=\"g-list\" id=\"engList\" style=\"margin-top:12px;\"></div>\n      </div>\n      <div class=\"g-card\">\n        <h3 style=\"margin-top:0; color:var(--accent)\">Phần 2 Vietnamese</h3>\n        <div class=\"g-vie-list\" id=\"vieList\" style=\"margin-top:12px;\"></div>\n      </div>\n    </section>\n\n    <section class=\"g-card\" style=\"margin-top:12px; margin-bottom: 50px;\">\n      <h3 style=\"margin-top:0; color:var(--accent)\">Bài Điền Chữ</h3>\n      <div class=\"small\" style=\"color:var(--muted); font-size:13px\">Bên trái là tiếng Việt, bên phải học sinh điền tiếng Anh. Nhấn Kiểm tra để chấm.</div>\n      <div style=\"margin-top:10px;\">\n        <div class=\"fill-list\" id=\"fillList\"></div>\n        <div style=\"margin-top:10px; display:flex; gap:8px; align-items:center;\">\n          <button class=\"g-btn\" id=\"checkFill\">Kiểm tra</button>\n          <button class=\"g-btn\" id=\"showAnswers\">Hiện đáp án</button>\n          <button class=\"g-btn\" id=\"resetFill\">Làm lại</button>\n          <div class=\"small\" id=\"fillScore\" style=\"align-self:center; color:var(--muted); font-size:13px\">Điểm: 0 / 0</div>\n        </div>\n      </div>\n    </section>\n  </div>\n</div>\n\n<div id=\"mif-view\">\n  <div class=\"mif-header\">\n    <h2 id=\"mif-title\" style=\"margin:0;color:#4338ca;font-size:18px\">Luyện Mif: Đoạn ...</h2>\n    <button class=\"mif-nav-btn\" style=\"background:#ef4444\" onclick=\"toggleMifMode()\">Đóng</button>\n  </div>\n  <div class=\"mif-body\">\n    <div class=\"mif-left\">\n      <div class=\"mif-col-container\">\n        <div class=\"mif-col\" id=\"mif-en-col\"></div>\n        <div class=\"mif-col\" id=\"mif-vi-col\"></div>\n      </div>\n    </div>\n    <div class=\"mif-right\">\n      <div id=\"mif-qs-container\" style=\"flex:1; overflow-y:auto; padding-bottom:20px;\"></div>\n      <div style=\"display:flex; justify-content:space-between; border-top:2px solid #cbd5e1; padding-top:15px; margin-top:10px;\">\n        <button class=\"mif-nav-btn\" id=\"mif-prev\" onclick=\"navMif(-1)\">⬅ Back</button>\n        <button class=\"mif-nav-btn\" id=\"mif-next\" onclick=\"navMif(1)\">Next ➡</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n<div id=\"popup\"></div>\n<div class=\"confetti\" id=\"confetti\"></div>\n\n<script>\n// --- MULTI-LESSON DATA INJECTION ---\nconst lessonsData = [{\"name\":\"Passage 1\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">The cutting of huge figures or ‘geoglyphs’ into the earth of English hillsides has taken place for more than 3,000 years. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">There are 56 hill figures \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v0\\\">scattered\\u003c/span> around England, with the vast \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v1\\\">majority\\u003c/span> on the chalk downlands of the country’s southern counties. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">The figures include giants, horses, crosses and regimental badges. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">Although the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v1\\\">majority\\u003c/span> of these geoglyphs date within the last 300 years or so, there are one or two that are much older. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Việc cắt những hình tượng khổng lồ hay ‘hình vẽ địa lý’ vào lòng đất ở các sườn đồi ở Anh đã diễn ra hơn 3.000 năm. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Có 56 hình vẽ ngọn đồi nằm rải rác khắp nước Anh, phần lớn nằm ở vùng đất đá phấn của các quận phía nam đất nước. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Các hình tượng bao gồm người khổng lồ, ngựa, thánh giá và huy hiệu trung đoàn. \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Mặc dù phần lớn các hình vẽ địa hình này có niên đại khoảng 300 năm trở lại đây, nhưng có một hoặc hai hình còn lâu đời hơn nhiều. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">The most famous of these figures is perhaps also the most \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v2\\\">mysterious\\u003c/span> – the Uffington White Horse in Oxfordshire. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">The White Horse has recently been re-dated and shown to be even older than its previously assigned ancient pre-Roman Iron Age* date. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">More \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v3\\\">controversial\\u003c/span> is the date of the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v4\\\">enigmatic\\u003c/span> Long Man of Wilmington in Sussex. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s3\\\">While many historians are convinced the figure is \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">prehistoric\\u003c/span>, others believe that it was the work of an artistic \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v6\\\">monk\\u003c/span> from a nearby \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v7\\\">priory\\u003c/span> and was created between the 11th and 15th centuries. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Nhân vật nổi tiếng nhất trong số này có lẽ cũng là nhân vật bí ẩn nhất – Ngựa trắng Uffington ở Oxfordshire. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Bạch Mã gần đây đã được xác định lại niên đại và cho thấy thậm chí còn cũ hơn so với niên đại thời kỳ đồ sắt cổ thời tiền La Mã* được ấn định trước đó. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Gây tranh cãi hơn là niên đại của Long Man bí ẩn của Wilmington ở Sussex. \\u003c/span>\\u003cspan id=\\\"p1s3\\\" class=\\\"vi-sent\\\">Trong khi nhiều nhà sử học tin rằng bức tượng này có từ thời tiền sử, những người khác tin rằng đó là tác phẩm của một tu sĩ nghệ thuật từ một tu viện gần đó và được tạo ra từ thế kỷ 11 đến thế kỷ 15. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">The method of cutting these huge figures was simply to remove the overlying grass to reveal the gleaming white chalk below. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">However, the grass would soon grow over the geoglyph again unless it was regularly cleaned or \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v8\\\">scoured\\u003c/span> by a fairly large team of people. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">One reason that the vast \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v1\\\">majority\\u003c/span> of hill figures have \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v9\\\">disappeared\\u003c/span> is that when the traditions associated with the figures faded, people no longer bothered or remembered to clear away the grass to expose the chalk outline. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">Furthermore, over hundreds of years the outlines would sometimes change due to people not always cutting in exactly the same place, thus creating a different shape to the original geoglyph. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s4\\\">That fact that any ancient hill figures survive at all in England today is \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v10\\\">testament\\u003c/span> to the strength and \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v11\\\">continuity\\u003c/span> of local customs and beliefs which, in one case at least, must stretch back over millennia. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Phương pháp cắt những hình khối khổng lồ này chỉ đơn giản là loại bỏ lớp cỏ phía trên để lộ lớp phấn trắng lấp lánh bên dưới. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Tuy nhiên, cỏ sẽ sớm mọc trở lại trên geoglyph trừ khi nó được dọn dẹp hoặc cọ rửa thường xuyên bởi một nhóm khá lớn người. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Một lý do khiến phần lớn các hình vẽ trên đồi đã biến mất là khi các truyền thống gắn liền với các hình vẽ này phai nhạt, người ta không còn bận tâm hay nhớ đến việc dọn cỏ để lộ đường viền bằng phấn. \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Hơn nữa, qua hàng trăm năm, đường nét đôi khi sẽ thay đổi do con người không phải lúc nào cũng cắt chính xác vào cùng một vị trí, do đó tạo ra hình dạng khác với hình vẽ ban đầu. \\u003c/span>\\u003cspan id=\\\"p2s4\\\" class=\\\"vi-sent\\\">Thực tế là bất kỳ hình tượng ngọn đồi cổ xưa nào còn tồn tại ở Anh ngày nay là minh chứng cho sức mạnh và tính liên tục của các phong tục và tín ngưỡng địa phương mà, trong một trường hợp, ít nhất, phải kéo dài hàng thiên niên kỷ. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph D\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s0\\\">The Uffington White Horse is a unique, \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v12\\\">stylised representation\\u003c/span> of a horse consisting of a long, sleek back, thin disjointed legs, a \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v13\\\">streaming tail\\u003c/span>, and a bird-like beaked head. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s1\\\">The elegant creature almost melts into the landscape. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s2\\\">The horse is situated 2.5 km from Uffington village on a steep close to the Late Bronze Age* (c. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s3\\\">7th century BCE) hillfort of Uffington Castle and below the Ridgeway, a long-distance Neolithic** track. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t3')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t3\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p3s0\\\" class=\\\"vi-sent\\\">Ngựa trắng Uffington là hình ảnh tượng trưng cách điệu, độc đáo của một con ngựa bao gồm lưng dài, bóng mượt, đôi chân mỏng rời rạc, đuôi chảy dài và đầu có mỏ giống chim. \\u003c/span>\\u003cspan id=\\\"p3s1\\\" class=\\\"vi-sent\\\">Sinh vật thanh lịch gần như tan chảy vào cảnh quan. \\u003c/span>\\u003cspan id=\\\"p3s2\\\" class=\\\"vi-sent\\\">Con ngựa nằm cách làng Uffington 2,5 km trên một con dốc gần Thời đại đồ đồng muộn * (c. \\u003c/span>\\u003cspan id=\\\"p3s3\\\" class=\\\"vi-sent\\\">thế kỷ thứ 7 trước Công nguyên) trên đồi của Lâu đài Uffington và bên dưới Ridgeway, một đường mòn thời kỳ đồ đá mới** đường dài. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph E\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s0\\\">The Uffington Horse is also surrounded by Bronze Age burial mounds. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s1\\\">It is not far from the Bronze Age cemetery of Lambourn Seven Barrows, which consists of more than 30 well-preserved burial mounds. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s2\\\">The carving has been placed in such a way as to make it extremely difficult to see from close quarters, and like many geoglyphs is best \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v14\\\">appreciated\\u003c/span> from the air. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s3\\\">Nevertheless, there are certain areas of the Vale of the White Horse, the valley containing and named after the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v15\\\">\\u003cspan class=\\\"vocab\\\" data-vid=\\\"v4\\\">enigmatic\\u003c/span> creature\\u003c/span>, from which an \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v16\\\">adequate impression\\u003c/span> may be gained. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s4\\\">Indeed on a clear day the carving can be seen from up to 30 km away. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t4')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t4\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p4s0\\\" class=\\\"vi-sent\\\">Ngựa Uffington cũng được bao quanh bởi các ụ chôn cất thời đồ đồng. \\u003c/span>\\u003cspan id=\\\"p4s1\\\" class=\\\"vi-sent\\\">Nó không xa nghĩa trang thời kỳ đồ đồng của Lambourn Seven Barrows, bao gồm hơn 30 ngôi mộ được bảo tồn tốt. \\u003c/span>\\u003cspan id=\\\"p4s2\\\" class=\\\"vi-sent\\\">Hình chạm khắc đã được đặt theo cách khiến nó cực kỳ khó nhìn thấy từ khoảng cách gần, và giống như nhiều hình vẽ địa lý được đánh giá cao nhất từ ​​​​trên không. \\u003c/span>\\u003cspan id=\\\"p4s3\\\" class=\\\"vi-sent\\\">Tuy nhiên, có một số khu vực nhất định ở Vale of the White Horse, thung lũng chứa đựng và được đặt tên theo sinh vật bí ẩn, từ đó có thể tạo được ấn tượng đầy đủ. \\u003c/span>\\u003cspan id=\\\"p4s4\\\" class=\\\"vi-sent\\\">Thật vậy, vào một ngày đẹp trời, bạn có thể nhìn thấy hình chạm khắc từ khoảng cách lên tới 30 km. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph F\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s0\\\">The earliest \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v17\\\">evidence\\u003c/span> of a horse at Uffington is from the 1070s CE when ‘White Horse Hill’ is mentioned in documents from the nearby Abbey of Abingdon, and the first reference to the horse itself is soon after, in 1190 CE. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s1\\\">However, the carving is believed to date back much further than that. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s2\\\">Due to the similarity of the Uffington White Horse to the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v18\\\">stylised depictions\\u003c/span> of horses on 1st century BCE coins, it had been thought that the creature must also date to that period. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t5')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t5\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p5s0\\\" class=\\\"vi-sent\\\">Bằng chứng sớm nhất về một con ngựa ở Uffington là từ những năm 1070 CN khi 'Đồi Ngựa Trắng' được đề cập trong các tài liệu từ Tu viện Abingdon gần đó, và tài liệu tham khảo đầu tiên về chính con ngựa này xuất hiện ngay sau đó, vào năm 1190 CN. \\u003c/span>\\u003cspan id=\\\"p5s1\\\" class=\\\"vi-sent\\\">Tuy nhiên, hình chạm khắc được cho là có niên đại xa hơn thế nhiều. \\u003c/span>\\u003cspan id=\\\"p5s2\\\" class=\\\"vi-sent\\\">Do sự giống nhau của Ngựa trắng Uffington với hình ảnh cách điệu về ngựa trên đồng xu thế kỷ thứ 1 trước Công nguyên, người ta cho rằng sinh vật này cũng phải có niên đại từ thời kỳ đó. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph G\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s0\\\">However, in 1995 Optically Stimulated Luminescence (OSL) testing was carried out by the Oxford Archaeological Unit on soil from two of the lower layers of the horse’s body, and from another cut near the base. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s1\\\">The result was a date for the horse’s construction somewhere between 1400 and 600 BCE – in other words, it had a Late Bronze Age or Early Iron Age origin. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t6')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t6\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p6s0\\\" class=\\\"vi-sent\\\">Tuy nhiên, vào năm 1995, đơn vị khảo cổ học Oxford đã tiến hành thử nghiệm Phát quang kích thích quang học (OSL) trên đất từ ​​hai lớp dưới của cơ thể ngựa và từ một vết cắt khác gần chân ngựa. \\u003c/span>\\u003cspan id=\\\"p6s1\\\" class=\\\"vi-sent\\\">Kết quả là niên đại chế tạo con ngựa này nằm trong khoảng từ 1400 đến 600 BCE - nói cách khác, nó có nguồn gốc từ thời kỳ đồ đồng muộn hoặc thời kỳ đồ sắt sớm. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph H\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s0\\\">The latter end of this date range would tie the carving of the horse in with \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v19\\\">occupation\\u003c/span> of the nearby Uffington hillfort, indicating that it may represent a \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v20\\\">tribal emblem\\u003c/span> making the land of the inhabitants of the hillfort. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s1\\\">Alternatively, the carving may have been carried out during a Bronze or Iron Age ritual. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s2\\\">Some researchers see the horse as representing the Celtic*** horse \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v21\\\">goddess\\u003c/span> Epona, who was worshipped as a protector of horses, and for her associations with \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v22\\\">fertility\\u003c/span>. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s3\\\">However, the cult of Epona was not imported from Gaul (France) until around the first century CE. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s4\\\">This date is at least six centuries after the Uffington Horse was probably carved. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s5\\\">Nevertheless, the horse had great ritual and economic significance during the Bronze and Iron Ages, as attested by its depictions on jewellery and other metal objects. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s6\\\">It is possible that the carving represents a \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v21\\\">goddess\\u003c/span> in native \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v23\\\">mythology\\u003c/span>, such as Rhiannon, described in later Welsh \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v23\\\">mythology\\u003c/span> as a beautiful woman dressed in gold and riding a white horse. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t7')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t7\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p7s0\\\" class=\\\"vi-sent\\\">Phần cuối của phạm vi niên đại này sẽ gắn việc chạm khắc con ngựa với việc chiếm đóng pháo đài đồi Uffington gần đó, cho thấy rằng nó có thể đại diện cho một biểu tượng bộ lạc tạo nên vùng đất của cư dân ở pháo đài đồi. \\u003c/span>\\u003cspan id=\\\"p7s1\\\" class=\\\"vi-sent\\\">Ngoài ra, việc chạm khắc có thể được thực hiện trong một nghi lễ thời đồ đồng hoặc đồ sắt. \\u003c/span>\\u003cspan id=\\\"p7s2\\\" class=\\\"vi-sent\\\">Một số nhà nghiên cứu coi con ngựa đại diện cho nữ thần ngựa Celtic *** Epona, người được tôn thờ như một người bảo vệ ngựa và vì mối liên hệ của cô với khả năng sinh sản. \\u003c/span>\\u003cspan id=\\\"p7s3\\\" class=\\\"vi-sent\\\">Tuy nhiên, sự sùng bái Epona không được du nhập từ Gaul (Pháp) cho đến khoảng thế kỷ thứ nhất CN. \\u003c/span>\\u003cspan id=\\\"p7s4\\\" class=\\\"vi-sent\\\">Ngày này có lẽ ít nhất là sáu thế kỷ sau khi Con ngựa Uffington được chạm khắc. \\u003c/span>\\u003cspan id=\\\"p7s5\\\" class=\\\"vi-sent\\\">Tuy nhiên, con ngựa có ý nghĩa kinh tế và nghi lễ to lớn trong thời đại đồ đồng và đồ sắt, được chứng thực qua hình ảnh của nó trên đồ trang sức và các đồ vật bằng kim loại khác. \\u003c/span>\\u003cspan id=\\\"p7s6\\\" class=\\\"vi-sent\\\">Có thể hình chạm khắc tượng trưng cho một nữ thần trong thần thoại bản địa, chẳng hạn như Rhiannon, được mô tả trong thần thoại xứ Wales sau này là một phụ nữ xinh đẹp mặc đồ vàng và cưỡi ngựa trắng. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph I\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p8s0\\\">The fact that geoglyphs can disappear easily, along with their associated \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v24\\\">rituals\\u003c/span> and meaning, indicates that they were never intended to be anything more than temporary gestures. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p8s1\\\">But this does not lessen their importance. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p8s2\\\">These giant carving are a fascinating glimpse into the minds of their creators and how they viewed the landscape in which they lived. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t8')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t8\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p8s0\\\" class=\\\"vi-sent\\\">Thực tế là các hình vẽ trên địa lý có thể biến mất dễ dàng, cùng với các nghi lễ và ý nghĩa liên quan của chúng, cho thấy rằng chúng không bao giờ có mục đích gì khác ngoài những cử chỉ tạm thời. \\u003c/span>\\u003cspan id=\\\"p8s1\\\" class=\\\"vi-sent\\\">Nhưng điều này không làm giảm tầm quan trọng của chúng. \\u003c/span>\\u003cspan id=\\\"p8s2\\\" class=\\\"vi-sent\\\">Những tác phẩm điêu khắc khổng lồ này là cái nhìn thoáng qua hấp dẫn về tâm trí của những người tạo ra chúng và cách họ nhìn nhận cảnh quan nơi họ sống. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"tfng\",\"text\":\"Most geoglyphs in England are located in a particular area of the country.\",\"options\":[],\"correctAnswer\":\"TRUE\",\"location\":\"scattered around England, with the vast majority\",\"_orderId\":1},{\"id\":2,\"type\":\"tfng\",\"text\":\"There are more geoglyphs in the shape of a horse than any other creature.\",\"options\":[],\"correctAnswer\":\"NOT GIVEN\",\"location\":\"figures include giants, horses, crosses\",\"_orderId\":2},{\"id\":3,\"type\":\"tfng\",\"text\":\"A recent dating of the Uffington White Horse indicates that people were mistaken about its age.\",\"options\":[],\"correctAnswer\":\"TRUE\",\"location\":\"has recently been re-dated and shown to be even older\",\"_orderId\":3},{\"id\":4,\"type\":\"tfng\",\"text\":\"Historians have come to an agreement about the origins of the Long Man of Wilmington.\",\"options\":[],\"correctAnswer\":\"FALSE\",\"location\":\"controversial is the date of the enigmatic Long Man\",\"_orderId\":4},{\"id\":5,\"type\":\"tfng\",\"text\":\"Geoglyphs were created by people placing white chalk on the hillside.\",\"options\":[],\"correctAnswer\":\"FALSE\",\"location\":\"method of cutting these huge figures was simply\",\"_orderId\":5},{\"id\":6,\"type\":\"tfng\",\"text\":\"Many geoglyphs in England are no longer visible.\",\"options\":[],\"correctAnswer\":\"TRUE\",\"location\":\"vast majority of hill figures have disappeared\",\"_orderId\":6},{\"id\":7,\"type\":\"tfng\",\"text\":\"The shape of some geoglyphs has been altered over time.\",\"options\":[],\"correctAnswer\":\"TRUE\",\"location\":\"hundreds of years the outlines would sometimes change\",\"_orderId\":7},{\"id\":8,\"type\":\"tfng\",\"text\":\"The fame of the Uffington White Horse is due to its size.\",\"options\":[],\"correctAnswer\":\"NOT GIVEN\",\"location\":\"stylised representation of a horse consisting\",\"_orderId\":8},{\"type\":\"gap-fill-block\",\"id\":9,\"text\":\"Complete the summary below.\\nChoose <b>ONE WORD ONLY</b> from the passage for each answer.\\nWrite your answers in boxes 9-13 on your answer sheet.\\n<b>The Uffington White Horse</b>\\n<b>The location of the Uffington White Horse:</b>\\n●   a distance of 2.5 km from Uffington village\\n●   near an ancient road known as the 9 …………………\\n●   close to an ancient cemetery that has a number of burial mounds\\n<b>Dating the Uffington White Horse:</b>\\n●   first reference to White Horse Hill appears in 10 ………………… from the 1070s\\n●   horses shown on coins from the period 100 BCE – 1 BCE are similar in appearance\\n●   according to analysis of the surrounding 11 …………………, the Horse is Late Bronze Age / Early Iron Age\\n<b>Possible reasons for creation of the Uffington White Horse</b>:\\n●   an emblem to indicate land ownership\\n●   formed part of an ancient ritual\\n●   was a representation of goddess Epona – associated with protection of horses and 12…………………\\n●  was a representation of a Welsh goddess called 13 …………………\",\"gapIds\":[9,10,11,12,13],\"answers\":{\"9\":\"Ridgeway\",\"10\":\"documents\",\"11\":\"soil\",\"12\":\"fertility\",\"13\":\"Rhiannon\"},\"locations\":{\"9\":\"Uffington village on a steep close\",\"10\":\"evidence of a horse at Uffington is\",\"11\":\"result was a date for the\",\"12\":\"researchers see the horse as representing\",\"13\":\"possible that the carving represents a goddess in native mythology\"},\"_orderId\":9}],\"vocab\":[{\"id\":\"v0\",\"word\":\"scattered\",\"meaning\":\"rải rác (spread, dispersed)\",\"synonym\":\"Houses are scattered across the valley. (Những ngôi nhà rải rác khắp thung lũng.)\",\"example\":\"\"},{\"id\":\"v1\",\"word\":\"majority\",\"meaning\":\"đa số (most, greater part)\",\"synonym\":\"The majority voted in favor. (Đa số bỏ phiếu ủng hộ.)\",\"example\":\"\"},{\"id\":\"v2\",\"word\":\"mysterious\",\"meaning\":\"bí ẩn (enigmatic, puzzling)\",\"synonym\":\"The cave is mysterious and dark. (Hang động bí ẩn và tối tăm.)\",\"example\":\"\"},{\"id\":\"v3\",\"word\":\"controversial\",\"meaning\":\"gây tranh cãi (disputed, debatable)\",\"synonym\":\"The law is highly controversial. (Luật này gây nhiều tranh cãi.)\",\"example\":\"\"},{\"id\":\"v4\",\"word\":\"enigmatic\",\"meaning\":\"khó hiểu, bí ẩn (mysterious, puzzling)\",\"synonym\":\"He gave an enigmatic smile. (Anh ấy nở một nụ cười bí ẩn.)\",\"example\":\"\"},{\"id\":\"v5\",\"word\":\"prehistoric\",\"meaning\":\"tiền sử (ancient, primeval)\",\"synonym\":\"Prehistoric animals lived millions of years ago. (Động vật tiền sử sống cách đây hàng triệu năm.)\",\"example\":\"\"},{\"id\":\"v6\",\"word\":\"monk\",\"meaning\":\"nhà sư (friar, religious man)\",\"synonym\":\"The monk prayed in the temple. (Nhà sư cầu nguyện trong chùa.)\",\"example\":\"\"},{\"id\":\"v7\",\"word\":\"priory\",\"meaning\":\"tu viện nhỏ (monastery, convent)\",\"synonym\":\"The priory was built in the 12th century. (Tu viện nhỏ được xây dựng vào thế kỷ 12.)\",\"example\":\"\"},{\"id\":\"v8\",\"word\":\"scoured\",\"meaning\":\"lùng sục, tìm kiếm (searched, examined)\",\"synonym\":\"They scoured the area for clues. (Họ lùng sục khu vực để tìm manh mối.)\",\"example\":\"\"},{\"id\":\"v9\",\"word\":\"disappeared\",\"meaning\":\"biến mất (vanished, gone)\",\"synonym\":\"The treasure disappeared without a trace. (Kho báu biến mất không dấu vết.)\",\"example\":\"\"},{\"id\":\"v10\",\"word\":\"testament\",\"meaning\":\"minh chứng, bằng chứng (proof, evidence)\",\"synonym\":\"His success is a testament to hard work. (Thành công của anh ấy là minh chứng cho sự chăm chỉ.)\",\"example\":\"\"},{\"id\":\"v11\",\"word\":\"continuity\",\"meaning\":\"sự liên tục (consistency, persistence)\",\"synonym\":\"The film lacks continuity. (Bộ phim thiếu sự liên tục.)\",\"example\":\"\"},{\"id\":\"v12\",\"word\":\"stylised representation\",\"meaning\":\"hình ảnh cách điệu (artistic depiction)\",\"synonym\":\"The cave shows stylised representations of animals. (Hang động có hình ảnh cách điệu về động vật.)\",\"example\":\"\"},{\"id\":\"v13\",\"word\":\"streaming tail\",\"meaning\":\"chiếc đuôi dài, tuôn chảy (flowing tail)\",\"synonym\":\"The comet had a streaming tail. (Sao chổi có chiếc đuôi dài tuôn chảy.)\",\"example\":\"\"},{\"id\":\"v14\",\"word\":\"appreciated\",\"meaning\":\"được đánh giá cao, trân trọng (valued, recognized)\",\"synonym\":\"Her efforts were appreciated by everyone. (Nỗ lực của cô ấy được mọi người trân trọng.)\",\"example\":\"\"},{\"id\":\"v15\",\"word\":\"enigmatic creature\",\"meaning\":\"sinh vật bí ẩn (mysterious being)\",\"synonym\":\"Legends speak of an enigmatic creature. (Truyền thuyết kể về một sinh vật bí ẩn.)\",\"example\":\"\"},{\"id\":\"v16\",\"word\":\"adequate impression\",\"meaning\":\"ấn tượng đầy đủ, thích hợp (sufficient impression)\",\"synonym\":\"The painting gives an adequate impression of reality. (Bức tranh tạo ấn tượng đầy đủ về thực tế.)\",\"example\":\"\"},{\"id\":\"v17\",\"word\":\"evidence\",\"meaning\":\"bằng chứng (proof, indication)\",\"synonym\":\"The police found evidence at the scene. (Cảnh sát tìm thấy bằng chứng tại hiện trường.)\",\"example\":\"\"},{\"id\":\"v18\",\"word\":\"stylised depictions\",\"meaning\":\"hình ảnh cách điệu (artistic portrayals)\",\"synonym\":\"The walls show stylised depictions of gods. (Các bức tường có hình ảnh cách điệu về thần linh.)\",\"example\":\"\"},{\"id\":\"v19\",\"word\":\"occupation\",\"meaning\":\"nghề nghiệp; sự chiếm đóng (job, takeover)\",\"synonym\":\"Teaching is her occupation. (Giảng dạy là nghề nghiệp của cô ấy.)\",\"example\":\"\"},{\"id\":\"v20\",\"word\":\"tribal emblem\",\"meaning\":\"biểu tượng bộ tộc (clan symbol)\",\"synonym\":\"The shield bore a tribal emblem. (Chiếc khiên mang biểu tượng bộ tộc.)\",\"example\":\"\"},{\"id\":\"v21\",\"word\":\"goddess\",\"meaning\":\"nữ thần (female deity)\",\"synonym\":\"Athena is the Greek goddess of wisdom. (Athena là nữ thần trí tuệ của Hy Lạp.)\",\"example\":\"\"},{\"id\":\"v22\",\"word\":\"fertility\",\"meaning\":\"sự màu mỡ, khả năng sinh sản (fruitfulness, reproduction)\",\"synonym\":\"The soil has high fertility. (Đất có độ màu mỡ cao.)\",\"example\":\"\"},{\"id\":\"v23\",\"word\":\"mythology\",\"meaning\":\"thần thoại (legends, folklore)\",\"synonym\":\"Greek mythology is full of heroes. (Thần thoại Hy Lạp đầy anh hùng.)\",\"example\":\"\"},{\"id\":\"v24\",\"word\":\"rituals\",\"meaning\":\"nghi lễ (ceremonies, rites)\",\"synonym\":\"The tribe performs ancient rituals. (Bộ tộc thực hiện các nghi lễ cổ xưa.)\",\"example\":\"\"}],\"headings\":[],\"headingKey\":{},\"mifRange\":\"\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[{\"eng\":\"scattered\",\"vie\":\"rải rác (spread, dispersed)\"},{\"eng\":\"majority\",\"vie\":\"đa số (most, greater part)\"},{\"eng\":\"mysterious\",\"vie\":\"bí ẩn (enigmatic, puzzling)\"},{\"eng\":\"controversial\",\"vie\":\"gây tranh cãi (disputed, debatable)\"},{\"eng\":\"enigmatic\",\"vie\":\"khó hiểu, bí ẩn (mysterious, puzzling)\"},{\"eng\":\"prehistoric\",\"vie\":\"tiền sử (ancient, primeval)\"},{\"eng\":\"monk\",\"vie\":\"nhà sư (friar, religious man)\"},{\"eng\":\"priory\",\"vie\":\"tu viện nhỏ (monastery, convent)\"},{\"eng\":\"scoured\",\"vie\":\"lùng sục, tìm kiếm (searched, examined)\"},{\"eng\":\"disappeared\",\"vie\":\"biến mất (vanished, gone)\"},{\"eng\":\"testament\",\"vie\":\"minh chứng, bằng chứng (proof, evidence)\"},{\"eng\":\"continuity\",\"vie\":\"sự liên tục (consistency, persistence)\"},{\"eng\":\"stylised representation\",\"vie\":\"hình ảnh cách điệu (artistic depiction)\"},{\"eng\":\"streaming tail\",\"vie\":\"chiếc đuôi dài, tuôn chảy (flowing tail)\"},{\"eng\":\"appreciated\",\"vie\":\"được đánh giá cao, trân trọng (valued, recognized)\"},{\"eng\":\"enigmatic creature\",\"vie\":\"sinh vật bí ẩn (mysterious being)\"},{\"eng\":\"adequate impression\",\"vie\":\"ấn tượng đầy đủ, thích hợp (sufficient impression)\"},{\"eng\":\"evidence\",\"vie\":\"bằng chứng (proof, indication)\"},{\"eng\":\"stylised depictions\",\"vie\":\"hình ảnh cách điệu (artistic portrayals)\"},{\"eng\":\"occupation\",\"vie\":\"nghề nghiệp; sự chiếm đóng (job, takeover)\"},{\"eng\":\"tribal emblem\",\"vie\":\"biểu tượng bộ tộc (clan symbol)\"},{\"eng\":\"goddess\",\"vie\":\"nữ thần (female deity)\"},{\"eng\":\"fertility\",\"vie\":\"sự màu mỡ, khả năng sinh sản (fruitfulness, reproduction)\"},{\"eng\":\"mythology\",\"vie\":\"thần thoại (legends, folklore)\"},{\"eng\":\"rituals\",\"vie\":\"nghi lễ (ceremonies, rites)\"}],\"pData\":[{\"en\":[\"The cutting of huge figures or ‘geoglyphs’ into the earth of English hillsides has taken place for more than 3,000 years.\",\"There are 56 hill figures scattered around England, with the vast majority on the chalk downlands of the country’s southern counties.\",\"The figures include giants, horses, crosses and regimental badges.\",\"Although the majority of these geoglyphs date within the last 300 years or so, there are one or two that are much older.\"],\"vi\":[\"Việc cắt những hình tượng khổng lồ hay ‘hình vẽ địa lý’ vào lòng đất ở các sườn đồi ở Anh đã diễn ra hơn 3.000 năm.\",\"Có 56 hình vẽ ngọn đồi nằm rải rác khắp nước Anh, phần lớn nằm ở vùng đất đá phấn của các quận phía nam đất nước.\",\"Các hình tượng bao gồm người khổng lồ, ngựa, thánh giá và huy hiệu trung đoàn.\",\"Mặc dù phần lớn các hình vẽ địa hình này có niên đại khoảng 300 năm trở lại đây, nhưng có một hoặc hai hình còn lâu đời hơn nhiều.\"]},{\"en\":[\"The most famous of these figures is perhaps also the most mysterious – the Uffington White Horse in Oxfordshire.\",\"The White Horse has recently been re-dated and shown to be even older than its previously assigned ancient pre-Roman Iron Age* date.\",\"More controversial is the date of the enigmatic Long Man of Wilmington in Sussex.\",\"While many historians are convinced the figure is prehistoric, others believe that it was the work of an artistic monk from a nearby priory and was created between the 11th and 15th centuries.\"],\"vi\":[\"Nhân vật nổi tiếng nhất trong số này có lẽ cũng là nhân vật bí ẩn nhất – Ngựa trắng Uffington ở Oxfordshire.\",\"Bạch Mã gần đây đã được xác định lại niên đại và cho thấy thậm chí còn cũ hơn so với niên đại thời kỳ đồ sắt cổ thời tiền La Mã* được ấn định trước đó.\",\"Gây tranh cãi hơn là niên đại của Long Man bí ẩn của Wilmington ở Sussex.\",\"Trong khi nhiều nhà sử học tin rằng bức tượng này có từ thời tiền sử, những người khác tin rằng đó là tác phẩm của một tu sĩ nghệ thuật từ một tu viện gần đó và được tạo ra từ thế kỷ 11 đến thế kỷ 15.\"]},{\"en\":[\"The method of cutting these huge figures was simply to remove the overlying grass to reveal the gleaming white chalk below.\",\"However, the grass would soon grow over the geoglyph again unless it was regularly cleaned or scoured by a fairly large team of people.\",\"One reason that the vast majority of hill figures have disappeared is that when the traditions associated with the figures faded, people no longer bothered or remembered to clear away the grass to expose the chalk outline.\",\"Furthermore, over hundreds of years the outlines would sometimes change due to people not always cutting in exactly the same place, thus creating a different shape to the original geoglyph.\",\"That fact that any ancient hill figures survive at all in England today is testament to the strength and continuity of local customs and beliefs which, in one case at least, must stretch back over millennia.\"],\"vi\":[\"Phương pháp cắt những hình khối khổng lồ này chỉ đơn giản là loại bỏ lớp cỏ phía trên để lộ lớp phấn trắng lấp lánh bên dưới.\",\"Tuy nhiên, cỏ sẽ sớm mọc trở lại trên geoglyph trừ khi nó được dọn dẹp hoặc cọ rửa thường xuyên bởi một nhóm khá lớn người.\",\"Một lý do khiến phần lớn các hình vẽ trên đồi đã biến mất là khi các truyền thống gắn liền với các hình vẽ này phai nhạt, người ta không còn bận tâm hay nhớ đến việc dọn cỏ để lộ đường viền bằng phấn.\",\"Hơn nữa, qua hàng trăm năm, đường nét đôi khi sẽ thay đổi do con người không phải lúc nào cũng cắt chính xác vào cùng một vị trí, do đó tạo ra hình dạng khác với hình vẽ ban đầu.\",\"Thực tế là bất kỳ hình tượng ngọn đồi cổ xưa nào còn tồn tại ở Anh ngày nay là minh chứng cho sức mạnh và tính liên tục của các phong tục và tín ngưỡng địa phương mà, trong một trường hợp, ít nhất, phải kéo dài hàng thiên niên kỷ.\"]},{\"en\":[\"The Uffington White Horse is a unique, stylised representation of a horse consisting of a long, sleek back, thin disjointed legs, a streaming tail, and a bird-like beaked head.\",\"The elegant creature almost melts into the landscape.\",\"The horse is situated 2.5 km from Uffington village on a steep close to the Late Bronze Age* (c.\",\"7th century BCE) hillfort of Uffington Castle and below the Ridgeway, a long-distance Neolithic** track.\"],\"vi\":[\"Ngựa trắng Uffington là hình ảnh tượng trưng cách điệu, độc đáo của một con ngựa bao gồm lưng dài, bóng mượt, đôi chân mỏng rời rạc, đuôi chảy dài và đầu có mỏ giống chim.\",\"Sinh vật thanh lịch gần như tan chảy vào cảnh quan.\",\"Con ngựa nằm cách làng Uffington 2,5 km trên một con dốc gần Thời đại đồ đồng muộn * (c.\",\"thế kỷ thứ 7 trước Công nguyên) trên đồi của Lâu đài Uffington và bên dưới Ridgeway, một đường mòn thời kỳ đồ đá mới** đường dài.\"]},{\"en\":[\"The Uffington Horse is also surrounded by Bronze Age burial mounds.\",\"It is not far from the Bronze Age cemetery of Lambourn Seven Barrows, which consists of more than 30 well-preserved burial mounds.\",\"The carving has been placed in such a way as to make it extremely difficult to see from close quarters, and like many geoglyphs is best appreciated from the air.\",\"Nevertheless, there are certain areas of the Vale of the White Horse, the valley containing and named after the enigmatic creature, from which an adequate impression may be gained.\",\"Indeed on a clear day the carving can be seen from up to 30 km away.\"],\"vi\":[\"Ngựa Uffington cũng được bao quanh bởi các ụ chôn cất thời đồ đồng.\",\"Nó không xa nghĩa trang thời kỳ đồ đồng của Lambourn Seven Barrows, bao gồm hơn 30 ngôi mộ được bảo tồn tốt.\",\"Hình chạm khắc đã được đặt theo cách khiến nó cực kỳ khó nhìn thấy từ khoảng cách gần, và giống như nhiều hình vẽ địa lý được đánh giá cao nhất từ ​​​​trên không.\",\"Tuy nhiên, có một số khu vực nhất định ở Vale of the White Horse, thung lũng chứa đựng và được đặt tên theo sinh vật bí ẩn, từ đó có thể tạo được ấn tượng đầy đủ.\",\"Thật vậy, vào một ngày đẹp trời, bạn có thể nhìn thấy hình chạm khắc từ khoảng cách lên tới 30 km.\"]},{\"en\":[\"The earliest evidence of a horse at Uffington is from the 1070s CE when ‘White Horse Hill’ is mentioned in documents from the nearby Abbey of Abingdon, and the first reference to the horse itself is soon after, in 1190 CE.\",\"However, the carving is believed to date back much further than that.\",\"Due to the similarity of the Uffington White Horse to the stylised depictions of horses on 1st century BCE coins, it had been thought that the creature must also date to that period.\"],\"vi\":[\"Bằng chứng sớm nhất về một con ngựa ở Uffington là từ những năm 1070 CN khi 'Đồi Ngựa Trắng' được đề cập trong các tài liệu từ Tu viện Abingdon gần đó, và tài liệu tham khảo đầu tiên về chính con ngựa này xuất hiện ngay sau đó, vào năm 1190 CN.\",\"Tuy nhiên, hình chạm khắc được cho là có niên đại xa hơn thế nhiều.\",\"Do sự giống nhau của Ngựa trắng Uffington với hình ảnh cách điệu về ngựa trên đồng xu thế kỷ thứ 1 trước Công nguyên, người ta cho rằng sinh vật này cũng phải có niên đại từ thời kỳ đó.\"]},{\"en\":[\"However, in 1995 Optically Stimulated Luminescence (OSL) testing was carried out by the Oxford Archaeological Unit on soil from two of the lower layers of the horse’s body, and from another cut near the base.\",\"The result was a date for the horse’s construction somewhere between 1400 and 600 BCE – in other words, it had a Late Bronze Age or Early Iron Age origin.\"],\"vi\":[\"Tuy nhiên, vào năm 1995, đơn vị khảo cổ học Oxford đã tiến hành thử nghiệm Phát quang kích thích quang học (OSL) trên đất từ ​​hai lớp dưới của cơ thể ngựa và từ một vết cắt khác gần chân ngựa.\",\"Kết quả là niên đại chế tạo con ngựa này nằm trong khoảng từ 1400 đến 600 BCE - nói cách khác, nó có nguồn gốc từ thời kỳ đồ đồng muộn hoặc thời kỳ đồ sắt sớm.\"]},{\"en\":[\"The latter end of this date range would tie the carving of the horse in with occupation of the nearby Uffington hillfort, indicating that it may represent a tribal emblem making the land of the inhabitants of the hillfort.\",\"Alternatively, the carving may have been carried out during a Bronze or Iron Age ritual.\",\"Some researchers see the horse as representing the Celtic*** horse goddess Epona, who was worshipped as a protector of horses, and for her associations with fertility.\",\"However, the cult of Epona was not imported from Gaul (France) until around the first century CE.\",\"This date is at least six centuries after the Uffington Horse was probably carved.\",\"Nevertheless, the horse had great ritual and economic significance during the Bronze and Iron Ages, as attested by its depictions on jewellery and other metal objects.\",\"It is possible that the carving represents a goddess in native mythology, such as Rhiannon, described in later Welsh mythology as a beautiful woman dressed in gold and riding a white horse.\"],\"vi\":[\"Phần cuối của phạm vi niên đại này sẽ gắn việc chạm khắc con ngựa với việc chiếm đóng pháo đài đồi Uffington gần đó, cho thấy rằng nó có thể đại diện cho một biểu tượng bộ lạc tạo nên vùng đất của cư dân ở pháo đài đồi.\",\"Ngoài ra, việc chạm khắc có thể được thực hiện trong một nghi lễ thời đồ đồng hoặc đồ sắt.\",\"Một số nhà nghiên cứu coi con ngựa đại diện cho nữ thần ngựa Celtic *** Epona, người được tôn thờ như một người bảo vệ ngựa và vì mối liên hệ của cô với khả năng sinh sản.\",\"Tuy nhiên, sự sùng bái Epona không được du nhập từ Gaul (Pháp) cho đến khoảng thế kỷ thứ nhất CN.\",\"Ngày này có lẽ ít nhất là sáu thế kỷ sau khi Con ngựa Uffington được chạm khắc.\",\"Tuy nhiên, con ngựa có ý nghĩa kinh tế và nghi lễ to lớn trong thời đại đồ đồng và đồ sắt, được chứng thực qua hình ảnh của nó trên đồ trang sức và các đồ vật bằng kim loại khác.\",\"Có thể hình chạm khắc tượng trưng cho một nữ thần trong thần thoại bản địa, chẳng hạn như Rhiannon, được mô tả trong thần thoại xứ Wales sau này là một phụ nữ xinh đẹp mặc đồ vàng và cưỡi ngựa trắng.\"]},{\"en\":[\"The fact that geoglyphs can disappear easily, along with their associated rituals and meaning, indicates that they were never intended to be anything more than temporary gestures.\",\"But this does not lessen their importance.\",\"These giant carving are a fascinating glimpse into the minds of their creators and how they viewed the landscape in which they lived.\"],\"vi\":[\"Thực tế là các hình vẽ trên địa lý có thể biến mất dễ dàng, cùng với các nghi lễ và ý nghĩa liên quan của chúng, cho thấy rằng chúng không bao giờ có mục đích gì khác ngoài những cử chỉ tạm thời.\",\"Nhưng điều này không làm giảm tầm quan trọng của chúng.\",\"Những tác phẩm điêu khắc khổng lồ này là cái nhìn thoáng qua hấp dẫn về tâm trí của những người tạo ra chúng và cách họ nhìn nhận cảnh quan nơi họ sống.\"]}],\"timeLimit\":20}];\n\nlet currentLessonIndex = 0;\nlet qs, vocab, headings, headingKey, mifRange, removeOpt, removeFeatureOpt, pairs, pData;\n\nlet timeLeft = 0;\nlet timerInterval;\nconst timerEl = document.getElementById('timer');\n\nfunction startTimer() {\n    timerInterval = setInterval(() => {\n        if(timeLeft <= 0) {\n            clearInterval(timerInterval);\n            timerEl.innerText = \"00:00\";\n            alert(\"Time is up!\");\n            return;\n        }\n        timeLeft--;\n        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');\n        const s = (timeLeft % 60).toString().padStart(2, '0');\n        timerEl.innerText = `${m}:${s}`;\n    }, 1000);\n}\n\nfunction switchLesson(idx) {\n    currentLessonIndex = parseInt(idx);\n    const l = lessonsData[currentLessonIndex];\n    qs = l.qs; vocab = l.vocab; headings = l.headings; headingKey = l.headingKey;\n    mifRange = l.mifRange; removeOpt = l.removeOpt; removeFeatureOpt = l.removeFeatureOpt;\n    pairs = l.pairs; pData = l.pData;\n\n    // Reset UI\n    document.getElementById('articleArea').innerHTML = l.articleHtml;\n    document.getElementById('headingsArea').innerHTML = l.headingsHtml;\n    document.getElementById('qs').innerHTML = '';\n    document.getElementById('progressBar').innerHTML = '';\n    document.getElementById('saveBtn').style.display = 'none';\n    \n    // Reset Timer\n    clearInterval(timerInterval);\n    timeLeft = l.timeLimit * 60;\n    timerEl.innerText = \"--:--\";\n    startTimer();\n\n    // Render Questions & Attach Events\n    renderStudentQuestions();\n    attachEvents();\n\n    // Manage Views\n    if(document.getElementById('game-view').style.display === 'block') initGame();\n    if(document.getElementById('mif-view').style.display === 'flex') {\n        document.getElementById('mif-view').style.display = 'none';\n    }\n}\n\n// --- RENDERING QUESTIONS ---\nfunction renderStudentQuestions() {\n    const qDiv=document.getElementById('qs');\n    qDiv.innerHTML = '';\n    \n    qs.forEach(q=>{\n      if(q.type==='text-only'){ qDiv.innerHTML+=`<div class=\"text-only\">${q.text}</div>`; }\n      else if(q.type==='summary') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>');\n          q.gapIds.forEach(gid => {\n              const isFeat = q.isFeature ? 'true' : 'false';\n              const dz = `<span class=\"drop-zone\" id=\"dz-${gid}\" data-gid=\"${gid}\" data-isfeat=\"${isFeat}\" ondragover=\"allowDrop(event)\" ondrop=\"drop(event)\" onclick=\"clearDrop(${gid})\"></span><span class=\"q-num\" style=\"vertical-align:super;font-size:10px\">${gid}</span>&nbsp;`;\n              let replaced = txt.replace(new RegExp(`${gid}\\\\s*([._…-]{2,}|_{2,}|…+)`), dz);\n              if(replaced === txt) replaced = txt.replace(new RegExp(`${gid}[.]\\\\s+`), dz + ' ');\n              txt = replaced;\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2;font-size:15px\">${txt}</div><div style=\"margin-top:15px;display:flex;flex-wrap:wrap;gap:8px;padding-top:10px;border-top:1px dashed #e2e8f0\">`;\n          q.options.forEach(optLine => {\n              const m = optLine.match(/^([A-Z])\\s*[.)]?\\s*(.+)/);\n              if(m) h += `<div class=\"heading-item\" id=\"opt-${q.id}-${m[1]}\" style=\"display:inline-flex;width:auto;margin:0\" draggable=\"true\" ondragstart=\"drag(event)\" data-val=\"${m[1]}\"><span style=\"font-weight:bold;color:#2563eb\">${m[1]}</span> ${m[2]}</div>`;\n          });\n          h += `</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      } \n      else if(q.type==='gap-fill-block') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>'); \n          q.gapIds.forEach(gid => {\n              const loc = (q.locations && q.locations[gid]) ? q.locations[gid] : \"\";\n              const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${gid})\">📍</button>` : \"\";\n              const inp = `<span class=\"q-num\">${gid}</span><input type=\"text\" class=\"gap-input\" data-gid=\"${gid}\" oninput=\"upd(${gid})\">${locBtn}&nbsp;`;\t\n              txt = txt.replace(new RegExp(`${gid}[\\\\s:.)]*(?:[_….\\\\-]\\\\s*){2,}`), inp);\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2.2;font-size:16px\">${txt}</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      }\n      else if(q.type==='mcq-multi') {\n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          const locBtn1 = (q.locations && q.locations[q.gapIds[0]]) ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${q.gapIds[0]})\">📍</button>` : \"\";\n          h += `<div style=\"display:flex;align-items:baseline;margin-bottom:8px;\"><span class=\"q-num\">${q.gapIds[0]}-${q.gapIds[q.gapIds.length-1]}</span> <span>${q.text}</span> ${locBtn1}</div>`;\n          q.options.forEach((o, i) => {\n              const optLetterMatch = o.match(/^([A-Z])/i);\n              const optLetter = optLetterMatch ? optLetterMatch[1].toUpperCase() : o.trim()[0].toUpperCase();\n              h += `<label style=\"display:block;margin:5px 0;cursor:pointer;transition:all 0.2s;\">\n                      <input type=\"checkbox\" name=\"mcq_${q.id}\" value=\"${optLetter}\" onchange=\"updMcqMulti(${q.id}, '${q.gapIds.join(',')}', event)\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span>\n                    </label>`;\n          });\n          h += `<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n          q.gapIds.forEach(gid => {\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n      }\n      else { \n        let h=`<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n        const loc = q.location || \"\";\n        const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id})\">📍</button>` : \"\";\n        \n        if(q.type==='gap-fill'){\n           let t=q.text.replace(/(\\d+)[\\s:.)]*(?:[_….\\-]\\s*){2,}/g, '<span class=\"q-num\">$1</span><input type=\"text\" class=\"gap-input\" data-id=\"'+q.id+'\" oninput=\"upd('+q.id+')\">'+locBtn+'&nbsp;');\n           h+=`<div>${t}</div>`;\n        } else {\n           h+=`<div style=\"display:flex;align-items:baseline\"><span class=\"q-num\">${q.id}.</span> <span>${q.text}</span> ${locBtn}</div>`;\n           if(q.type==='mcq') q.options.forEach((o, i) => { h += `<label class=\"mcq-label\" style=\"display:block;margin:5px 0;cursor:pointer\"><input type=\"radio\" name=\"q${q.id}\" value=\"${o.trim()[0]}\" onchange=\"upd(${q.id})\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span></label>`; });\n           if(q.type==='tfng') {\n               h+='<div class=\"tfng-container\">';\n               ['TRUE', 'FALSE', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"tfng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='ynng') {\n               h+='<div class=\"tfng-container\">';\n               ['YES', 'NO', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"ynng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='mif') {\n               h+='<div class=\"mif-container\">';\n               mifRange.split('').forEach(char => {\n                   h+=`<label class=\"mif-label\"><input type=\"radio\" name=\"mif${q.id}\" value=\"${char}\" onchange=\"upd(${q.id})\"><span class=\"mif-circle\">${char}</span></label>`;\n               });\n               h+='</div>';\n           }\n        }\n        h+=`<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n        qDiv.innerHTML+=h;\n        const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+q.id; d.innerText=q.id;\n        d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n        document.getElementById('progressBar').appendChild(d);\n      }\n    });\n\n    document.querySelectorAll('input[type=\"radio\"][name^=\"mif\"]').forEach(radio => {\n        radio.addEventListener('change', (e) => {\n            const qId = radio.name.replace('mif', '');\n            const pChar = radio.value;\n            document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(btn => {\n                const btnPara = btn.closest('.mif-inline-box').dataset.para;\n                if(btnPara === pChar) {\n                    btn.classList.remove('hidden-by-other');\n                    btn.classList.add('selected');\n                } else {\n                    btn.classList.remove('selected');\n                    btn.classList.add('hidden-by-other');\n                }\n            });\n        });\n    });\n}\n\nfunction attachEvents() {\n    const pp = document.getElementById('popup');\n    document.querySelectorAll('.vocab').forEach(s => {\n      s.onclick = e => {\n        const v = vocab.find(x => x.id === s.dataset.vid); if(!v) return;\n        pp.innerHTML = `<div style=\"background:#1e293b;color:#fff;padding:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center\"><span>${v.word}</span><span onclick=\"speak('${v.word}')\" style=\"cursor:pointer;background:#334155;padding:4px;border-radius:50%\">🔊</span></div><div style=\"padding:16px;font-size:14px;color:#334155\"><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Meaning:</b> ${v.meaning}</p><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Synonyms:</b> ${v.synonym}</p><div style=\"background:#f1f5f9;padding:8px;border-radius:6px;margin-top:8px;color:#475569;font-style:italic\">\"${v.example}\"</div></div>`;\n        pp.style.display = 'block'; pp.style.top = (e.clientY+10) + 'px'; pp.style.left = Math.min(e.clientX, window.innerWidth-330) + 'px';\n        e.stopPropagation();\n      }\n    });\n\n    document.querySelectorAll('.sent').forEach(el => {\n        el.addEventListener('mouseenter', () => {\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\n            if(t) t.style.backgroundColor = '#fef08a'; \n        });\n        el.addEventListener('mouseleave', () => {\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\n            if(t) t.style.backgroundColor = 'transparent';\n        });\n    });\n}\n\nfunction allowDrop(ev) { ev.preventDefault(); }\nfunction drag(ev) { \n    const el = ev.target.closest('[draggable=\"true\"]') || ev.target;\n    const val = el.dataset.val || el.innerText.split('.')[0].trim();\n    ev.dataTransfer.setData(\"text\", val); \n    ev.dataTransfer.setData(\"srcId\", el.id); \n}\nfunction dragHeading(ev) { \n    const el = ev.target.closest('.heading-item');\n    ev.dataTransfer.setData(\"hid\", el.dataset.hid); \n    ev.dataTransfer.setData(\"srcId\", el.id); \n}\nfunction drop(ev) {\n    ev.preventDefault();\n    const zone = ev.target.closest('.drop-zone');\n    if(!zone) return;\n    \n    const type = zone.dataset.type;\n    if (type === 'heading') {\n        const hid = ev.dataTransfer.getData(\"hid\");\n        if(!hid) return; \n        zone.innerHTML = hid.toUpperCase(); \n        zone.dataset.val = hid; \n        zone.classList.add('filled');\n        \n        const srcId = ev.dataTransfer.getData(\"srcId\");\n        document.getElementById(srcId).classList.add('used');\n        if(zone.dataset.prevSrc && zone.dataset.prevSrc !== srcId) document.getElementById(zone.dataset.prevSrc).classList.remove('used');\n        zone.dataset.prevSrc = srcId;\n        return;\n    }\n    const val = ev.dataTransfer.getData(\"text\");\n    if(val) {\n        zone.innerText = val; \n        zone.classList.add('filled');\n        const gid = zone.dataset.gid;\n        document.getElementById('prog-'+gid).classList.add('filled');\n        \n        const isFeat = zone.dataset.isfeat === 'true';\n        const doRemove = isFeat ? removeFeatureOpt : removeOpt;\n        \n        if(doRemove) {\n            const srcId = ev.dataTransfer.getData(\"srcId\");\n            if(srcId) {\n                const srcEl = document.getElementById(srcId);\n                if(srcEl) srcEl.classList.add('used');\n                if(zone.dataset.prevSrc && zone.dataset.prevSrc !== srcId) {\n                    const prevEl = document.getElementById(zone.dataset.prevSrc);\n                    if(prevEl) prevEl.classList.remove('used');\n                }\n                zone.dataset.prevSrc = srcId;\n            }\n        }\n    }\n}\n\nfunction clearHeading(idx) {\n    const el = document.querySelector(`.heading-drop[data-para=\"${idx}\"]`);\n    if(el.dataset.prevSrc) document.getElementById(el.dataset.prevSrc).classList.remove('used');\n    el.innerHTML = '<span class=\"placeholder\">Drop Heading Here</span>'; el.classList.remove('filled'); delete el.dataset.val;\n}\nfunction clearDrop(gid) {\n    const el = document.getElementById('dz-'+gid);\n    const isFeat = el.dataset.isfeat === 'true';\n    const doRemove = isFeat ? removeFeatureOpt : removeOpt;\n    \n    if(doRemove && el.dataset.prevSrc) {\n        const prevEl = document.getElementById(el.dataset.prevSrc);\n        if(prevEl) prevEl.classList.remove('used');\n        delete el.dataset.prevSrc;\n    }\n    \n    el.innerText=''; el.classList.remove('filled'); document.getElementById('prog-'+gid).classList.remove('filled');\n}\n\nconst hlToolbar = document.getElementById('hl-toolbar');\nlet currentRange = null;\ndocument.addEventListener('mouseup', (e) => {\n    if(e.target.closest('#hl-toolbar')) return;\n    if(e.target.closest('#game-view')) return;\n    setTimeout(() => {\n        const sel = window.getSelection();\n        if(sel.toString().trim().length > 0) {\n            const range = sel.getRangeAt(0);\n            const parent = range.commonAncestorContainer.parentElement;\n            if(parent.closest('.en-text') || parent.closest('.q-block') || parent.closest('.text-only')) {\n                currentRange = range;\n                const rect = range.getBoundingClientRect();\n                hlToolbar.style.display = 'flex'; \n                hlToolbar.style.top = (rect.top + window.scrollY - 40) + 'px'; \n                hlToolbar.style.left = (rect.left + (rect.width/2)) + 'px';\n                return;\n            }\n        }\n        hlToolbar.style.display = 'none';\n    }, 10);\n});\n\nwindow.applyHighlight = (e) => {\n    e.preventDefault(); e.stopPropagation();\n    if(currentRange) {\n        const span = document.createElement('span'); span.className = 'user-highlight'; span.setAttribute('onclick', 'removeHighlight(this, event)');\n        try { currentRange.surroundContents(span); window.getSelection().removeAllRanges(); } catch(err) { alert('Selection too complex.'); }\n        hlToolbar.style.display = 'none';\n    }\n};\n\nwindow.applyNote = (e) => {\n    e.preventDefault(); e.stopPropagation();\n    if(currentRange) {\n        const noteText = prompt('Nhập ghi chú của bạn:');\n        if(noteText) {\n            const span = document.createElement('span'); \n            span.className = 'user-highlight has-note'; \n            span.setAttribute('onclick', 'removeHighlight(this, event)');\n            span.title = noteText;\n            try { currentRange.surroundContents(span); window.getSelection().removeAllRanges(); } catch(err) { alert('Selection too complex.'); }\n        }\n        hlToolbar.style.display = 'none';\n    }\n};\n\nwindow.removeHighlight = (el, e) => { \n    e.stopPropagation(); \n    if(el.classList.contains('has-note') && !confirm('Xóa ghi chú này?')) return;\n    const txt = document.createTextNode(el.innerText); \n    el.parentNode.replaceChild(txt, el); \n    hlToolbar.style.display = 'none'; \n};\n\nwindow.showLoc = (qId, subId) => {\n    document.querySelectorAll('.loc-highlight').forEach(el => el.classList.remove('loc-highlight'));\n    const q = qs.find(x => x.id === qId); if(!q) return;\n    let text = \"\";\n    if(subId && q.locations && q.locations[subId]) text = q.locations[subId]; else if(q.location) text = q.location;\n    if(!text) return alert(\"No location data found.\");\n    \n    const cleanText = text.trim().replace(/\\s+/g, ' ').toLowerCase();\n    const sents = document.querySelectorAll('.sent'); let found = false;\n    sents.forEach(s => {\n        const sText = s.innerText.trim().replace(/\\s+/g, ' ').toLowerCase();\n        if(sText.includes(cleanText) || (cleanText.length > 20 && cleanText.includes(sText))) {\n            s.classList.add('loc-highlight');\n            if(!found) { s.scrollIntoView({behavior: 'smooth', block: 'center'}); found = true; }\n        }\n    });\n    if(!found) alert(\"Could not find exact text match in passage.\");\n};\n\nwindow.upd = (id) => document.getElementById('prog-'+id).classList.add('filled');\nwindow.updMcqMulti = (qId, gapIdsStr, ev) => {\n    const gapIds = gapIdsStr.split(',');\n    const checkboxes = document.querySelectorAll(`input[name=\"mcq_${qId}\"]`);\n    const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;\n    const maxAllowed = gapIds.length;\n    if (checkedCount > maxAllowed) { ev.target.checked = false; alert(\"Bạn chỉ được chọn tối đa \" + maxAllowed + \" đáp án!\"); return; }\n    gapIds.forEach((gid, index) => {\n        const p = document.getElementById('prog-'+gid);\n        if(p) { if(index < checkedCount) p.classList.add('filled'); else p.classList.remove('filled'); }\n    });\n};\n\nwindow.check = () => {\n    document.querySelectorAll('.ans-key').forEach(e=>e.remove());\n    document.querySelectorAll('.input-correct, .input-wrong, .correct-zone, .wrong-zone, .correct-opt, .wrong-opt').forEach(e=>e.classList.remove('input-correct','input-wrong','correct-zone','wrong-zone','correct-opt','wrong-opt'));\n\tdocument.querySelectorAll('.prog-correct, .prog-wrong').forEach(e=>e.classList.remove('prog-correct','prog-wrong'));\n    document.querySelectorAll('.mcq-mark').forEach(e=>e.innerText='');\n\n    let score = 0, total = 0; let allAnswered = true;\n    \n    if(headings.length > 0) {\n        document.querySelectorAll('.heading-drop').forEach(z => {\n            const pIdx = z.dataset.para, userVal = (z.dataset.val || \"\").toUpperCase(), correctVal = (headingKey[pIdx] || \"\").toUpperCase();\n            if(correctVal) { \n                total++; const fb = document.getElementById('fb-h-'+pIdx);\n                if(userVal === correctVal) { fb.innerHTML = '<span class=\"correct\">✓</span>'; score++; } \n                else { fb.innerHTML = `<span class=\"wrong\">✗</span> <span class=\"correct\">${correctVal}</span>`; }\n            }\n        });\n    }\n\n    qs.forEach(q => {\n        if(q.type === 'summary' || q.type === 'gap-fill-block') {\n            total += q.gapIds.length;\n            q.gapIds.forEach(gid => {\n                let userVal = \"\"; let el = null; const keyVal = (q.answers[gid] || \"\").trim();\n                if(q.type==='summary') { \n                    el=document.getElementById('dz-'+gid); userVal = el?el.innerText.trim():\"\"; \n                    if(el) {\n                        if(userVal.toLowerCase() === keyVal.toLowerCase()) { el.classList.add('correct-zone'); score++; document.getElementById('prog-'+gid).classList.add('prog-correct'); }\n                        else { el.classList.add('wrong-zone'); el.insertAdjacentHTML('afterend', `<span class=\"ans-key\">${keyVal}</span>`); document.getElementById('prog-'+gid).classList.add('prog-wrong'); }\n                    }\n                }\n                if(q.type==='gap-fill-block') { \n                    el=document.querySelector(`input[data-gid=\"${gid}\"]`); userVal = el?el.value.trim():\"\"; \n                    if(el) {\n                         if(userVal.toLowerCase() === keyVal.toLowerCase()) { el.classList.add('input-correct'); score     const select = document.getElementById('selectBai');
    const openBtn = document.getElementById('openBtn');
    const clearBtn = document.getElementById('clearBtn');
    const frame = document.getElementById('frame');
    const controlsBar = document.getElementById('controlsBar');

    // populate select
    items.forEach((it, idx) => {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = it.name || it.filename || ('Bài ' + (idx+1));
      select.appendChild(opt);
    });

    function enterFullscreenMode() {
      // hide controls and expand iframe
      controlsBar.classList.add('hidden');
      frame.classList.add('fullscreen-frame');

      // create close button if chưa có
      if (!document.getElementById('closeFullscreen')) {
        const btn = document.createElement('button');
        btn.id = 'closeFullscreen';
        btn.textContent = 'Đóng toàn màn hình';
        btn.onclick = exitFullscreenMode;
        document.body.appendChild(btn);
      }
    }

    function exitFullscreenMode() {
      // restore controls and iframe
      controlsBar.classList.remove('hidden');
      frame.classList.remove('fullscreen-frame');
      const btn = document.getElementById('closeFullscreen');
      if (btn) btn.remove();
    }

    openBtn.onclick = () => {
      const v = select.value;
      if (v === '') {
        alert('Vui lòng chọn một bài.');
        return;
      }
      const it = items[+v];
      frame.srcdoc = it.content;

      // vào chế độ toàn màn hình
      enterFullscreenMode();
    };

    clearBtn.onclick = () => {
      select.value = '';
      frame.srcdoc = '<p>Chưa chọn bài</p>';
    };

    // allow Enter key to open when select focused
    select.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') openBtn.click();
    });

    // Escape để thoát toàn màn hình
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        exitFullscreenMode();
      }
    });
  </script>
