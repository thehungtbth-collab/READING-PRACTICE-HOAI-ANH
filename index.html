d=\"timer\">--:--</div>\n        <button class=\"game-btn\" onclick=\"toggleGame()\">🎮 Play Vocab Game</button>\n\t\t<button class=\"game-btn\" onclick=\"toggleMifMode()\" style=\"background:#8b5cf6;color:#fff\">🎯 Luyện Mif</button>\n    </div>\n    <div class=\"progress-container\" id=\"progressBar\"></div>\n    <div style=\"display:flex; align-items:center;\">\n        <button class=\"check-btn\" id=\"saveBtn\" onclick=\"saveResult()\" style=\"display:none; background:#f59e0b; margin-right:8px;\">SAVE RESULT</button>\n        <button class=\"check-btn\" onclick=\"check()\" id=\"submitBtn\">SUBMIT</button>\n    </div>\n</div>\n\n<div id=\"reading-view\" class=\"container\">\n  <div class=\"pane left\" id=\"lp\"><h2 style=\"font-size:18px; font-weight:700; color:#334155; margin-bottom:15px\">Reading Passage</h2><div id=\"articleArea\"></div></div>\n  <div class=\"resizer\" id=\"rs\"></div>\n  <div class=\"pane right\"><h2 style=\"font-size:18px; font-weight:700; color:#334155; margin-bottom:15px\">Questions</h2><div id=\"headingsArea\"></div><div id=\"qs\"></div></div>\n</div>\n\n<div id=\"game-view\">\n  <div class=\"g-container\">\n    <header class=\"g-header\">\n      <h1 class=\"g-h1\">Vocabulary Matching Game</h1>\n      <div class=\"g-controls\">\n        <div class=\"g-badge\" id=\"score\">Đúng: 0 / 0</div>\n        <button class=\"g-btn\" id=\"shuffleBtn\">Trộn</button>\n        <button class=\"g-btn\" id=\"resetBtn\">Làm lại</button>\n        <button class=\"g-btn\" style=\"background:linear-gradient(90deg,#ef4444,#dc2626);color:#fff\" onclick=\"toggleGame()\">Close Game</button>\n      </div>\n    </header>\n\n    <section class=\"g-card\" style=\"margin-bottom:12px;\">\n      <h3 style=\"margin-top:0; color:var(--accent)\">Flashcards Ôn Tập</h3>\n      <div style=\"display:flex; gap:12px; align-items:center; flex-wrap:wrap;\">\n        <div class=\"flash-wrap\">\n          <div id=\"flashcard\" class=\"flashcard\" tabindex=\"0\" role=\"button\" aria-pressed=\"false\">\n            <div class=\"flash-face front\" id=\"flashFront\">Nhấn Next để bắt đầu</div>\n            <div class=\"flash-face back\" id=\"flashBack\">Back</div>\n          </div>\n        </div>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"display:flex; gap:8px;\">\n            <button class=\"g-btn\" id=\"prevCard\">Prev</button>\n            <button class=\"g-btn\" id=\"flipCard\">Flip</button>\n            <button class=\"g-btn\" id=\"nextCard\">Next</button>\n          </div>\n          <div style=\"display:flex; gap:8px;\">\n            <button class=\"g-btn\" id=\"autoPlay\">Auto</button>\n            <button class=\"g-btn\" id=\"showBoth\">Show Both</button>\n          </div>\n        </div>\n      </div>\n      <div class=\"small\" style=\"margin-top:8px; color:var(--muted); font-size:13px\">Nhấn flashcard để lật. Auto sẽ tự chuyển sau 2s. Show Both hiển thị cả 2 mặt tạm thời.</div>\n    </section>\n\n    <section class=\"g-layout\">\n      <div class=\"g-card\">\n        <h3 style=\"margin-top:0; color:var(--accent)\">Phần 1 Matching</h3>\n        <div class=\"small\" style=\"color:var(--muted); font-size:13px\">Kéo nghĩa vào ô tương ứng. Hoặc chạm để chọn rồi chạm vào ô.</div>\n        <div class=\"g-list\" id=\"engList\" style=\"margin-top:12px;\"></div>\n      </div>\n      <div class=\"g-card\">\n        <h3 style=\"margin-top:0; color:var(--accent)\">Phần 2 Vietnamese</h3>\n        <div class=\"g-vie-list\" id=\"vieList\" style=\"margin-top:12px;\"></div>\n      </div>\n    </section>\n\n    <section class=\"g-card\" style=\"margin-top:12px; margin-bottom: 50px;\">\n      <h3 style=\"margin-top:0; color:var(--accent)\">Bài Điền Chữ</h3>\n      <div class=\"small\" style=\"color:var(--muted); font-size:13px\">Bên trái là tiếng Việt, bên phải học sinh điền tiếng Anh. Nhấn Kiểm tra để chấm.</div>\n      <div style=\"margin-top:10px;\">\n        <div class=\"fill-list\" id=\"fillList\"></div>\n        <div style=\"margin-top:10px; display:flex; gap:8px; align-items:center;\">\n          <button class=\"g-btn\" id=\"checkFill\">Kiểm tra</button>\n          <button class=\"g-btn\" id=\"showAnswers\">Hiện đáp án</button>\n          <button class=\"g-btn\" id=\"resetFill\">Làm lại</button>\n          <div class=\"small\" id=\"fillScore\" style=\"align-self:center; color:var(--muted); font-size:13px\">Điểm: 0 / 0</div>\n        </div>\n      </div>\n    </section>\n  </div>\n</div>\n\n<div id=\"mif-view\">\n  <div class=\"mif-header\">\n    <h2 id=\"mif-title\" style=\"margin:0;color:#4338ca;font-size:18px\">Luyện Mif: Đoạn ...</h2>\n    <button class=\"mif-nav-btn\" style=\"background:#ef4444\" onclick=\"toggleMifMode()\">Đóng</button>\n  </div>\n  <div class=\"mif-body\">\n    <div class=\"mif-left\">\n      <div class=\"mif-col-container\">\n        <div class=\"mif-col\" id=\"mif-en-col\"></div>\n        <div class=\"mif-col\" id=\"mif-vi-col\"></div>\n      </div>\n    </div>\n    <div class=\"mif-right\">\n      <div id=\"mif-qs-container\" style=\"flex:1; overflow-y:auto; padding-bottom:20px;\"></div>\n      <div style=\"display:flex; justify-content:space-between; border-top:2px solid #cbd5e1; padding-top:15px; margin-top:10px;\">\n        <button class=\"mif-nav-btn\" id=\"mif-prev\" onclick=\"navMif(-1)\">⬅ Back</button>\n        <button class=\"mif-nav-btn\" id=\"mif-next\" onclick=\"navMif(1)\">Next ➡</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n<div id=\"popup\"></div>\n<div class=\"confetti\" id=\"confetti\"></div>\n\n<script>\n// --- MULTI-LESSON DATA INJECTION ---\nconst lessonsData = [{\"name\":\"Passage 1\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">Over the last decade, a huge database about the lives of southwest German villagers between 1600 and 1900 has been compiled by a team led by Professor Sheilagh Ogilvie at Cambridge University’s Faculty of Economics. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">It includes court records, guild ledgers, parish registers, village censuses, tax lists and – the most recent addition – 9,000 handwritten inventories listing over a million personal possessions belonging to ordinary women and men across three centuries. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">Ogilvie, who discovered the inventories in the archives of two German communities 30 years ago, believes they may hold the answer to a conundrum that has long puzzled economists: the lack of evidence for a causal link between education and a country’s economic growth. \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"A\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"14\\\" onclick=\\\"toggleInlineMif(14, 'A')\\\">\\u003cspan class=\\\"q-num-s\\\">14.\\u003c/span> \\u003cspan>an explanation of the need for research to focus on individuals with a fairly consistent income\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"15\\\" onclick=\\\"toggleInlineMif(15, 'A')\\\">\\u003cspan class=\\\"q-num-s\\\">15.\\u003c/span> \\u003cspan>examples of the sources the database has been compiled from\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"16\\\" onclick=\\\"toggleInlineMif(16, 'A')\\\">\\u003cspan class=\\\"q-num-s\\\">16.\\u003c/span> \\u003cspan>an account of one individual’s refusal to obey an order\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"17\\\" onclick=\\\"toggleInlineMif(17, 'A')\\\">\\u003cspan class=\\\"q-num-s\\\">17.\\u003c/span> \\u003cspan>a reference to a region being particularly suited to research into the link between education and economic growth\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"18\\\" onclick=\\\"toggleInlineMif(18, 'A')\\\">\\u003cspan class=\\\"q-num-s\\\">18.\\u003c/span> \\u003cspan>examples of the items included in a list of personal possessions\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Trong thập kỷ qua, một cơ sở dữ liệu khổng lồ về cuộc sống của dân làng Tây Nam nước Đức từ năm 1600 đến năm 1900 đã được biên soạn bởi một nhóm do Giáo sư Sheilagh Ogilvie tại Khoa Kinh tế của Đại học Cambridge dẫn đầu. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Nó bao gồm hồ sơ tòa án, sổ cái của hội, sổ đăng ký giáo xứ, điều tra dân số của làng, danh sách thuế và – bản bổ sung gần đây nhất – 9.000 bản kiểm kê viết tay liệt kê hơn một triệu tài sản cá nhân thuộc về phụ nữ và nam giới bình thường trong suốt ba thế kỷ. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Ogilvie, người đã phát hiện ra các kho lưu trữ trong kho lưu trữ của hai cộng đồng người Đức cách đây 30 năm, tin rằng chúng có thể là câu trả lời cho một câu hỏi hóc búa mà từ lâu đã khiến các nhà kinh tế bối rối: việc thiếu bằng chứng cho mối liên hệ nhân quả giữa giáo dục và tăng trưởng kinh tế của một quốc gia. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">As Ogilvie explains, ‘Education helps us to work more productively, invent better technology, and earn more … surely it must be critical for economic growth? \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">But, if you look back through history, there’s no evidence that having a high literacy rate made a country industrialise earlier.’ Between 1600 and 1900, England had only mediocre literacy rates by European standards, yet its economy grew fast and it was the first country to industrialise. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">During this period, Germany and Scandinavia had excellent literacy rates, but their economies grew slowly and they industrialised late. ‘Modern cross-country analyses have also struggled to find evidence that education causes economic growth, even though there is plenty of evidence that growth increases education,’ she adds. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Như Ogilvie giải thích, ‘Giáo dục giúp chúng ta làm việc hiệu quả hơn, phát minh ra công nghệ tốt hơn và kiếm được nhiều tiền hơn… chắc chắn nó phải rất quan trọng đối với tăng trưởng kinh tế? \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Tuy nhiên, nếu bạn nhìn lại lịch sử, không có bằng chứng nào cho thấy tỷ lệ biết đọc biết viết cao khiến một quốc gia công nghiệp hóa sớm hơn.’ Từ năm 1600 đến năm 1900, nước Anh chỉ có tỷ lệ biết chữ ở mức trung bình theo tiêu chuẩn châu Âu, tuy nhiên nền kinh tế nước này vẫn tăng trưởng nhanh và là quốc gia đầu tiên công nghiệp hóa. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Trong thời kỳ này, Đức và Scandinavia có tỷ lệ biết chữ cao, nhưng nền kinh tế của họ tăng trưởng chậm và công nghiệp hóa muộn. Bà nói thêm: “Các phân tích xuyên quốc gia hiện đại cũng gặp khó khăn trong việc tìm ra bằng chứng cho thấy giáo dục gây ra tăng trưởng kinh tế, mặc dù có rất nhiều bằng chứng cho thấy tăng trưởng sẽ thúc đẩy giáo dục”. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">In the handwritten inventories that Ogilvie is analysing are the belongings of women and men at marriage, remarriage and death. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">From badger skins to Bibles, sewing machines to scarlet bodices – the villagers’ entire worldly goods are included. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">Inventories of agricultural equipment and craft tools reveal economic activities; ownership of books and education-related objects like pens and slates suggests how people learned. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">In addition, the tax lists included in the database record the value of farms, workshops, assets and debts; signatures and people’s estimates of their age indicate literacy and numeracy levels; and court records reveal obstacles (such as the activities of the guilds*) that stifled industry. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s4\\\">Previous studies usually had just one way of linking education with economic growth – the presence of schools and printing presses, perhaps, or school enrolment, or the ability to sign names. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s5\\\">According to Ogilvie, the database provides multiple indicators for the same individuals, making it possible to analyse links between literacy, numeracy, wealth, and industriousness, for individual women and men over the long term. \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"C\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"14\\\" onclick=\\\"toggleInlineMif(14, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">14.\\u003c/span> \\u003cspan>an explanation of the need for research to focus on individuals with a fairly consistent income\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"15\\\" onclick=\\\"toggleInlineMif(15, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">15.\\u003c/span> \\u003cspan>examples of the sources the database has been compiled from\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"16\\\" onclick=\\\"toggleInlineMif(16, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">16.\\u003c/span> \\u003cspan>an account of one individual’s refusal to obey an order\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"17\\\" onclick=\\\"toggleInlineMif(17, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">17.\\u003c/span> \\u003cspan>a reference to a region being particularly suited to research into the link between education and economic growth\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"18\\\" onclick=\\\"toggleInlineMif(18, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">18.\\u003c/span> \\u003cspan>examples of the items included in a list of personal possessions\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Trong bản kiểm kê viết tay mà Ogilvie đang phân tích là đồ đạc của phụ nữ và đàn ông khi kết hôn, tái hôn và qua đời. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Từ da lửng đến Kinh thánh, máy khâu cho đến áo lót màu đỏ tươi - bao gồm toàn bộ hàng hóa trần thế của dân làng. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Tồn kho thiết bị nông nghiệp, dụng cụ thủ công phản ánh hoạt động kinh tế; quyền sở hữu sách và các đồ vật liên quan đến giáo dục như bút và bảng cho thấy con người học tập như thế nào. \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Ngoài ra, danh mục thuế có trong cơ sở dữ liệu ghi nhận giá trị trang trại, nhà xưởng, tài sản và các khoản nợ; chữ ký và ước tính của mọi người về độ tuổi của họ cho thấy trình độ đọc viết và tính toán; và hồ sơ tòa án tiết lộ những trở ngại (chẳng hạn như hoạt động của các bang hội*) đã bóp nghẹt ngành công nghiệp. \\u003c/span>\\u003cspan id=\\\"p2s4\\\" class=\\\"vi-sent\\\">Các nghiên cứu trước đây thường chỉ có một cách liên kết giáo dục với tăng trưởng kinh tế – có lẽ là sự hiện diện của trường học và nhà in, hoặc số lượng tuyển sinh vào trường, hoặc khả năng ký tên. \\u003c/span>\\u003cspan id=\\\"p2s5\\\" class=\\\"vi-sent\\\">Theo Ogilvie, cơ sở dữ liệu cung cấp nhiều chỉ số cho cùng một cá nhân, giúp phân tích mối liên hệ giữa khả năng đọc viết, tính toán, sự giàu có và sự cần cù của từng cá nhân phụ nữ và nam giới trong thời gian dài. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph D\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s0\\\">Ogilvie and her team have been building the vast database of material possessions on top of their full demographic reconstruction of the people who lived in these two German communities. ‘We can follow the same people – and their descendants – across 300 years of educational and economic change,’ she says. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s1\\\">Individual lives have unfolded before their eyes. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s2\\\">Stories like that of the 24-year-olds Ana Regina and Magdalena Riethmüllerin, who were chastised in 1707 for reading books in church instead of listening to the sermon. ‘This tells us they were continuing to develop their reading skills at least a decade after leaving school,’ explains Ogilvie. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s3\\\">The database also reveals the case of Juliana Schweickherdt, a 50-year-old spinster living in the small Black Forest community of Wildberg, who was reprimanded in 1752 by the local weavers’ guild for ‘weaving cloth and combing wool, counter to the guide ordinance’. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s4\\\">When Juliana continued taking jobs reserved for male guild members, she was summoned before the guild court and told to pay a fine equivalent to one third of a servant’s annual wage. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s5\\\">It was a small act of defiance by today’s standards, but it reflects a time when laws in Germany and elsewhere regulated people’s access to labour markets. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s6\\\">The dominance of guilds not only prevented people from using their skills, but also held back even the simplest industrial innovation. \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"D\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"14\\\" onclick=\\\"toggleInlineMif(14, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">14.\\u003c/span> \\u003cspan>an explanation of the need for research to focus on individuals with a fairly consistent income\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"15\\\" onclick=\\\"toggleInlineMif(15, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">15.\\u003c/span> \\u003cspan>examples of the sources the database has been compiled from\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"16\\\" onclick=\\\"toggleInlineMif(16, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">16.\\u003c/span> \\u003cspan>an account of one individual’s refusal to obey an order\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"17\\\" onclick=\\\"toggleInlineMif(17, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">17.\\u003c/span> \\u003cspan>a reference to a region being particularly suited to research into the link between education and economic growth\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"18\\\" onclick=\\\"toggleInlineMif(18, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">18.\\u003c/span> \\u003cspan>examples of the items included in a list of personal possessions\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t3')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t3\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p3s0\\\" class=\\\"vi-sent\\\">Ogilvie và nhóm của cô ấy đã và đang xây dựng cơ sở dữ liệu khổng lồ về tài sản vật chất dựa trên việc tái thiết toàn bộ nhân khẩu học của họ về những người sống ở hai cộng đồng người Đức này. Cô nói: “Chúng ta có thể theo dõi những người giống nhau - và con cháu của họ - trong suốt 300 năm thay đổi về giáo dục và kinh tế”. \\u003c/span>\\u003cspan id=\\\"p3s1\\\" class=\\\"vi-sent\\\">Cuộc sống cá nhân đã mở ra trước mắt họ. \\u003c/span>\\u003cspan id=\\\"p3s2\\\" class=\\\"vi-sent\\\">Những câu chuyện như câu chuyện của Ana Regina và Magdalena Riethmüllerin, 24 tuổi, bị trừng phạt vào năm 1707 vì đọc sách trong nhà thờ thay vì nghe thuyết pháp. Ogilvie giải thích: “Điều này cho chúng tôi biết rằng họ đang tiếp tục phát triển kỹ năng đọc của mình ít nhất một thập kỷ sau khi rời ghế nhà trường”. \\u003c/span>\\u003cspan id=\\\"p3s3\\\" class=\\\"vi-sent\\\">Cơ sở dữ liệu cũng tiết lộ trường hợp của Juliana Schweickherdt, một phụ nữ độc thân 50 tuổi sống trong cộng đồng Wildberg nhỏ thuộc Rừng Đen, người đã bị hội thợ dệt địa phương khiển trách vào năm 1752 vì 'dệt vải và chải len, đi ngược lại sắc lệnh hướng dẫn'. \\u003c/span>\\u003cspan id=\\\"p3s4\\\" class=\\\"vi-sent\\\">Khi Juliana tiếp tục nhận những công việc dành riêng cho các thành viên nam của bang hội, cô đã bị triệu tập trước tòa án bang hội và yêu cầu phải nộp phạt tương đương 1/3 mức lương hàng năm của người hầu. \\u003c/span>\\u003cspan id=\\\"p3s5\\\" class=\\\"vi-sent\\\">Đó là một hành động thách thức nhỏ so với các tiêu chuẩn ngày nay, nhưng nó phản ánh thời kỳ mà luật pháp ở Đức và các nơi khác quy định việc tiếp cận thị trường lao động của người dân. \\u003c/span>\\u003cspan id=\\\"p3s6\\\" class=\\\"vi-sent\\\">Sự thống trị của các bang hội không chỉ ngăn cản mọi người sử dụng kỹ năng của họ mà còn cản trở ngay cả sự đổi mới công nghiệp đơn giản nhất. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph E\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s0\\\">The data-gathering phase of the project has been completed and now, according to Ogilvie, it is time ‘to ask the big questions’. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s1\\\">One way to look at whether education causes economic growth is to ‘hold wealth constant’. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s2\\\">This involves following the lives of different people with the same level of wealth over a period of time. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s3\\\">If wealth is constant, it is possible to discover whether education was, for example, linked to the cultivation of new crops, or to the adoption of industrial innovations like sewing machines. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s4\\\">The team will also ask what aspect of education helped people engage more with productive and innovative activities. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s5\\\">Was it, for instance, literacy, numeracy, book ownership, years of schooling? \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s6\\\">Was there a threshold level – a tipping point – that needed to be reached to affect economic performance? \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"E\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"14\\\" onclick=\\\"toggleInlineMif(14, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">14.\\u003c/span> \\u003cspan>an explanation of the need for research to focus on individuals with a fairly consistent income\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"15\\\" onclick=\\\"toggleInlineMif(15, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">15.\\u003c/span> \\u003cspan>examples of the sources the database has been compiled from\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"16\\\" onclick=\\\"toggleInlineMif(16, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">16.\\u003c/span> \\u003cspan>an account of one individual’s refusal to obey an order\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"17\\\" onclick=\\\"toggleInlineMif(17, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">17.\\u003c/span> \\u003cspan>a reference to a region being particularly suited to research into the link between education and economic growth\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"18\\\" onclick=\\\"toggleInlineMif(18, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">18.\\u003c/span> \\u003cspan>examples of the items included in a list of personal possessions\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t4')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t4\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p4s0\\\" class=\\\"vi-sent\\\">Giai đoạn thu thập dữ liệu của dự án đã hoàn thành và bây giờ, theo Ogilvie, đã đến lúc “đặt những câu hỏi lớn”. \\u003c/span>\\u003cspan id=\\\"p4s1\\\" class=\\\"vi-sent\\\">Một cách để xem liệu giáo dục có tác động đến tăng trưởng kinh tế hay không là “giữ sự giàu có không đổi”. \\u003c/span>\\u003cspan id=\\\"p4s2\\\" class=\\\"vi-sent\\\">Điều này liên quan đến việc theo dõi cuộc sống của những người khác nhau với cùng mức độ giàu có trong một khoảng thời gian. \\u003c/span>\\u003cspan id=\\\"p4s3\\\" class=\\\"vi-sent\\\">Nếu sự giàu có là không đổi, thì có thể khám phá xem liệu giáo dục có liên quan đến việc trồng các loại cây trồng mới hay với việc áp dụng các cải tiến công nghiệp như máy may hay không. \\u003c/span>\\u003cspan id=\\\"p4s4\\\" class=\\\"vi-sent\\\">Nhóm cũng sẽ hỏi khía cạnh nào của giáo dục đã giúp mọi người tham gia nhiều hơn vào các hoạt động hiệu quả và đổi mới. \\u003c/span>\\u003cspan id=\\\"p4s5\\\" class=\\\"vi-sent\\\">Chẳng hạn, đó có phải là khả năng đọc viết, tính toán, quyền sở hữu sách, số năm đi học không? \\u003c/span>\\u003cspan id=\\\"p4s6\\\" class=\\\"vi-sent\\\">Có một ngưỡng nào đó – một điểm tới hạn – cần đạt tới để tác động đến hiệu quả kinh tế không? \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph F\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s0\\\">Ogilvie hopes to start finding answers to these questions over the next few years. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s1\\\">One thing is already clear, she says: the relationship between education and economic growth is far from straightforward. ‘German-speaking central Europe is an excellent laboratory for testing theories of economic growth,’ she explains. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s2\\\">Between 1600 and 1900, literacy rates and book ownership were high and yet the region remained poor. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s3\\\">It was also the case that local guilds and merchant associations were extremely powerful and legislated against anything that undermined their monopolies. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s4\\\">In villages throughout the region, guilds blocked labour migration and resisted changes that might reduce their influence. ‘Early findings suggest that the potential benefits of education for the economy can be held back by other barriers, and this has implications for today,’ says Ogilvie. ‘Huge amounts are spent improving education in developing countries, but this spending can fail to deliver economic growth if restrictions block people – especially women and the poor – from using their education in economically productive ways. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s5\\\">If economic institutions are poorly set up, for instance, education can’t lead to growth.’ \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"F\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"14\\\" onclick=\\\"toggleInlineMif(14, 'F')\\\">\\u003cspan class=\\\"q-num-s\\\">14.\\u003c/span> \\u003cspan>an explanation of the need for research to focus on individuals with a fairly consistent income\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"15\\\" onclick=\\\"toggleInlineMif(15, 'F')\\\">\\u003cspan class=\\\"q-num-s\\\">15.\\u003c/span> \\u003cspan>examples of the sources the database has been compiled from\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"16\\\" onclick=\\\"toggleInlineMif(16, 'F')\\\">\\u003cspan class=\\\"q-num-s\\\">16.\\u003c/span> \\u003cspan>an account of one individual’s refusal to obey an order\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"17\\\" onclick=\\\"toggleInlineMif(17, 'F')\\\">\\u003cspan class=\\\"q-num-s\\\">17.\\u003c/span> \\u003cspan>a reference to a region being particularly suited to research into the link between education and economic growth\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"18\\\" onclick=\\\"toggleInlineMif(18, 'F')\\\">\\u003cspan class=\\\"q-num-s\\\">18.\\u003c/span> \\u003cspan>examples of the items included in a list of personal possessions\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t5')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t5\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p5s0\\\" class=\\\"vi-sent\\\">Ogilvie hy vọng sẽ bắt đầu tìm ra câu trả lời cho những câu hỏi này trong vài năm tới. \\u003c/span>\\u003cspan id=\\\"p5s1\\\" class=\\\"vi-sent\\\">Bà nói có một điều đã rõ ràng: mối quan hệ giữa giáo dục và tăng trưởng kinh tế không hề đơn giản. Bà giải thích: “Trung Âu nói tiếng Đức là một phòng thí nghiệm tuyệt vời để kiểm tra các lý thuyết về tăng trưởng kinh tế”. \\u003c/span>\\u003cspan id=\\\"p5s2\\\" class=\\\"vi-sent\\\">Từ năm 1600 đến năm 1900, tỷ lệ biết chữ và sở hữu sách rất cao nhưng khu vực này vẫn còn nghèo. \\u003c/span>\\u003cspan id=\\\"p5s3\\\" class=\\\"vi-sent\\\">Đó cũng là trường hợp các hiệp hội và hiệp hội thương gia địa phương cực kỳ mạnh mẽ và có luật chống lại bất cứ điều gì làm suy yếu sự độc quyền của họ. \\u003c/span>\\u003cspan id=\\\"p5s4\\\" class=\\\"vi-sent\\\">Tại các ngôi làng khắp vùng, các phường hội ngăn chặn sự di cư của lao động và chống lại những thay đổi có thể làm giảm ảnh hưởng của họ. Ogilvie nói: “Những phát hiện ban đầu cho thấy những lợi ích tiềm năng của giáo dục đối với nền kinh tế có thể bị cản trở bởi các rào cản khác và điều này có ý nghĩa cho đến ngày nay”. ‘Số tiền khổng lồ được chi để cải thiện giáo dục ở các nước đang phát triển, nhưng khoản chi này có thể không mang lại tăng trưởng kinh tế nếu các hạn chế cản trở người dân – đặc biệt là phụ nữ và người nghèo – sử dụng giáo dục của họ theo những cách hiệu quả về mặt kinh tế. \\u003c/span>\\u003cspan id=\\\"p5s5\\\" class=\\\"vi-sent\\\">Ví dụ, nếu các thể chế kinh tế được thiết lập kém thì giáo dục không thể dẫn đến tăng trưởng.” \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":14,\"type\":\"mif\",\"text\":\"an explanation of the need for research to focus on individuals with a fairly consistent income\",\"options\":[],\"correctAnswer\":\"E\",\"location\":\"\",\"_orderId\":14,\"mifTargets\":[\"E\",\"A\",\"D\",\"F\",\"C\"]},{\"id\":15,\"type\":\"mif\",\"text\":\"examples of the sources the database has been compiled from\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"_orderId\":15,\"mifTargets\":[\"E\",\"A\",\"D\",\"F\",\"C\"]},{\"id\":16,\"type\":\"mif\",\"text\":\"an account of one individual’s refusal to obey an order\",\"options\":[],\"correctAnswer\":\"D\",\"location\":\"\",\"_orderId\":16,\"mifTargets\":[\"E\",\"A\",\"D\",\"F\",\"C\"]},{\"id\":17,\"type\":\"mif\",\"text\":\"a reference to a region being particularly suited to research into the link between education and economic growth\",\"options\":[],\"correctAnswer\":\"F\",\"location\":\"\",\"_orderId\":17,\"mifTargets\":[\"E\",\"A\",\"D\",\"F\",\"C\"]},{\"id\":18,\"type\":\"mif\",\"text\":\"examples of the items included in a list of personal possessions\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"_orderId\":18,\"mifTargets\":[\"E\",\"A\",\"D\",\"F\",\"C\"]},{\"type\":\"gap-fill-block\",\"id\":19,\"text\":\"Choose \\u003cb>ONE WORD\\u003c/b> from the passage for each answer.\\nWrite your answers in boxes 19-22 on your answer sheet.\\nDemographic reconstruction of two German communities\\nThe database that Ogilvie and her team has compiled sheds light on the lives of a range of individuals, as well as those of their 19 …………………, over a 300-year period. For example, Ana Regina and Magdalena Riethmüllerin were reprimanded for reading while they should have been paying attention to a 20 ………………… .\\nThere was also Juliana Schweickherdt, who came to the notice of the weavers’ guild in the year 1752 for breaking guild rules. As a punishment, she was later given a 21 ………………… . Cases like this illustrate how the guilds could prevent 22 ………………… and stop skilled people from working\",\"gapIds\":[19,20,21,22],\"answers\":{\"19\":\"descendants\",\"20\":\"sermon\",\"21\":\"fine\",\"22\":\"innovation\"},\"locations\":{\"19\":\"Ogilvie and her team have been building\",\"20\":\"who were chastised in 1707\",\"21\":\"Juliana continued taking jobs\",\"22\":\"dominance of guilds not only prevented\"},\"_orderId\":19}],\"vocab\":[],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABCDEF\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[],\"pData\":[{\"en\":[\"Over the last decade, a huge database about the lives of southwest German villagers between 1600 and 1900 has been compiled by a team led by Professor Sheilagh Ogilvie at Cambridge University’s Faculty of Economics.\",\"It includes court records, guild ledgers, parish registers, village censuses, tax lists and – the most recent addition – 9,000 handwritten inventories listing over a million personal possessions belonging to ordinary women and men across three centuries.\",\"Ogilvie, who discovered the inventories in the archives of two German communities 30 years ago, believes they may hold the answer to a conundrum that has long puzzled economists: the lack of evidence for a causal link between education and a country’s economic growth.\"],\"vi\":[\"Trong thập kỷ qua, một cơ sở dữ liệu khổng lồ về cuộc sống của dân làng Tây Nam nước Đức từ năm 1600 đến năm 1900 đã được biên soạn bởi một nhóm do Giáo sư Sheilagh Ogilvie tại Khoa Kinh tế của Đại học Cambridge dẫn đầu.\",\"Nó bao gồm hồ sơ tòa án, sổ cái của hội, sổ đăng ký giáo xứ, điều tra dân số của làng, danh sách thuế và – bản bổ sung gần đây nhất – 9.000 bản kiểm kê viết tay liệt kê hơn một triệu tài sản cá nhân thuộc về phụ nữ và nam giới bình thường trong suốt ba thế kỷ.\",\"Ogilvie, người đã phát hiện ra các kho lưu trữ trong kho lưu trữ của hai cộng đồng người Đức cách đây 30 năm, tin rằng chúng có thể là câu trả lời cho một câu hỏi hóc búa mà từ lâu đã khiến các nhà kinh tế bối rối: việc thiếu bằng chứng cho mối liên hệ nhân quả giữa giáo dục và tăng trưởng kinh tế của một quốc gia.\"]},{\"en\":[\"As Ogilvie explains, ‘Education helps us to work more productively, invent better technology, and earn more … surely it must be critical for economic growth?\",\"But, if you look back through history, there’s no evidence that having a high literacy rate made a country industrialise earlier.’ Between 1600 and 1900, England had only mediocre literacy rates by European standards, yet its economy grew fast and it was the first country to industrialise.\",\"During this period, Germany and Scandinavia had excellent literacy rates, but their economies grew slowly and they industrialised late. ‘Modern cross-country analyses have also struggled to find evidence that education causes economic growth, even though there is plenty of evidence that growth increases education,’ she adds.\"],\"vi\":[\"Như Ogilvie giải thích, ‘Giáo dục giúp chúng ta làm việc hiệu quả hơn, phát minh ra công nghệ tốt hơn và kiếm được nhiều tiền hơn… chắc chắn nó phải rất quan trọng đối với tăng trưởng kinh tế?\",\"Tuy nhiên, nếu bạn nhìn lại lịch sử, không có bằng chứng nào cho thấy tỷ lệ biết đọc biết viết cao khiến một quốc gia công nghiệp hóa sớm hơn.’ Từ năm 1600 đến năm 1900, nước Anh chỉ có tỷ lệ biết chữ ở mức trung bình theo tiêu chuẩn châu Âu, tuy nhiên nền kinh tế nước này vẫn tăng trưởng nhanh và là quốc gia đầu tiên công nghiệp hóa.\",\"Trong thời kỳ này, Đức và Scandinavia có tỷ lệ biết chữ cao, nhưng nền kinh tế của họ tăng trưởng chậm và công nghiệp hóa muộn. Bà nói thêm: “Các phân tích xuyên quốc gia hiện đại cũng gặp khó khăn trong việc tìm ra bằng chứng cho thấy giáo dục gây ra tăng trưởng kinh tế, mặc dù có rất nhiều bằng chứng cho thấy tăng trưởng sẽ thúc đẩy giáo dục”.\"]},{\"en\":[\"In the handwritten inventories that Ogilvie is analysing are the belongings of women and men at marriage, remarriage and death.\",\"From badger skins to Bibles, sewing machines to scarlet bodices – the villagers’ entire worldly goods are included.\",\"Inventories of agricultural equipment and craft tools reveal economic activities; ownership of books and education-related objects like pens and slates suggests how people learned.\",\"In addition, the tax lists included in the database record the value of farms, workshops, assets and debts; signatures and people’s estimates of their age indicate literacy and numeracy levels; and court records reveal obstacles (such as the activities of the guilds*) that stifled industry.\",\"Previous studies usually had just one way of linking education with economic growth – the presence of schools and printing presses, perhaps, or school enrolment, or the ability to sign names.\",\"According to Ogilvie, the database provides multiple indicators for the same individuals, making it possible to analyse links between literacy, numeracy, wealth, and industriousness, for individual women and men over the long term.\"],\"vi\":[\"Trong bản kiểm kê viết tay mà Ogilvie đang phân tích là đồ đạc của phụ nữ và đàn ông khi kết hôn, tái hôn và qua đời.\",\"Từ da lửng đến Kinh thánh, máy khâu cho đến áo lót màu đỏ tươi - bao gồm toàn bộ hàng hóa trần thế của dân làng.\",\"Tồn kho thiết bị nông nghiệp, dụng cụ thủ công phản ánh hoạt động kinh tế; quyền sở hữu sách và các đồ vật liên quan đến giáo dục như bút và bảng cho thấy con người học tập như thế nào.\",\"Ngoài ra, danh mục thuế có trong cơ sở dữ liệu ghi nhận giá trị trang trại, nhà xưởng, tài sản và các khoản nợ; chữ ký và ước tính của mọi người về độ tuổi của họ cho thấy trình độ đọc viết và tính toán; và hồ sơ tòa án tiết lộ những trở ngại (chẳng hạn như hoạt động của các bang hội*) đã bóp nghẹt ngành công nghiệp.\",\"Các nghiên cứu trước đây thường chỉ có một cách liên kết giáo dục với tăng trưởng kinh tế – có lẽ là sự hiện diện của trường học và nhà in, hoặc số lượng tuyển sinh vào trường, hoặc khả năng ký tên.\",\"Theo Ogilvie, cơ sở dữ liệu cung cấp nhiều chỉ số cho cùng một cá nhân, giúp phân tích mối liên hệ giữa khả năng đọc viết, tính toán, sự giàu có và sự cần cù của từng cá nhân phụ nữ và nam giới trong thời gian dài.\"]},{\"en\":[\"Ogilvie and her team have been building the vast database of material possessions on top of their full demographic reconstruction of the people who lived in these two German communities. ‘We can follow the same people – and their descendants – across 300 years of educational and economic change,’ she says.\",\"Individual lives have unfolded before their eyes.\",\"Stories like that of the 24-year-olds Ana Regina and Magdalena Riethmüllerin, who were chastised in 1707 for reading books in church instead of listening to the sermon. ‘This tells us they were continuing to develop their reading skills at least a decade after leaving school,’ explains Ogilvie.\",\"The database also reveals the case of Juliana Schweickherdt, a 50-year-old spinster living in the small Black Forest community of Wildberg, who was reprimanded in 1752 by the local weavers’ guild for ‘weaving cloth and combing wool, counter to the guide ordinance’.\",\"When Juliana continued taking jobs reserved for male guild members, she was summoned before the guild court and told to pay a fine equivalent to one third of a servant’s annual wage.\",\"It was a small act of defiance by today’s standards, but it reflects a time when laws in Germany and elsewhere regulated people’s access to labour markets.\",\"The dominance of guilds not only prevented people from using their skills, but also held back even the simplest industrial innovation.\"],\"vi\":[\"Ogilvie và nhóm của cô ấy đã và đang xây dựng cơ sở dữ liệu khổng lồ về tài sản vật chất dựa trên việc tái thiết toàn bộ nhân khẩu học của họ về những người sống ở hai cộng đồng người Đức này. Cô nói: “Chúng ta có thể theo dõi những người giống nhau - và con cháu của họ - trong suốt 300 năm thay đổi về giáo dục và kinh tế”.\",\"Cuộc sống cá nhân đã mở ra trước mắt họ.\",\"Những câu chuyện như câu chuyện của Ana Regina và Magdalena Riethmüllerin, 24 tuổi, bị trừng phạt vào năm 1707 vì đọc sách trong nhà thờ thay vì nghe thuyết pháp. Ogilvie giải thích: “Điều này cho chúng tôi biết rằng họ đang tiếp tục phát triển kỹ năng đọc của mình ít nhất một thập kỷ sau khi rời ghế nhà trường”.\",\"Cơ sở dữ liệu cũng tiết lộ trường hợp của Juliana Schweickherdt, một phụ nữ độc thân 50 tuổi sống trong cộng đồng Wildberg nhỏ thuộc Rừng Đen, người đã bị hội thợ dệt địa phương khiển trách vào năm 1752 vì 'dệt vải và chải len, đi ngược lại sắc lệnh hướng dẫn'.\",\"Khi Juliana tiếp tục nhận những công việc dành riêng cho các thành viên nam của bang hội, cô đã bị triệu tập trước tòa án bang hội và yêu cầu phải nộp phạt tương đương 1/3 mức lương hàng năm của người hầu.\",\"Đó là một hành động thách thức nhỏ so với các tiêu chuẩn ngày nay, nhưng nó phản ánh thời kỳ mà luật pháp ở Đức và các nơi khác quy định việc tiếp cận thị trường lao động của người dân.\",\"Sự thống trị của các bang hội không chỉ ngăn cản mọi người sử dụng kỹ năng của họ mà còn cản trở ngay cả sự đổi mới công nghiệp đơn giản nhất.\"]},{\"en\":[\"The data-gathering phase of the project has been completed and now, according to Ogilvie, it is time ‘to ask the big questions’.\",\"One way to look at whether education causes economic growth is to ‘hold wealth constant’.\",\"This involves following the lives of different people with the same level of wealth over a period of time.\",\"If wealth is constant, it is possible to discover whether education was, for example, linked to the cultivation of new crops, or to the adoption of industrial innovations like sewing machines.\",\"The team will also ask what aspect of education helped people engage more with productive and innovative activities.\",\"Was it, for instance, literacy, numeracy, book ownership, years of schooling?\",\"Was there a threshold level – a tipping point – that needed to be reached to affect economic performance?\"],\"vi\":[\"Giai đoạn thu thập dữ liệu của dự án đã hoàn thành và bây giờ, theo Ogilvie, đã đến lúc “đặt những câu hỏi lớn”.\",\"Một cách để xem liệu giáo dục có tác động đến tăng trưởng kinh tế hay không là “giữ sự giàu có không đổi”.\",\"Điều này liên quan đến việc theo dõi cuộc sống của những người khác nhau với cùng mức độ giàu có trong một khoảng thời gian.\",\"Nếu sự giàu có là không đổi, thì có thể khám phá xem liệu giáo dục có liên quan đến việc trồng các loại cây trồng mới hay với việc áp dụng các cải tiến công nghiệp như máy may hay không.\",\"Nhóm cũng sẽ hỏi khía cạnh nào của giáo dục đã giúp mọi người tham gia nhiều hơn vào các hoạt động hiệu quả và đổi mới.\",\"Chẳng hạn, đó có phải là khả năng đọc viết, tính toán, quyền sở hữu sách, số năm đi học không?\",\"Có một ngưỡng nào đó – một điểm tới hạn – cần đạt tới để tác động đến hiệu quả kinh tế không?\"]},{\"en\":[\"Ogilvie hopes to start finding answers to these questions over the next few years.\",\"One thing is already clear, she says: the relationship between education and economic growth is far from straightforward. ‘German-speaking central Europe is an excellent laboratory for testing theories of economic growth,’ she explains.\",\"Between 1600 and 1900, literacy rates and book ownership were high and yet the region remained poor.\",\"It was also the case that local guilds and merchant associations were extremely powerful and legislated against anything that undermined their monopolies.\",\"In villages throughout the region, guilds blocked labour migration and resisted changes that might reduce their influence. ‘Early findings suggest that the potential benefits of education for the economy can be held back by other barriers, and this has implications for today,’ says Ogilvie. ‘Huge amounts are spent improving education in developing countries, but this spending can fail to deliver economic growth if restrictions block people – especially women and the poor – from using their education in economically productive ways.\",\"If economic institutions are poorly set up, for instance, education can’t lead to growth.’\"],\"vi\":[\"Ogilvie hy vọng sẽ bắt đầu tìm ra câu trả lời cho những câu hỏi này trong vài năm tới.\",\"Bà nói có một điều đã rõ ràng: mối quan hệ giữa giáo dục và tăng trưởng kinh tế không hề đơn giản. Bà giải thích: “Trung Âu nói tiếng Đức là một phòng thí nghiệm tuyệt vời để kiểm tra các lý thuyết về tăng trưởng kinh tế”.\",\"Từ năm 1600 đến năm 1900, tỷ lệ biết chữ và sở hữu sách rất cao nhưng khu vực này vẫn còn nghèo.\",\"Đó cũng là trường hợp các hiệp hội và hiệp hội thương gia địa phương cực kỳ mạnh mẽ và có luật chống lại bất cứ điều gì làm suy yếu sự độc quyền của họ.\",\"Tại các ngôi làng khắp vùng, các phường hội ngăn chặn sự di cư của lao động và chống lại những thay đổi có thể làm giảm ảnh hưởng của họ. Ogilvie nói: “Những phát hiện ban đầu cho thấy những lợi ích tiềm năng của giáo dục đối với nền kinh tế có thể bị cản trở bởi các rào cản khác và điều này có ý nghĩa cho đến ngày nay”. ‘Số tiền khổng lồ được chi để cải thiện giáo dục ở các nước đang phát triển, nhưng khoản chi này có thể không mang lại tăng trưởng kinh tế nếu các hạn chế cản trở người dân – đặc biệt là phụ nữ và người nghèo – sử dụng giáo dục của họ theo những cách hiệu quả về mặt kinh tế.\",\"Ví dụ, nếu các thể chế kinh tế được thiết lập kém thì giáo dục không thể dẫn đến tăng trưởng.”\"]}],\"timeLimit\":20}];\n\nlet currentLessonIndex = 0;\nlet qs, vocab, headings, headingKey, mifRange, removeOpt, removeFeatureOpt, pairs, pData;\n\nlet timeLeft = 0;\nlet timerInterval;\nconst timerEl = document.getElementById('timer');\n\nfunction startTimer() {\n    timerInterval = setInterval(() => {\n        if(timeLeft <= 0) {\n            clearInterval(timerInterval);\n            timerEl.innerText = \"00:00\";\n            alert(\"Time is up!\");\n            return;\n        }\n        timeLeft--;\n        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');\n        const s = (timeLeft % 60).toString().padStart(2, '0');\n        timerEl.innerText = `${m}:${s}`;\n    }, 1000);\n}\n\nfunction switchLesson(idx) {\n    currentLessonIndex = parseInt(idx);\n    const l = lessonsData[currentLessonIndex];\n    qs = l.qs; vocab = l.vocab; headings = l.headings; headingKey = l.headingKey;\n    mifRange = l.mifRange; removeOpt = l.removeOpt; removeFeatureOpt = l.removeFeatureOpt;\n    pairs = l.pairs; pData = l.pData;\n\n    // Reset UI\n    document.getElementById('articleArea').innerHTML = l.articleHtml;\n    document.getElementById('headingsArea').innerHTML = l.headingsHtml;\n    document.getElementById('qs').innerHTML = '';\n    document.getElementById('progressBar').innerHTML = '';\n    document.getElementById('saveBtn').style.display = 'none';\n    \n    // Reset Timer\n    clearInterval(timerInterval);\n    timeLeft = l.timeLimit * 60;\n    timerEl.innerText = \"--:--\";\n    startTimer();\n\n    // Render Questions & Attach Events\n    renderStudentQuestions();\n    attachEvents();\n\n    // Manage Views\n    if(document.getElementById('game-view').style.display === 'block') initGame();\n    if(document.getElementById('mif-view').style.display === 'flex') {\n        document.getElementById('mif-view').style.display = 'none';\n    }\n}\n\n// --- RENDERING QUESTIONS ---\nfunction renderStudentQuestions() {\n    const qDiv=document.getElementById('qs');\n    qDiv.innerHTML = '';\n    \n    qs.forEach(q=>{\n      if(q.type==='text-only'){ qDiv.innerHTML+=`<div class=\"text-only\">${q.text}</div>`; }\n      else if(q.type==='summary') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>');\n          q.gapIds.forEach(gid => {\n              const isFeat = q.isFeature ? 'true' : 'false';\n              const dz = `<span class=\"drop-zone\" id=\"dz-${gid}\" data-gid=\"${gid}\" data-isfeat=\"${isFeat}\" ondragover=\"allowDrop(event)\" ondrop=\"drop(event)\" onclick=\"clearDrop(${gid})\"></span><span class=\"q-num\" style=\"vertical-align:super;font-size:10px\">${gid}</span>&nbsp;`;\n              let replaced = txt.replace(new RegExp(`${gid}\\\\s*([._…-]{2,}|_{2,}|…+)`), dz);\n              if(replaced === txt) replaced = txt.replace(new RegExp(`${gid}[.]\\\\s+`), dz + ' ');\n              txt = replaced;\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2;font-size:15px\">${txt}</div><div style=\"margin-top:15px;display:flex;flex-wrap:wrap;gap:8px;padding-top:10px;border-top:1px dashed #e2e8f0\">`;\n          q.options.forEach(optLine => {\n              const m = optLine.match(/^([A-Z])\\s*[.)]?\\s*(.+)/);\n              if(m) h += `<div class=\"heading-item\" id=\"opt-${q.id}-${m[1]}\" style=\"display:inline-flex;width:auto;margin:0\" draggable=\"true\" ondragstart=\"drag(event)\" data-val=\"${m[1]}\"><span style=\"font-weight:bold;color:#2563eb\">${m[1]}</span> ${m[2]}</div>`;\n          });\n          h += `</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      } \n      else if(q.type==='gap-fill-block') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>'); \n          q.gapIds.forEach(gid => {\n              const loc = (q.locations && q.locations[gid]) ? q.locations[gid] : \"\";\n              const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${gid})\">📍</button>` : \"\";\n              const inp = `<span class=\"q-num\">${gid}</span><input type=\"text\" class=\"gap-input\" data-gid=\"${gid}\" oninput=\"upd(${gid})\">${locBtn}&nbsp;`;\t\n              txt = txt.replace(new RegExp(`${gid}[\\\\s:.)]*(?:[_….\\\\-]\\\\s*){2,}`), inp);\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2.2;font-size:16px\">${txt}</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      }\n      else if(q.type==='mcq-multi') {\n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          const locBtn1 = (q.locations && q.locations[q.gapIds[0]]) ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${q.gapIds[0]})\">📍</button>` : \"\";\n          h += `<div style=\"display:flex;align-items:baseline;margin-bottom:8px;\"><span class=\"q-num\">${q.gapIds[0]}-${q.gapIds[q.gapIds.length-1]}</span> <span>${q.text}</span> ${locBtn1}</div>`;\n          q.options.forEach((o, i) => {\n              const optLetterMatch = o.match(/^([A-Z])/i);\n              const optLetter = optLetterMatch ? optLetterMatch[1].toUpperCase() : o.trim()[0].toUpperCase();\n              h += `<label style=\"display:block;margin:5px 0;cursor:pointer;transition:all 0.2s;\">\n                      <input type=\"checkbox\" name=\"mcq_${q.id}\" value=\"${optLetter}\" onchange=\"updMcqMulti(${q.id}, '${q.gapIds.join(',')}', event)\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span>\n                    </label>`;\n          });\n          h += `<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n          q.gapIds.forEach(gid => {\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n      }\n      else { \n        let h=`<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n        const loc = q.location || \"\";\n        const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id})\">📍</button>` : \"\";\n        \n        if(q.type==='gap-fill'){\n           let t=q.text.replace(/(\\d+)[\\s:.)]*(?:[_….\\-]\\s*){2,}/g, '<span class=\"q-num\">$1</span><input type=\"text\" class=\"gap-input\" data-id=\"'+q.id+'\" oninput=\"upd('+q.id+')\">'+locBtn+'&nbsp;');\n           h+=`<div>${t}</div>`;\n        } else {\n           h+=`<div style=\"display:flex;align-items:baseline\"><span class=\"q-num\">${q.id}.</span> <span>${q.text}</span> ${locBtn}</div>`;\n           if(q.type==='mcq') q.options.forEach((o, i) => { h += `<label class=\"mcq-label\" style=\"display:block;margin:5px 0;cursor:pointer\"><input type=\"radio\" name=\"q${q.id}\" value=\"${o.trim()[0]}\" onchange=\"upd(${q.id})\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span></label>`; });\n           if(q.type==='tfng') {\n               h+='<div class=\"tfng-container\">';\n               ['TRUE', 'FALSE', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"tfng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='ynng') {\n               h+='<div class=\"tfng-container\">';\n               ['YES', 'NO', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"ynng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='mif') {\n               h+='<div class=\"mif-container\">';\n               mifRange.split('').forEach(char => {\n                   h+=`<label class=\"mif-label\"><input type=\"radio\" name=\"mif${q.id}\" value=\"${char}\" onchange=\"upd(${q.id})\"><span class=\"mif-circle\">${char}</span></label>`;\n               });\n               h+='</div>';\n           }\n        }\n        h+=`<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n        qDiv.innerHTML+=h;\n        const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+q.id; d.innerText=q.id;\n        d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n        document.getElementById('progressBar').appendChild(d);\n      }\n    });\n\n    document.querySelectorAll('input[type=\"radio\"][name^=\"mif\"]').forEach(radio => {\n        radio.addEventListener('change', (e) => {\n            const qId = radio.name.replace('mif', '');\n            const pChar = radio.value;\n            document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(btn => {\n                const btnPara = btn.closest('.mif-inline-box').dataset.para;\n                if(btnPara === pChar) {\n                    btn.classList.remove('hidden-by-other');\n                    btn.classList.add('selected');\n                } else {\n                    btn.classList.remove('selected');\n                    btn.classList.add('hidden-by-other');\n                }\n            });\n        });\n    });\n}\n\nfunction attachEvents() {\n    const pp = document.getElementById('popup');\n    document.querySelectorAll('.vocab').forEach(s => {\n      s.onclick = e => {\n        const v = vocab.find(x => x.id === s.dataset.vid); if(!v) return;\n        pp.innerHTML = `<div style=\"background:#1e293b;color:#fff;padding:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center\"><span>${v.word}</span><span onclick=\"speak('${v.word}')\" style=\"cursor:pointer;background:#334155;padding:4px;border-radius:50%\">🔊</span></div><div style=\"padding:16px;font-size:14px;color:#334155\"><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Meaning:</b> ${v.meaning}</p><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Synonyms:</b> ${v.synonym}</p><div style=\"background:#f1f5f9;padding:8px;border-radius:6px;margin-top:8px;color:#475569;font-style:italic\">\"${v.example}\"</div></div>`;\n        pp.style.display = 'block'; pp.style.top = (e.clientY+10) + 'px'; pp.style.left = Math.min(e.clientX, window.innerWidth-330) + 'px';\n        e.stopPropagation();\n      }\n    });\n\n    document.querySelectorAll('.sent').forEach(el => {\n        el.addEventListener('mouseenter', () => {\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\n            if(t) t.style.backgroundColor = '#fef08a'; \n        });\n        el.addEventListener('mouseleave', () => {\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\n            if(t) t.style.backgroundColor = 'transparent';\n        });\n    });\n}\n\nfunction allowDrop(ev) { ev.preventDefault(); }\nfunction drag(ev) { \n    const el = ev.target.closest('[draggable=\"true\"]') || ev.target;\n    const val = el.dataset.val || el.innerText.split('.')[0].trim();\n    ev.dataTransfer.setData(\"text\", val); \n    ev.dataTransfer.setData(\"srcId\", el.id); \n}\nfunction dragHeading(ev) { \n    const el = ev.target.closest('.heading-item');\n    ev.dataTransfer.setData(\"hid\", el.dataset.hid); \n    ev.dataTransfer.setData(\"srcId\", el.id); \n}\nfunction drop(ev) {\n    ev.preventDefault();\n    const zone = ev.target.closest('.drop-zone');\n    if(!zone) return;\n    \n    const type = zone.dataset.type;\n    if (type === 'heading') {\n        const hid = ev.dataTransfer.getData(\"hid\");\n        if(!hid) return; \n        zone.innerHTML = hid.toUpperCase(); \n        zone.dataset.val = hid; \n        zone.classList.add('filled');\n        \n        const srcId = ev.dataTransfer.getData(\"srcId\");\n        document.getElementById(srcId).classList.add('used');\n        if(zone.dataset.prevSrc && zone.dataset.prevSrc !== srcId) document.getElementById(zone.dataset.prevSrc).classList.remove('used');\n        zone.dataset.prevSrc = srcId;\n        return;\n    }\n    const val = ev.dataTransfer.getData(\"text\");\n    if(val) {\n        zone.innerText = val; \n        zone.classList.add('filled');\n        const gid = zone.dataset.gid;\n        document.getElementById('prog-'+gid).classList.add('filled');\n        \n        const isFeat = zone.dataset.isfeat === 'true';\n        const doRemove = isFeat ? removeFeatureOpt : removeOpt;\n        \n        if(doRemove) {\n            const srcId = ev.dataTransfer.getData(\"srcId\");\n            if(srcId) {\n                const srcEl = document.getElementById(srcId);\n                if(srcEl) srcEl.classList.add('used');\n                if(zone.dataset.prevSrc && zone.dataset.prevSrc !== srcId) {\n                    const prevEl = document.getElementById(zone.dataset.prevSrc);\n                    if(prevEl) prevEl.classList.remove('used');\n                }\n                zone.dataset.prevSrc = srcId;\n            }\n        }\n    }\n}\n\nfunction clearHeading(idx) {\n    const el = document.querySelector(`.heading-drop[data-para=\"${idx}\"]`);\n    if(el.dataset.prevSrc) document.getElementById(el.dataset.prevSrc).classList.remove('used');\n    el.innerHTML = '<span class=\"placeholder\">Drop Heading Here</span>'; el.classList.remove('filled'); delete el.dataset.val;\n}\nfunction clearDrop(gid) {\n    const el = document.getElementById('dz-'+gid);\n    const isFeat = el.dataset.isfeat === 'true';\n    const doRemove = isFeat ? removeFeatureOpt : removeOpt;\n    \n    if(doRemove && el.dataset.prevSrc) {\n        const prevEl = document.getElementById(el.dataset.prevSrc);\n        if(prevEl) prevEl.classList.remove('used');\n        delete el.dataset.prevSrc;\n    }\n    \n    el.innerText=''; el.classList.remove('filled'); document.getElementById('prog-'+gid).classList.remove('filled');\n}\n\nconst hlToolbar = document.getElementById('hl-toolbar');\nlet currentRange = gle('flipped'); this.setAttribute('aria-pressed', this.classList.contains('flipped')); });\ndocument.getElementById('autoPlay').addEventListener('click', (e) => {\n  if(flashAuto){ clearInterval(flashAuto); flashAuto = null; e.target.textContent = 'Auto'; }\n  else { flashAuto = setInterval(()=>{ flashIndex = (flashIndex+1)%pairs.length; renderFlash(); }, 2000); e.target.textContent = 'Stop'; }\n});\ndocument.getElementById('showBoth').addEventListener('click', () => { const f = document.getElementById('flashcard'); f.classList.add('flipped'); setTimeout(()=> f.classList.remove('flipped'), 1600); });\n\nfunction renderFillList(){\n  const fillListEl = document.getElementById('fillList'); const fillScoreEl = document.getElementById('fillScore');\n  fillListEl.innerHTML = '';\n  pairs.forEach((p, idx) => {\n    const row = document.createElement('div'); row.className = 'fill-row';\n    row.innerHTML = `<div class=\"vie\">${p.vie}</div><input type=\"text\" data-index=\"${idx}\" placeholder=\"Nhập tiếng Anh...\" /><div class=\"small\" style=\"min-width:120px\" id=\"hint-${idx}\"></div>`;\n    fillListEl.appendChild(row);\n    const input = row.querySelector('input'); input.addEventListener('focus', () => input.classList.remove('wrong')); input.addEventListener('blur', () => {});\n  });\n  fillScoreEl.textContent = `Điểm: 0 / ${pairs.length}`;\n}\n\ndocument.getElementById('checkFill').addEventListener('click', () => {\n  const fillListEl = document.getElementById('fillList'); let correct = 0;\n  pairs.forEach((p, idx) => {\n    const input = fillListEl.querySelector(`input[data-index=\"${idx}\"]`); const hint = document.getElementById(`hint-${idx}`);\n    const val = (input.value || '').trim().toLowerCase(); const target = p.eng.trim().toLowerCase();\n    if(val === target){\n      correct++; input.classList.add('correct'); input.classList.remove('wrong'); input.style.borderColor = 'rgba(16,185,129,0.9)'; hint.innerHTML = `<span class=\"correct-answer\">Đúng</span>`;\n     const select = document.getElementById('selectBai');
    const openBtn = document.getElementById('openBtn');
    const clearBtn = document.getElementById('clearBtn');
    const frame = document.getElementById('frame');
    const controlsBar = document.getElementById('controlsBar');

    // populate select
    items.forEach((it, idx) => {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = it.name || it.filename || ('Bài ' + (idx+1));
      select.appendChild(opt);
    });

    function enterFullscreenMode() {
      // hide controls and expand iframe
      controlsBar.classList.add('hidden');
      frame.classList.add('fullscreen-frame');

      // create close button if chưa có
      if (!document.getElementById('closeFullscreen')) {
        const btn = document.createElement('button');
        btn.id = 'closeFullscreen';
        btn.textContent = 'Đóng toàn màn hình';
        btn.onclick = exitFullscreenMode;
        document.body.appendChild(btn);
      }
    }

    function exitFullscreenMode() {
      // restore controls and iframe
      controlsBar.classList.remove('hidden');
      frame.classList.remove('fullscreen-frame');
      const btn = document.getElementById('closeFullscreen');
      if (btn) btn.remove();
    }

    openBtn.onclick = () => {
      const v = select.value;
      if (v === '') {
        alert('Vui lòng chọn một bài.');
        return;
      }
      const it = items[+v];
      frame.srcdoc = it.content;

      // vào chế độ toàn màn hình
      enterFullscreenMode();
    };

    clearBtn.onclick = () => {
      select.value = '';
      frame.srcdoc = '<p>Chưa chọn bài</p>';
    };

    // allow Enter key to open when select focused
    select.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') openBtn.click();
    });

    // Escape để thoát toàn màn hình
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        exitFullscreenMode();
      }
