ont-weight:700; color:#334155; margin-bottom:15px\">Questions</h2><div id=\"headingsArea\"></div><div id=\"qs\"></div></div>\n</div>\n\n<div id=\"game-view\">\n  <div class=\"g-container\">\n    <header class=\"g-header\">\n      <h1 class=\"g-h1\">Vocabulary Matching Game</h1>\n      <div class=\"g-controls\">\n        <div class=\"g-badge\" id=\"score\">Đúng: 0 / 0</div>\n        <button class=\"g-btn\" id=\"shuffleBtn\">Trộn</button>\n        <button class=\"g-btn\" id=\"resetBtn\">Làm lại</button>\n        <button class=\"g-btn\" style=\"background:linear-gradient(90deg,#ef4444,#dc2626);color:#fff\" onclick=\"toggleGame()\">Close Game</button>\n      </div>\n    </header>\n\n    <section class=\"g-card\" style=\"margin-bottom:12px;\">\n      <h3 style=\"margin-top:0; color:var(--accent)\">Flashcards Ôn Tập</h3>\n      <div style=\"display:flex; gap:12px; align-items:center; flex-wrap:wrap;\">\n        <div class=\"flash-wrap\">\n          <div id=\"flashcard\" class=\"flashcard\" tabindex=\"0\" role=\"button\" aria-pressed=\"false\">\n            <div class=\"flash-face front\" id=\"flashFront\">Nhấn Next để bắt đầu</div>\n            <div class=\"flash-face back\" id=\"flashBack\">Back</div>\n          </div>\n        </div>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"display:flex; gap:8px;\">\n            <button class=\"g-btn\" id=\"prevCard\">Prev</button>\n            <button class=\"g-btn\" id=\"flipCard\">Flip</button>\n            <button class=\"g-btn\" id=\"nextCard\">Next</button>\n          </div>\n          <div style=\"display:flex; gap:8px;\">\n            <button class=\"g-btn\" id=\"autoPlay\">Auto</button>\n            <button class=\"g-btn\" id=\"showBoth\">Show Both</button>\n          </div>\n        </div>\n      </div>\n      <div class=\"small\" style=\"margin-top:8px; color:var(--muted); font-size:13px\">Nhấn flashcard để lật. Auto sẽ tự chuyển sau 2s. Show Both hiển thị cả 2 mặt tạm thời.</div>\n    </section>\n\n    <section class=\"g-layout\">\n      <div class=\"g-card\">\n        <h3 style=\"margin-top:0; color:var(--accent)\">Phần 1 Matching</h3>\n        <div class=\"small\" style=\"color:var(--muted); font-size:13px\">Kéo nghĩa vào ô tương ứng. Hoặc chạm để chọn rồi chạm vào ô.</div>\n        <div class=\"g-list\" id=\"engList\" style=\"margin-top:12px;\"></div>\n      </div>\n      <div class=\"g-card\">\n        <h3 style=\"margin-top:0; color:var(--accent)\">Phần 2 Vietnamese</h3>\n        <div class=\"g-vie-list\" id=\"vieList\" style=\"margin-top:12px;\"></div>\n      </div>\n    </section>\n\n    <section class=\"g-card\" style=\"margin-top:12px; margin-bottom: 50px;\">\n      <h3 style=\"margin-top:0; color:var(--accent)\">Bài Điền Chữ</h3>\n      <div class=\"small\" style=\"color:var(--muted); font-size:13px\">Bên trái là tiếng Việt, bên phải học sinh điền tiếng Anh. Nhấn Kiểm tra để chấm.</div>\n      <div style=\"margin-top:10px;\">\n        <div class=\"fill-list\" id=\"fillList\"></div>\n        <div style=\"margin-top:10px; display:flex; gap:8px; align-items:center;\">\n          <button class=\"g-btn\" id=\"checkFill\">Kiểm tra</button>\n          <button class=\"g-btn\" id=\"showAnswers\">Hiện đáp án</button>\n          <button class=\"g-btn\" id=\"resetFill\">Làm lại</button>\n          <div class=\"small\" id=\"fillScore\" style=\"align-self:center; color:var(--muted); font-size:13px\">Điểm: 0 / 0</div>\n        </div>\n      </div>\n    </section>\n  </div>\n</div>\n\n<div id=\"mif-view\">\n  <div class=\"mif-header\">\n    <h2 id=\"mif-title\" style=\"margin:0;color:#4338ca;font-size:18px\">Luyện Mif: Đoạn ...</h2>\n    <button class=\"mif-nav-btn\" style=\"background:#ef4444\" onclick=\"toggleMifMode()\">Đóng</button>\n  </div>\n  <div class=\"mif-body\">\n    <div class=\"mif-left\">\n      <div class=\"mif-col-container\">\n        <div class=\"mif-col\" id=\"mif-en-col\"></div>\n        <div class=\"mif-col\" id=\"mif-vi-col\"></div>\n      </div>\n    </div>\n    <div class=\"mif-right\">\n      <div id=\"mif-qs-container\" style=\"flex:1; overflow-y:auto; padding-bottom:20px;\"></div>\n      <div style=\"display:flex; justify-content:space-between; border-top:2px solid #cbd5e1; padding-top:15px; margin-top:10px;\">\n        <button class=\"mif-nav-btn\" id=\"mif-prev\" onclick=\"navMif(-1)\">⬅ Back</button>\n        <button class=\"mif-nav-btn\" id=\"mif-next\" onclick=\"navMif(1)\">Next ➡</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n<div id=\"popup\"></div>\n<div class=\"confetti\" id=\"confetti\"></div>\n\n<script>\n// --- MULTI-LESSON DATA INJECTION ---\nconst lessonsData = [{\"name\":\"Passage 1\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">The way we travel around cities has a major impact on whether they are \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v0\\\">sustainable\\u003c/span>. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">Transportation is estimated to account for 30% of energy consumption in most of the world’s most developed nations, so lowering the need for \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v1\\\">energy-using vehicles\\u003c/span> is essential for decreasing the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v2\\\">environmental impact\\u003c/span> of mobility. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">But as more and more people move to cities, it is important to think about other kinds of \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v0\\\">sustainable\\u003c/span> travel too. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">The ways we travel affect our physical and mental health, our social lives, our access to work and culture, and the air we breathe. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s4\\\">Engineers are tasked with changing how we travel round cities through urban design, but the engineering industry still works on the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v3\\\">assumptions\\u003c/span> that led to the creation of the energy-consuming transport systems we have now: the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v4\\\">emphasis\\u003c/span> placed solely on efficiency, speed, and quantitative data. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s5\\\">We need radical changes, to make it healthier, more enjoyable, and less environmentally damaging to travel around cities. \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"A\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"1\\\" onclick=\\\"toggleInlineMif(1, 'A')\\\">\\u003cspan class=\\\"q-num-s\\\">1.\\u003c/span> \\u003cspan>reference to an appealing way of using dance that the writer is not proposing\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"2\\\" onclick=\\\"toggleInlineMif(2, 'A')\\\">\\u003cspan class=\\\"q-num-s\\\">2.\\u003c/span> \\u003cspan>an example of a contrast between past and present approaches to building\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"3\\\" onclick=\\\"toggleInlineMif(3, 'A')\\\">\\u003cspan class=\\\"q-num-s\\\">3.\\u003c/span> \\u003cspan>mention of an objective of both dance and engineering\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"4\\\" onclick=\\\"toggleInlineMif(4, 'A')\\\">\\u003cspan class=\\\"q-num-s\\\">4.\\u003c/span> \\u003cspan>reference to an unforeseen problem arising from ignoring the climate\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"5\\\" onclick=\\\"toggleInlineMif(5, 'A')\\\">\\u003cspan class=\\\"q-num-s\\\">5.\\u003c/span> \\u003cspan>why some measures intended to help people are being reversed\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"6\\\" onclick=\\\"toggleInlineMif(6, 'A')\\\">\\u003cspan class=\\\"q-num-s\\\">6.\\u003c/span> \\u003cspan>reference to how transport has an impact on human lives\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Cách chúng ta di chuyển quanh các thành phố có tác động lớn đến việc liệu chúng có bền vững hay không. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Giao thông vận tải được ước tính chiếm 30% mức tiêu thụ năng lượng ở hầu hết các quốc gia phát triển nhất thế giới, do đó việc giảm nhu cầu sử dụng các phương tiện sử dụng năng lượng là điều cần thiết để giảm tác động môi trường của việc di chuyển. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Nhưng khi ngày càng có nhiều người chuyển đến các thành phố, điều quan trọng là phải nghĩ đến các loại hình du lịch bền vững khác. \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Cách chúng ta đi du lịch ảnh hưởng đến sức khỏe thể chất và tinh thần, đời sống xã hội, khả năng tiếp cận công việc và văn hóa cũng như không khí chúng ta hít thở. \\u003c/span>\\u003cspan id=\\\"p0s4\\\" class=\\\"vi-sent\\\">Các kỹ sư được giao nhiệm vụ thay đổi cách chúng ta di chuyển quanh các thành phố thông qua thiết kế đô thị, nhưng ngành kỹ thuật vẫn làm việc dựa trên các giả định dẫn đến việc tạo ra các hệ thống giao thông tiêu thụ năng lượng mà chúng ta hiện có: chỉ nhấn mạnh vào hiệu quả, tốc độ và dữ liệu định lượng. \\u003c/span>\\u003cspan id=\\\"p0s5\\\" class=\\\"vi-sent\\\">Chúng ta cần những thay đổi căn bản để làm cho việc đi lại quanh các thành phố trở nên lành mạnh hơn, thú vị hơn và ít gây hại cho môi trường hơn. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">Dance might hold some of the answers. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">That is not to suggest everyone should dance their way to work, however healthy and happy it might make us, but rather that the techniques used by \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">choreographers\\u003c/span> to \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v6\\\">experiment\\u003c/span> with and design movement in dance could provide engineers with tools to stimulate new ideas in city-making. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">Richard Sennett, an \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v7\\\">influential urbanist\\u003c/span> and sociologist who has transformed ideas about the way cities are made, argues that urban design has suffered from a separation between mind and body since the introduction of the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v8\\\">architectural blueprint\\u003c/span>. \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"B\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"1\\\" onclick=\\\"toggleInlineMif(1, 'B')\\\">\\u003cspan class=\\\"q-num-s\\\">1.\\u003c/span> \\u003cspan>reference to an appealing way of using dance that the writer is not proposing\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"2\\\" onclick=\\\"toggleInlineMif(2, 'B')\\\">\\u003cspan class=\\\"q-num-s\\\">2.\\u003c/span> \\u003cspan>an example of a contrast between past and present approaches to building\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"3\\\" onclick=\\\"toggleInlineMif(3, 'B')\\\">\\u003cspan class=\\\"q-num-s\\\">3.\\u003c/span> \\u003cspan>mention of an objective of both dance and engineering\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"4\\\" onclick=\\\"toggleInlineMif(4, 'B')\\\">\\u003cspan class=\\\"q-num-s\\\">4.\\u003c/span> \\u003cspan>reference to an unforeseen problem arising from ignoring the climate\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"5\\\" onclick=\\\"toggleInlineMif(5, 'B')\\\">\\u003cspan class=\\\"q-num-s\\\">5.\\u003c/span> \\u003cspan>why some measures intended to help people are being reversed\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"6\\\" onclick=\\\"toggleInlineMif(6, 'B')\\\">\\u003cspan class=\\\"q-num-s\\\">6.\\u003c/span> \\u003cspan>reference to how transport has an impact on human lives\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Khiêu vũ có thể chứa một số câu trả lời. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Điều đó không có nghĩa là mọi người nên nhảy theo cách của mình để đi làm, dù điều đó có thể khiến chúng ta khỏe mạnh và hạnh phúc đến đâu, mà đúng hơn là các kỹ thuật được các biên đạo múa sử dụng để thử nghiệm và thiết kế chuyển động trong khiêu vũ có thể cung cấp cho các kỹ sư những công cụ để kích thích những ý tưởng mới trong việc xây dựng thành phố. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Richard Sennett, một nhà đô thị học và nhà xã hội học có ảnh hưởng, người đã thay đổi ý tưởng về cách hình thành các thành phố, lập luận rằng thiết kế đô thị đã phải chịu sự tách biệt giữa tinh thần và thể xác kể từ khi bản thiết kế kiến ​​trúc được đưa ra. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">Whereas \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v9\\\">medieval\\u003c/span> builders improvised and adapted construction through their \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v10\\\">intimate\\u003c/span> knowledge of materials and personal experience of the conditions on a site, building designs are now conceived and stored in media technologies that \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v11\\\">detach\\u003c/span> the designer from the physical and social \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v12\\\">realities\\u003c/span> they are creating. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">While the design practices created by these new technologies are essential for managing the technical \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v13\\\">complexity\\u003c/span> of the modern city, they have the drawback of simplifying reality in the process. \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"C\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"1\\\" onclick=\\\"toggleInlineMif(1, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">1.\\u003c/span> \\u003cspan>reference to an appealing way of using dance that the writer is not proposing\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"2\\\" onclick=\\\"toggleInlineMif(2, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">2.\\u003c/span> \\u003cspan>an example of a contrast between past and present approaches to building\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"3\\\" onclick=\\\"toggleInlineMif(3, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">3.\\u003c/span> \\u003cspan>mention of an objective of both dance and engineering\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"4\\\" onclick=\\\"toggleInlineMif(4, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">4.\\u003c/span> \\u003cspan>reference to an unforeseen problem arising from ignoring the climate\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"5\\\" onclick=\\\"toggleInlineMif(5, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">5.\\u003c/span> \\u003cspan>why some measures intended to help people are being reversed\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"6\\\" onclick=\\\"toggleInlineMif(6, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">6.\\u003c/span> \\u003cspan>reference to how transport has an impact on human lives\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Trong khi các nhà xây dựng thời Trung cổ ứng biến và điều chỉnh việc xây dựng thông qua kiến ​​thức sâu sắc về vật liệu và kinh nghiệm cá nhân về điều kiện trên địa điểm, thì các thiết kế xây dựng hiện được hình thành và lưu trữ trong các công nghệ truyền thông giúp tách nhà thiết kế khỏi thực tế vật chất và xã hội mà họ đang tạo ra. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Mặc dù các phương pháp thiết kế được tạo ra bởi các công nghệ mới này là cần thiết để quản lý sự phức tạp về mặt kỹ thuật của thành phố hiện đại, nhưng chúng có nhược điểm là đơn giản hóa thực tế trong quá trình này. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph D\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s0\\\">To illustrate, Sennett discusses the Peachtree Center in Atlanta, USA, a development typical of the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v14\\\">modernist\\u003c/span> approach to urban planning \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v15\\\">prevalent\\u003c/span> in the 1970s. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s1\\\">Peachtree created a grid of streets and towers intended as a new \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v19\\\">pedestrian\\u003c/span>-friendly downtown for Atlanta. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s2\\\">According to Sennett, this failed because its designers had invested too much faith in computer-aided design to tell them how it would operate. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s3\\\">They failed to take into account that purpose-built street cafés could not operate in the hot sun without the protective awnings common in older buildings, and would need energy-consuming air conditioning instead, or that its giant car park would feel so \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v16\\\">unwelcoming\\u003c/span> that it would put people off getting out of their cars. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s4\\\">What seems entirely predictable and controllable on screen has unexpected results when \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v17\\\">translated into\\u003c/span> reality. \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"D\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"1\\\" onclick=\\\"toggleInlineMif(1, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">1.\\u003c/span> \\u003cspan>reference to an appealing way of using dance that the writer is not proposing\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"2\\\" onclick=\\\"toggleInlineMif(2, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">2.\\u003c/span> \\u003cspan>an example of a contrast between past and present approaches to building\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"3\\\" onclick=\\\"toggleInlineMif(3, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">3.\\u003c/span> \\u003cspan>mention of an objective of both dance and engineering\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"4\\\" onclick=\\\"toggleInlineMif(4, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">4.\\u003c/span> \\u003cspan>reference to an unforeseen problem arising from ignoring the climate\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"5\\\" onclick=\\\"toggleInlineMif(5, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">5.\\u003c/span> \\u003cspan>why some measures intended to help people are being reversed\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"6\\\" onclick=\\\"toggleInlineMif(6, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">6.\\u003c/span> \\u003cspan>reference to how transport has an impact on human lives\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t3')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t3\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p3s0\\\" class=\\\"vi-sent\\\">Để minh họa, Sennett thảo luận về Trung tâm Peachtree ở Atlanta, Hoa Kỳ, một sự phát triển điển hình của cách tiếp cận hiện đại đối với quy hoạch đô thị phổ biến vào những năm 1970. \\u003c/span>\\u003cspan id=\\\"p3s1\\\" class=\\\"vi-sent\\\">Peachtree đã tạo ra một mạng lưới đường phố và các tòa tháp nhằm mục đích trở thành trung tâm thành phố mới thân thiện với người đi bộ ở Atlanta. \\u003c/span>\\u003cspan id=\\\"p3s2\\\" class=\\\"vi-sent\\\">Theo Sennett, điều này thất bại vì các nhà thiết kế của nó đã đầu tư quá nhiều niềm tin vào thiết kế có sự hỗ trợ của máy tính để cho họ biết nó sẽ hoạt động như thế nào. \\u003c/span>\\u003cspan id=\\\"p3s3\\\" class=\\\"vi-sent\\\">Họ đã không tính đến việc các quán cà phê đường phố được xây dựng có mục đích không thể hoạt động dưới trời nắng nóng nếu không có mái hiên bảo vệ thường thấy trong các tòa nhà cũ và thay vào đó sẽ cần điều hòa không khí tiêu tốn năng lượng, hoặc bãi đậu xe khổng lồ của nó sẽ khiến mọi người cảm thấy không được chào đón đến mức khiến mọi người không muốn ra khỏi xe. \\u003c/span>\\u003cspan id=\\\"p3s4\\\" class=\\\"vi-sent\\\">Những gì tưởng chừng như hoàn toàn có thể đoán trước và kiểm soát được trên màn ảnh lại mang lại kết quả không ngờ khi được chuyển thành hiện thực. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph E\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s0\\\">The same is true in transport engineering, which uses models to predict and shape the way people move through the city. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s1\\\">Again, these models are necessary, but they are built on specific world views in which certain forms of efficiency and safety are considered and other experience of the city ignored. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s2\\\">Designs that seem logical in models appear \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v18\\\">counter-intuitive\\u003c/span> in the actual experience of their users. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s3\\\">The guard rails that will be familiar to anyone who has attempted to cross a British road, for example, were an engineering solution to \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v19\\\">pedestrian\\u003c/span> safety based on models that \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v20\\\">prioritise\\u003c/span> the smooth flow of traffic. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s4\\\">On wide major roads, they often guide pedestrians to specific crossing points and slow down their progress across the road by using \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v21\\\">staggered\\u003c/span> access points divide the crossing into two – one for each carriageway. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s5\\\">In doing so they make crossings feel longer, introducing \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v22\\\">psychological barriers\\u003c/span> greatly impacting those that are the least mobile, and encouraging others to make dangerous crossings to get around the guard rails. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s6\\\">These barriers don’t just make it harder to cross the road: they divide communities and decrease opportunities for healthy transport. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s7\\\">As a result, many are now being removed, causing disruption, cost, and waste. \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"E\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"1\\\" onclick=\\\"toggleInlineMif(1, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">1.\\u003c/span> \\u003cspan>reference to an appealing way of using dance that the writer is not proposing\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"2\\\" onclick=\\\"toggleInlineMif(2, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">2.\\u003c/span> \\u003cspan>an example of a contrast between past and present approaches to building\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"3\\\" onclick=\\\"toggleInlineMif(3, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">3.\\u003c/span> \\u003cspan>mention of an objective of both dance and engineering\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"4\\\" onclick=\\\"toggleInlineMif(4, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">4.\\u003c/span> \\u003cspan>reference to an unforeseen problem arising from ignoring the climate\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"5\\\" onclick=\\\"toggleInlineMif(5, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">5.\\u003c/span> \\u003cspan>why some measures intended to help people are being reversed\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"6\\\" onclick=\\\"toggleInlineMif(6, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">6.\\u003c/span> \\u003cspan>reference to how transport has an impact on human lives\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t4')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t4\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p4s0\\\" class=\\\"vi-sent\\\">Điều này cũng đúng trong kỹ thuật vận tải, sử dụng các mô hình để dự đoán và định hình cách mọi người di chuyển trong thành phố. \\u003c/span>\\u003cspan id=\\\"p4s1\\\" class=\\\"vi-sent\\\">Một lần nữa, những mô hình này là cần thiết, nhưng chúng được xây dựng trên thế giới quan cụ thể, trong đó các hình thức hiệu quả và an toàn nhất định được xem xét và những kinh nghiệm khác của thành phố bị bỏ qua. \\u003c/span>\\u003cspan id=\\\"p4s2\\\" class=\\\"vi-sent\\\">Những thiết kế có vẻ hợp lý trong mô hình lại có vẻ phản trực giác trong trải nghiệm thực tế của người dùng. \\u003c/span>\\u003cspan id=\\\"p4s3\\\" class=\\\"vi-sent\\\">Ví dụ: các lan can bảo vệ quen thuộc với bất kỳ ai đã cố gắng băng qua đường ở Anh là một giải pháp kỹ thuật nhằm đảm bảo an toàn cho người đi bộ dựa trên các mô hình ưu tiên luồng giao thông thông suốt. \\u003c/span>\\u003cspan id=\\\"p4s4\\\" class=\\\"vi-sent\\\">Trên những con đường lớn rộng rãi, họ thường hướng dẫn người đi bộ đến các điểm giao cắt cụ thể và giảm tốc độ di chuyển của họ qua đường bằng cách sử dụng các điểm tiếp cận so le chia đường giao nhau thành hai – một cho mỗi làn đường. \\u003c/span>\\u003cspan id=\\\"p4s5\\\" class=\\\"vi-sent\\\">Khi làm như vậy, họ làm cho việc băng qua đường có cảm giác dài hơn, tạo ra các rào cản tâm lý ảnh hưởng lớn đến những người ít di chuyển nhất và khuyến khích những người khác thực hiện các bước băng qua nguy hiểm để đi vòng qua lan can bảo vệ. \\u003c/span>\\u003cspan id=\\\"p4s6\\\" class=\\\"vi-sent\\\">Những rào cản này không chỉ khiến việc băng qua đường trở nên khó khăn hơn mà còn gây chia rẽ cộng đồng và làm giảm cơ hội giao thông lành mạnh. \\u003c/span>\\u003cspan id=\\\"p4s7\\\" class=\\\"vi-sent\\\">Kết quả là, nhiều nơi hiện đang bị loại bỏ, gây gián đoạn, tốn kém và lãng phí. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph F\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s0\\\">If their designers had had the tools to think with their bodies – like dancers – and imagine how these barriers would feel, there might have been a better solution. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s1\\\">In order to bring about fundamental changes to the ways we use our cities, engineering will need to develop a richer understanding of why people move in certain ways, and how this movement affects them. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s2\\\">Choreography may not seem an obvious choice for tackling this problem. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s3\\\">Yet it shares with engineering the aim of designing patterns of movement within limitations of space. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s4\\\">It is an art form developed almost entirely by trying out ideas with the body, and gaining instant feedback on how the results feel. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s5\\\">\\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">Choreographers\\u003c/span> have deep understanding of the psychological, aesthetic, and \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v23\\\">physical implications\\u003c/span> of different ways of moving. \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"F\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"1\\\" onclick=\\\"toggleInlineMif(1, 'F')\\\">\\u003cspan class=\\\"q-num-s\\\">1.\\u003c/span> \\u003cspan>reference to an appealing way of using dance that the writer is not proposing\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"2\\\" onclick=\\\"toggleInlineMif(2, 'F')\\\">\\u003cspan class=\\\"q-num-s\\\">2.\\u003c/span> \\u003cspan>an example of a contrast between past and present approaches to building\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"3\\\" onclick=\\\"toggleInlineMif(3, 'F')\\\">\\u003cspan class=\\\"q-num-s\\\">3.\\u003c/span> \\u003cspan>mention of an objective of both dance and engineering\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"4\\\" onclick=\\\"toggleInlineMif(4, 'F')\\\">\\u003cspan class=\\\"q-num-s\\\">4.\\u003c/span> \\u003cspan>reference to an unforeseen problem arising from ignoring the climate\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"5\\\" onclick=\\\"toggleInlineMif(5, 'F')\\\">\\u003cspan class=\\\"q-num-s\\\">5.\\u003c/span> \\u003cspan>why some measures intended to help people are being reversed\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"6\\\" onclick=\\\"toggleInlineMif(6, 'F')\\\">\\u003cspan class=\\\"q-num-s\\\">6.\\u003c/span> \\u003cspan>reference to how transport has an impact on human lives\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t5')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t5\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p5s0\\\" class=\\\"vi-sent\\\">Nếu các nhà thiết kế của họ có công cụ để suy nghĩ bằng cơ thể của họ - giống như các vũ công - và tưởng tượng những rào cản này sẽ mang lại cảm giác như thế nào thì có lẽ đã có giải pháp tốt hơn. \\u003c/span>\\u003cspan id=\\\"p5s1\\\" class=\\\"vi-sent\\\">Để mang lại những thay đổi cơ bản trong cách chúng ta sử dụng các thành phố của mình, ngành kỹ thuật sẽ cần phát triển sự hiểu biết phong phú hơn về lý do tại sao mọi người di chuyển theo những cách nhất định và phong trào này ảnh hưởng đến họ như thế nào. \\u003c/span>\\u003cspan id=\\\"p5s2\\\" class=\\\"vi-sent\\\">Vũ đạo có vẻ không phải là một lựa chọn hiển nhiên để giải quyết vấn đề này. \\u003c/span>\\u003cspan id=\\\"p5s3\\\" class=\\\"vi-sent\\\">Tuy nhiên, nó có chung mục đích với kỹ thuật là thiết kế các mô hình chuyển động trong giới hạn không gian. \\u003c/span>\\u003cspan id=\\\"p5s4\\\" class=\\\"vi-sent\\\">Đó là một loại hình nghệ thuật được phát triển gần như hoàn toàn bằng cách thử nghiệm các ý tưởng với cơ thể và nhận được phản hồi ngay lập tức về cảm giác của kết quả. \\u003c/span>\\u003cspan id=\\\"p5s5\\\" class=\\\"vi-sent\\\">Các biên đạo múa có sự hiểu biết sâu sắc về ý nghĩa tâm lý, thẩm mỹ và thể chất của các cách di chuyển khác nhau. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph G\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s0\\\">Observing the choreographer Wayne McGregor, cognitive scientist David Kirsh described how he ‘thinks with the body’, Kirsh argues that by using the body to \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v24\\\">simulate\\u003c/span> outcomes, McGregor is able to imagine solutions that would not be possible using purely abstract thought. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s1\\\">This kind of physical knowledge is valued in many areas of expertise, but currently has no place in formal engineering design processes. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s2\\\">A suggested method for transport engineers is to \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v25\\\">improvise\\u003c/span> design solutions and instant feedback about how they would work from their own experience of them, or model designs at full scale in the way \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">choreographers\\u003c/span> \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v6\\\">experiment\\u003c/span> with groups of dancers. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s3\\\">Above all, perhaps, they might learn to design for emotional as well as \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v26\\\">functional effects\\u003c/span>. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t6')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t6\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p6s0\\\" class=\\\"vi-sent\\\">Quan sát biên đạo múa Wayne McGregor, nhà khoa học nhận thức David Kirsh đã mô tả cách anh ấy 'suy nghĩ bằng cơ thể', Kirsh lập luận rằng bằng cách sử dụng cơ thể để mô phỏng kết quả, McGregor có thể tưởng tượng ra các giải pháp không thể thực hiện được nếu chỉ sử dụng tư duy trừu tượng thuần túy. \\u003c/span>\\u003cspan id=\\\"p6s1\\\" class=\\\"vi-sent\\\">Loại kiến ​​thức vật lý này có giá trị trong nhiều lĩnh vực chuyên môn, nhưng hiện không có chỗ đứng trong các quy trình thiết kế kỹ thuật chính thức. \\u003c/span>\\u003cspan id=\\\"p6s2\\\" class=\\\"vi-sent\\\">Một phương pháp được đề xuất cho các kỹ sư vận tải là ứng biến các giải pháp thiết kế và phản hồi tức thì về cách họ sẽ làm việc dựa trên kinh nghiệm của chính họ hoặc thiết kế mô hình ở quy mô đầy đủ theo cách các biên đạo múa thử nghiệm với các nhóm vũ công. \\u003c/span>\\u003cspan id=\\\"p6s3\\\" class=\\\"vi-sent\\\">Trên hết, có lẽ họ có thể học cách thiết kế để mang lại hiệu quả về mặt cảm xúc cũng như chức năng. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"mif\",\"text\":\"reference to an appealing way of using dance that the writer is not proposing\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"_orderId\":1,\"mifTargets\":[\"B\",\"C\",\"F\",\"D\",\"E\",\"A\"]},{\"id\":2,\"type\":\"mif\",\"text\":\"an example of a contrast between past and present approaches to building\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"_orderId\":2,\"mifTargets\":[\"B\",\"C\",\"F\",\"D\",\"E\",\"A\"]},{\"id\":3,\"type\":\"mif\",\"text\":\"mention of an objective of both dance and engineering\",\"options\":[],\"correctAnswer\":\"F\",\"location\":\"\",\"_orderId\":3,\"mifTargets\":[\"B\",\"C\",\"F\",\"D\",\"E\",\"A\"]},{\"id\":4,\"type\":\"mif\",\"text\":\"reference to an unforeseen problem arising from ignoring the climate\",\"options\":[],\"correctAnswer\":\"D\",\"location\":\"\",\"_orderId\":4,\"mifTargets\":[\"B\",\"C\",\"F\",\"D\",\"E\",\"A\"]},{\"id\":5,\"type\":\"mif\",\"text\":\"why some measures intended to help people are being reversed\",\"options\":[],\"correctAnswer\":\"E\",\"location\":\"\",\"_orderId\":5,\"mifTargets\":[\"B\",\"C\",\"F\",\"D\",\"E\",\"A\"]},{\"id\":6,\"type\":\"mif\",\"text\":\"reference to how transport has an impact on human lives\",\"options\":[],\"correctAnswer\":\"A\",\"location\":\"\",\"_orderId\":6,\"mifTargets\":[\"B\",\"C\",\"F\",\"D\",\"E\",\"A\"]},{\"type\":\"gap-fill-block\",\"id\":7,\"text\":\"Complete the summary below.\\nChoose ONE WORD ONLY from the passage for each answer.\\nWrite your answers in boxes 7-13 on your answer sheet.\\nGuard rails\\nGuard rails were introduced on British roads to improve the 7…………………… of pedestrians, while ensuring that the movement of 8……………………. is not disrupted. Pedestrians are led to access points, and encouraged to cross one 9…………………….. at a time.\\nAn unintended effect is to create psychological difficulties in crossing the road, particularly for less 10………………….. people. Another result is that some people cross the road in a 11……………………. way. The guard rails separate 12……………………., and make it more difficult to introduce forms of transport that are 13…………………….\",\"gapIds\":[7,8,9,10,11,12,13],\"answers\":{\"7\":\"safety\",\"8\":\"traffic\",\"9\":\"carriageway\",\"10\":\"mobile\",\"11\":\"dangerous\",\"12\":\"communities\",\"13\":\"healthy\"},\"locations\":{\"7\":\"based on models that prioritise the smooth flow of traffic\",\"8\":\"guard rails that will be familiar to\",\"9\":\"On wide major roads, they often guide pedestrians to specific crossing points\",\"10\":\"doing so they make crossings feel longer, introducing psychological barriers greatly impacting those that are the least mobile\",\"11\":\"doing so they make crossings feel longer, introducing psychological barriers greatly impacting those that are the least mobile\",\"12\":\"barriers don’t just make it harder to cross the road\",\"13\":\"barriers don’t just make it harder to cross the road\"},\"_orderId\":7}],\"vocab\":[{\"id\":\"v0\",\"word\":\"sustainable\",\"meaning\":\"bền vững (eco-friendly, lasting)\",\"synonym\":\"We need sustainable energy solutions. (Chúng ta cần giải pháp năng lượng bền vững.)\",\"example\":\"\"},{\"id\":\"v1\",\"word\":\"energy-using vehicles\",\"meaning\":\"phương tiện tiêu thụ năng lượng (fuel-consuming cars)\",\"synonym\":\"Energy-using vehicles contribute to pollution. (Phương tiện tiêu thụ năng lượng gây ô nhiễm.)\",\"example\":\"\"},{\"id\":\"v2\",\"word\":\"environmental impact\",\"meaning\":\"tác động môi trường (ecological effect)\",\"synonym\":\"The factory has a huge environmental impact. (Nhà máy có tác động lớn đến môi trường.)\",\"example\":\"\"},{\"id\":\"v3\",\"word\":\"assumptions\",\"meaning\":\"giả định (beliefs, expectations)\",\"synonym\":\"The theory is based on assumptions. (Lý thuyết dựa trên giả định.)\",\"example\":\"\"},{\"id\":\"v4\",\"word\":\"emphasis\",\"meaning\":\"sự nhấn mạnh (focus, stress)\",\"synonym\":\"The teacher placed emphasis on discipline. (Giáo viên nhấn mạnh vào kỷ luật.)\",\"example\":\"\"},{\"id\":\"v5\",\"word\":\"choreographers\",\"meaning\":\"biên đạo múa (dance directors)\",\"synonym\":\"Famous choreographers designed the performance. (Các biên đạo nổi tiếng thiết kế buổi biểu diễn.)\",\"example\":\"\"},{\"id\":\"v6\",\"word\":\"experiment\",\"meaning\":\"thí nghiệm (test, trial)\",\"synonym\":\"The scientist conducted an experiment. (Nhà khoa học tiến hành thí nghiệm.)\",\"example\":\"\"},{\"id\":\"v7\",\"word\":\"influential urbanist\",\"meaning\":\"nhà quy hoạch đô thị có ảnh hưởng (city planner)\",\"synonym\":\"Jane Jacobs was an influential urbanist. (Jane Jacobs là nhà quy hoạch đô thị có ảnh hưởng.)\",\"example\":\"\"},{\"id\":\"v8\",\"word\":\"architectural blueprint\",\"meaning\":\"bản thiết kế kiến trúc (design plan)\",\"synonym\":\"The engineer studied the architectural blueprint. (Kỹ sư nghiên cứu bản thiết kế kiến trúc.)\",\"example\":\"\"},{\"id\":\"v9\",\"word\":\"medieval\",\"meaning\":\"thời trung cổ (Middle Ages)\",\"synonym\":\"The castle was built in medieval times. (Lâu đài được xây dựng vào thời trung cổ.)\",\"example\":\"\"},{\"id\":\"v10\",\"word\":\"intimate\",\"meaning\":\"thân mật, gần gũi (close, personal)\",\"synonym\":\"They had an intimate conversation. (Họ có cuộc trò chuyện thân mật.)\",\"example\":\"\"},{\"id\":\"v11\",\"word\":\"detach\",\"meaning\":\"tách rời (separate, disconnect)\",\"synonym\":\"He tried to detach himself from the group. (Anh ấy cố tách mình khỏi nhóm.)\",\"example\":\"\"},{\"id\":\"v12\",\"word\":\"realities\",\"meaning\":\"thực tế (facts, truths)\",\"synonym\":\"We must face harsh realities. (Chúng ta phải đối mặt với thực tế khắc nghiệt.)\",\"example\":\"\"},{\"id\":\"v13\",\"word\":\"complexity\",\"meaning\":\"sự phức tạp (intricacy, difficulty)\",\"synonym\":\"The problem shows great complexity. (Vấn đề thể hiện sự phức tạp lớn.)\",\"example\":\"\"},{\"id\":\"v14\",\"word\":\"modernist\",\"meaning\":\"hiện đại, theo trường phái hiện đại (contemporary style)\",\"synonym\":\"He is a modernist architect. (Ông ấy là kiến trúc sư hiện đại.)\",\"example\":\"\"},{\"id\":\"v15\",\"word\":\"prevalent\",\"meaning\":\"phổ biến (common, widespread)\",\"synonym\":\"This habit is prevalent among teenagers. (Thói quen này phổ biến ở thanh thiếu niên.)\",\"example\":\"\"},{\"id\":\"v16\",\"word\":\"unwelcoming\",\"meaning\":\"không thân thiện (hostile, unfriendly)\",\"synonym\":\"The town felt unwelcoming to strangers. (Thị trấn cảm thấy không thân thiện với người lạ.)\",\"example\":\"\"},{\"id\":\"v17\",\"word\":\"translated into\",\"meaning\":\"được dịch thành, chuyển thành (converted, rendered)\",\"synonym\":\"The book was translated into English. (Cuốn sách được dịch sang tiếng Anh.)\",\"example\":\"\"},{\"id\":\"v18\",\"word\":\"counter-intuitive\",\"meaning\":\"trái ngược trực giác (unexpected, illogical)\",\"synonym\":\"The result was counter-intuitive. (Kết quả trái ngược trực giác.)\",\"example\":\"\"},{\"id\":\"v19\",\"word\":\"pedestrian\",\"meaning\":\"người đi bộ (walker)\",\"synonym\":\"The street is full of pedestrians. (Con phố đầy người đi bộ.)\",\"example\":\"\"},{\"id\":\"v20\",\"word\":\"prioritise\",\"meaning\":\"ưu tiên (give importance to)\",\"synonym\":\"We must prioritise safety. (Chúng ta phải ưu tiên an toàn.)\",\"example\":\"\"},{\"id\":\"v21\",\"word\":\"staggered\",\"meaning\":\"so le, xen kẽ (spread out, uneven)\",\"synonym\":\"The workers had staggered shifts. (Công nhân có ca làm việc so le.)\",\"example\":\"\"},{\"id\":\"v22\",\"word\":\"psychological barriers\",\"meaning\":\"rào cản tâm lý (mental obstacles)\",\"synonym\":\"Fear creates psychological barriers. (Nỗi sợ tạo ra rào cản tâm lý.)\",\"example\":\"\"},{\"id\":\"v23\",\"word\":\"physical implications\",\"meaning\":\"hệ quả vật lý (bodily effects)\",\"synonym\":\"Exercise has positive physical implications. (Tập thể dục có hệ quả tích cực về thể chất.)\",\"example\":\"\"},{\"id\":\"v24\",\"word\":\"simulate\",\"meaning\":\"mô phỏng (imitate, replicate)\",\"synonym\":\"The software can simulate real-world conditions. (Phần mềm có thể mô phỏng điều kiện thực tế.)\",\"example\":\"\"},{\"id\":\"v25\",\"word\":\"improvise\",\"meaning\":\"ứng biến (make up, extemporize)\",\"synonym\":\"He had to improvise a speech. (Anh ấy phải ứng biến một bài phát biểu.)\",\"example\":\"\"},{\"id\":\"v26\",\"word\":\"functional effects\",\"meaning\":\"tác động chức năng (practical impacts)\",\"synonym\":\"The medicine has functional effects on the body. (Thuốc có tác động chức năng lên cơ thể.)\",\"example\":\"\"}],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABCDEFG\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[{\"eng\":\"sustainable\",\"vie\":\"bền vững (eco-friendly, lasting)\"},{\"eng\":\"energy-using vehicles\",\"vie\":\"phương tiện tiêu thụ năng lượng (fuel-consuming cars)\"},{\"eng\":\"environmental impact\",\"vie\":\"tác động môi trường (ecological effect)\"},{\"eng\":\"assumptions\",\"vie\":\"giả định (beliefs, expectations)\"},{\"eng\":\"emphasis\",\"vie\":\"sự nhấn mạnh (focus, stress)\"},{\"eng\":\"choreographers\",\"vie\":\"biên đạo múa (dance directors)\"},{\"eng\":\"experiment\",\"vie\":\"thí nghiệm (test, trial)\"},{\"eng\":\"influential urbanist\",\"vie\":\"nhà quy hoạch đô thị có ảnh hưởng (city planner)\"},{\"eng\":\"architectural blueprint\",\"vie\":\"bản thiết kế kiến trúc (design plan)\"},{\"eng\":\"medieval\",\"vie\":\"thời trung cổ (Middle Ages)\"},{\"eng\":\"intimate\",\"vie\":\"thân mật, gần gũi (close, personal)\"},{\"eng\":\"detach\",\"vie\":\"tách rời (separate, disconnect)\"},{\"eng\":\"realities\",\"vie\":\"thực tế (facts, truths)\"},{\"eng\":\"complexity\",\"vie\":\"sự phức tạp (intricacy, difficulty)\"},{\"eng\":\"modernist\",\"vie\":\"hiện đại, theo trường phái hiện đại (contemporary style)\"},{\"eng\":\"prevalent\",\"vie\":\"phổ biến (common, widespread)\"},{\"eng\":\"unwelcoming\",\"vie\":\"không thân thiện (hostile, unfriendly)\"},{\"eng\":\"translated into\",\"vie\":\"được dịch thành, chuyển thành (converted, rendered)\"},{\"eng\":\"counter-intuitive\",\"vie\":\"trái ngược trực giác (unexpected, illogical)\"},{\"eng\":\"pedestrian\",\"vie\":\"người đi bộ (walker)\"},{\"eng\":\"prioritise\",\"vie\":\"ưu tiên (give importance to)\"},{\"eng\":\"staggered\",\"vie\":\"so le, xen kẽ (spread out, uneven)\"},{\"eng\":\"psychological barriers\",\"vie\":\"rào cản tâm lý (mental obstacles)\"},{\"eng\":\"physical implications\",\"vie\":\"hệ quả vật lý (bodily effects)\"},{\"eng\":\"simulate\",\"vie\":\"mô phỏng (imitate, replicate)\"},{\"eng\":\"improvise\",\"vie\":\"ứng biến (make up, extemporize)\"},{\"eng\":\"functional effects\",\"vie\":\"tác động chức năng (practical impacts)\"}],\"pData\":[{\"en\":[\"The way we travel around cities has a major impact on whether they are sustainable.\",\"Transportation is estimated to account for 30% of energy consumption in most of the world’s most developed nations, so lowering the need for energy-using vehicles is essential for decreasing the environmental impact of mobility.\",\"But as more and more people move to cities, it is important to think about other kinds of sustainable travel too.\",\"The ways we travel affect our physical and mental health, our social lives, our access to work and culture, and the air we breathe.\",\"Engineers are tasked with changing how we travel round cities through urban design, but the engineering industry still works on the assumptions that led to the creation of the energy-consuming transport systems we have now: the emphasis placed solely on efficiency, speed, and quantitative data.\",\"We need radical changes, to make it healthier, more enjoyable, and less environmentally damaging to travel around cities.\"],\"vi\":[\"Cách chúng ta di chuyển quanh các thành phố có tác động lớn đến việc liệu chúng có bền vững hay không.\",\"Giao thông vận tải được ước tính chiếm 30% mức tiêu thụ năng lượng ở hầu hết các quốc gia phát triển nhất thế giới, do đó việc giảm nhu cầu sử dụng các phương tiện sử dụng năng lượng là điều cần thiết để giảm tác động môi trường của việc di chuyển.\",\"Nhưng khi ngày càng có nhiều người chuyển đến các thành phố, điều quan trọng là phải nghĩ đến các loại hình du lịch bền vững khác.\",\"Cách chúng ta đi du lịch ảnh hưởng đến sức khỏe thể chất và tinh thần, đời sống xã hội, khả năng tiếp cận công việc và văn hóa cũng như không khí chúng ta hít thở.\",\"Các kỹ sư được giao nhiệm vụ thay đổi cách chúng ta di chuyển quanh các thành phố thông qua thiết kế đô thị, nhưng ngành kỹ thuật vẫn làm việc dựa trên các giả định dẫn đến việc tạo ra các hệ thống giao thông tiêu thụ năng lượng mà chúng ta hiện có: chỉ nhấn mạnh vào hiệu quả, tốc độ và dữ liệu định lượng.\",\"Chúng ta cần những thay đổi căn bản để làm cho việc đi lại quanh các thành phố trở nên lành mạnh hơn, thú vị hơn và ít gây hại cho môi trường hơn.\"]},{\"en\":[\"Dance might hold some of the answers.\",\"That is not to suggest everyone should dance their way to work, however healthy and happy it might make us, but rather that the techniques used by choreographers to experiment with and design movement in dance could provide engineers with tools to stimulate new ideas in city-making.\",\"Richard Sennett, an influential urbanist and sociologist who has transformed ideas about the way cities are made, argues that urban design has suffered from a separation between mind and body since the introduction of the architectural blueprint.\"],\"vi\":[\"Khiêu vũ có thể chứa một số câu trả lời.\",\"Điều đó không có nghĩa là mọi người nên nhảy theo cách của mình để đi làm, dù điều đó có thể khiến chúng ta khỏe mạnh và hạnh phúc đến đâu, mà đúng hơn là các kỹ thuật được các biên đạo múa sử dụng để thử nghiệm và thiết kế chuyển động trong khiêu vũ có thể cung cấp cho các kỹ sư những công cụ để kích thích những ý tưởng mới trong việc xây dựng thành phố.\",\"Richard Sennett, một nhà đô thị học và nhà xã hội học có ảnh hưởng, người đã thay đổi ý tưởng về cách hình thành các thành phố, lập luận rằng thiết kế đô thị đã phải chịu sự tách biệt giữa tinh thần và thể xác kể từ khi bản thiết kế kiến ​​trúc được đưa ra.\"]},{\"en\":[\"Whereas medieval builders improvised and adapted construction through their intimate knowledge of materials and personal experience of the conditions on a site, building designs are now conceived and stored in media technologies that detach the designer from the physical and social realities they are creating.\",\"While the design practices created by these new technologies are essential for managing the technical complexity of the modern city, they have the drawback of simplifying reality in the process.\"],\"vi\":[\"Trong khi các nhà xây dựng thời Trung cổ ứng biến và điều chỉnh việc xây dựng thông qua kiến ​​thức sâu sắc về vật liệu và kinh nghiệm cá nhân về điều kiện trên địa điểm, thì các thiết kế xây dựng hiện được hình thành và lưu trữ trong các công nghệ truyền thông giúp tách nhà thiết kế khỏi thực tế vật chất và xã hội mà họ đang tạo ra.\",\"Mặc dù các phương pháp thiết kế được tạo ra bởi các công nghệ mới này là cần thiết để quản lý sự phức tạp về mặt kỹ thuật của thành phố hiện đại, nhưng chúng có nhược điểm là đơn giản hóa thực tế trong quá trình này.\"]},{\"en\":[\"To illustrate, Sennett discusses the Peachtree Center in Atlanta, USA, a development typical of the modernist approach to urban planning prevalent in the 1970s.\",\"Peachtree created a grid of streets and towers intended as a new pedestrian-friendly downtown for Atlanta.\",\"According to Sennett, this failed because its designers had invested too much faith in computer-aided design to tell them how it would operate.\",\"They failed to take into account that purpose-built street cafés could not operate in the hot sun without the protective awnings common in older buildings, and would need energy-consuming air conditioning instead, or that its giant car park would feel so unwelcoming that it would put people off getting out of their cars.\",\"What seems entirely predictable and controllable on screen has unexpected results when translated into reality.\"],\"vi\":[\"Để minh họa, Sennett thảo luận về Trung tâm Peachtree ở Atlanta, Hoa Kỳ, một sự phát triển điển hình của cách tiếp cận hiện đại đối với quy hoạch đô thị phổ biến vào những năm 1970.\",\"Peachtree đã tạo ra một mạng lưới đường phố và các tòa tháp nhằm mục đích trở thành trung tâm thành phố mới thân thiện với người đi bộ ở Atlanta.\",\"Theo Sennett, điều này thất bại vì các nhà thiết kế của nó đã đầu tư quá nhiều niềm tin vào thiết kế có sự hỗ trợ của máy tính để cho họ biết nó sẽ hoạt động như thế nào.\",\"Họ đã không tính đến việc các quán cà phê đường phố được xây dựng có mục đích không thể hoạt động dưới trời nắng nóng nếu không có mái hiên bảo vệ thường thấy trong các tòa nhà cũ và thay vào đó sẽ cần điều hòa không khí tiêu tốn năng lượng, hoặc bãi đậu xe khổng lồ của nó sẽ khiến mọi người cảm thấy không được chào đón đến mức khiến mọi người không muốn ra khỏi xe.\",\"Những gì tưởng chừng như hoàn toàn có thể đoán trước và kiểm soát được trên màn ảnh lại mang lại kết quả không ngờ khi được chuyển thành hiện thực.\"]},{\"en\":[\"The same is true in transport engineering, which uses models to predict and shape the way people move through the city.\",\"Again, these models are necessary, but they are built on specific world views in which certain forms of efficiency and safety are considered and other experience of the city ignored.\",\"Designs that seem logical in models appear counter-intuitive in the actual experience of their users.\",\"The guard rails that will be familiar to anyone who has attempted to cross a British road, for example, were an engineering solution to pedestrian safety based on models that prioritise the smooth flow of traffic.\",\"On wide major roads, they often guide pedestrians to specific crossing points and slow down their progress across the road by using staggered access points divide the crossing into two – one for each carriageway.\",\"In doing so they make crossings feel longer, introducing psychological barriers greatly impacting those that are the least mobile, and encouraging others to make dangerous crossings to get around the guard rails.\",\"These barriers don’t just make it harder to cross the road: they divide communities and decrease opportunities for healthy transport.\",\"As a result, many are now being removed, causing disruption, cost, and waste.\"],\"vi\":[\"Điều này cũng đúng trong kỹ thuật vận tải, sử dụng các mô hình để dự đoán và định hình cách mọi người di chuyển trong thành phố.\",\"Một lần nữa, những mô hình này là cần thiết, nhưng chúng được xây dựng trên thế giới quan cụ thể, trong đó các hình thức hiệu quả và an toàn nhất định được xem xét và những kinh nghiệm khác của thành phố bị bỏ qua.\",\"Những thiết kế có vẻ hợp lý trong mô hình lại có vẻ phản trực giác trong trải nghiệm thực tế của người dùng.\",\"Ví dụ: các lan can bảo vệ quen thuộc với bất kỳ ai đã cố gắng băng qua đường ở Anh là một giải pháp kỹ thuật nhằm đảm bảo an toàn cho người đi bộ dựa trên các mô hình ưu tiên luồng giao thông thông suốt.\",\"Trên những con đường lớn rộng rãi, họ thường hướng dẫn người đi bộ đến các điểm giao cắt cụ thể và giảm tốc độ di chuyển của họ qua đường bằng cách sử dụng các điểm tiếp cận so le chia đường giao nhau thành hai – một cho mỗi làn đường.\",\"Khi làm như vậy, họ làm cho việc băng qua đường có cảm giác dài hơn, tạo ra các rào cản tâm lý ảnh hưởng lớn đến những người ít di chuyển nhất và khuyến khích những người khác thực hiện các bước băng qua nguy hiểm để đi vòng qua lan can bảo vệ.\",\"Những rào cản này không chỉ khiến việc băng qua đường trở nên khó khăn hơn mà còn gây chia rẽ cộng đồng và làm giảm cơ hội giao thông lành mạnh.\",\"Kết quả là, nhiều nơi hiện đang bị loại bỏ, gây gián đoạn, tốn kém và lãng phí.\"]},{\"en\":[\"If their designers had had the tools to think with their bodies – like dancers – and imagine how these barriers would feel, there might have been a better solution.\",\"In order to bring about fundamental changes to the ways we use our cities, engineering will need to develop a richer understanding of why people move in certain ways, and how this movement affects them.\",\"Choreography may not seem an obvious choice for tackling this problem.\",\"Yet it shares with engineering the aim of designing patterns of movement within limitations of space.\",\"It is an art form developed almost entirely by trying out ideas with the body, and gaining instant feedback on how the results feel.\",\"Choreographers have deep understanding of the psychological, aesthetic, and physical implications of different ways of moving.\"],\"vi\":[\"Nếu các nhà thiết kế của họ có công cụ để suy nghĩ bằng cơ thể của họ - giống như các vũ công - và tưởng tượng những rào cản này sẽ mang lại cảm giác như thế nào thì có lẽ đã có giải pháp tốt hơn.\",\"Để mang lại những thay đổi cơ bản trong cách chúng ta sử dụng các thành phố của mình, ngành kỹ thuật sẽ cần phát triển sự hiểu biết phong phú hơn về lý do tại sao mọi người di chuyển theo những cách nhất định và phong trào này ảnh hưởng đến họ như thế nào.\",\"Vũ đạo có vẻ không phải là một lựa chọn hiển nhiên để giải quyết vấn đề này.\",\"Tuy nhiên, nó có chung mục đích với kỹ thuật là thiết kế các mô hình chuyển động trong giới hạn không gian.\",\"Đó là một loại hình nghệ thuật được phát triển gần như hoàn toàn bằng cách thử nghiệm các ý tưởng với cơ thể và nhận được phản hồi ngay lập tức về cảm giác của kết quả.\",\"Các biên đạo múa có sự hiểu biết sâu sắc về ý nghĩa tâm lý, thẩm mỹ và thể chất của các cách di chuyển khác nhau.\"]},{\"en\":[\"Observing the choreographer Wayne McGregor, cognitive scientist David Kirsh described how he ‘thinks with the body’, Kirsh argues that by using the body to simulate outcomes, McGregor is able to imagine solutions that would not be possible using purely abstract thought.\",\"This kind of physical knowledge is valued in many areas of expertise, but currently has no place in formal engineering design processes.\",\"A suggested method for transport engineers is to improvise design solutions and instant feedback about how they would work from their own experience of them, or model designs at full scale in the way choreographers experiment with groups of dancers.\",\"Above all, perhaps, they might learn to design for emotional as well as functional effects.\"],\"vi\":[\"Quan sát biên đạo múa Wayne McGregor, nhà khoa học nhận thức David Kirsh đã mô tả cách anh ấy 'suy nghĩ bằng cơ thể', Kirsh lập luận rằng bằng cách sử dụng cơ thể để mô phỏng kết quả, McGregor có thể tưởng tượng ra các giải pháp không thể thực hiện được nếu chỉ sử dụng tư duy trừu tượng thuần túy.\",\"Loại kiến ​​thức vật lý này có giá trị trong nhiều lĩnh vực chuyên môn, nhưng hiện không có chỗ đứng trong các quy trình thiết kế kỹ thuật chính thức.\",\"Một phương pháp được đề xuất cho các kỹ sư vận tải là ứng biến các giải pháp thiết kế và phản hồi tức thì về cách họ sẽ làm việc dựa trên kinh nghiệm của chính họ hoặc thiết kế mô hình ở quy mô đầy đủ theo cách các biên đạo múa thử nghiệm với các nhóm vũ công.\",\"Trên hết, có lẽ họ có thể học cách thiết kế để mang lại hiệu quả về mặt cảm xúc cũng như chức năng.\"]}],\"timeLimit\":20}];\n\nlet currentLessonIndex = 0;\nlet qs, vocab, headings, headingKey, mifRange, removeOpt, removeFeatureOpt, pairs, pData;\n\nlet timeLeft = 0;\nlet timerInterval;\nconst timerEl = document.getElementById('timer');\n\nfunction startTimer() {\n    timerInterval = setInterval(() => {\n        if(timeLeft <= 0) {\n            clearInterval(timerInterval);\n            timerEl.innerText = \"00:00\";\n            alert(\"Time is up!\");\n            return;\n        }\n        timeLeft--;\n        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');\n        const s = (timeLeft % 60).toString().padStart(2, '0');\n        timerEl.innerText = `${m}:${s}`;\n    }, 1000);\n}\n\nfunction switchLesson(idx) {\n    currentLessonIndex = parseInt(idx);\n    const l = lessonsData[currentLessonIndex];\n    qs = l.qs; vocab = l.vocab; headings = l.headings; headingKey = l.headingKey;\n    mifRange = l.mifRange; removeOpt = l.removeOpt; removeFeatureOpt = l.removeFeatureOpt;\n    pairs = l.pairs; pData = l.pData;\n\n    // Reset UI\n    document.getElementById('articleArea').innerHTML = l.articleHtml;\n    document.getElementById('headingsArea').innerHTML = l.headingsHtml;\n    document.getElementById('qs').innerHTML = '';\n    document.getElementById('progressBar').innerHTML = '';\n    document.getElementById('saveBtn').style.display = 'none';\n    \n    // Reset Timer\n    clearInterval(timerInterval);\n    timeLeft = l.timeLimit * 60;\n    timerEl.innerText = \"--:--\";\n    startTimer();\n\n    // Render Questions & Attach Events\n    renderStudentQuestions();\n    attachEvents();\n\n    // Manage Views\n    if(document.getElementById('game-view').style.display === 'block') initGame();\n    if(document.getElementById('mif-view').style.display === 'flex') {\n        document.getElementById('mif-view').style.display = 'none';\n    }\n}\n\n// --- RENDERING QUESTIONS ---\nfunction renderStudentQuestions() {\n    const qDiv=document.getElementById('qs');\n    qDiv.innerHTML = '';\n    \n    qs.forEach(q=>{\n      if(q.type==='text-only'){ qDiv.innerHTML+=`<div class=\"text-only\">${q.text}</div>`; }\n      else if(q.type==='summary') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>');\n          q.gapIds.forEach(gid => {\n              const isFeat = q.isFeature ? 'true' : 'false';\n              const dz = `<span class=\"drop-zone\" id=\"dz-${gid}\" data-gid=\"${gid}\" data-isfeat=\"${isFeat}\" ondragover=\"allowDrop(event)\" ondrop=\"drop(event)\" onclick=\"clearDrop(${gid})\"></span><span class=\"q-num\" style=\"vertical-align:super;font-size:10px\">${gid}</span>&nbsp;`;\n              let replaced = txt.replace(new RegExp(`${gid}\\\\s*([._…-]{2,}|_{2,}|…+)`), dz);\n              if(replaced === txt) replaced = txt.replace(new RegExp(`${gid}[.]\\\\s+`), dz + ' ');\n              txt = replaced;\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2;font-size:15px\">${txt}</div><div style=\"margin-top:15px;display:flex;flex-wrap:wrap;gap:8px;padding-top:10px;border-top:1px dashed #e2e8f0\">`;\n          q.options.forEach(optLine => {\n              const m = optLine.match(/^([A-Z])\\s*[.)]?\\s*(.+)/);\n              if(m) h += `<div class=\"heading-item\" id=\"opt-${q.id}-${m[1]}\" style=\"display:inline-flex;width:auto;margin:0\" draggable=\"true\" ondragstart=\"drag(event)\" data-val=\"${m[1]}\"><span style=\"font-weight:bold;color:#2563eb\">${m[1]}</span> ${m[2]}</div>`;\n          });\n          h += `</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      } \n      else if(q.type==='gap-fill-block') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>'); \n          q.gapIds.forEach(gid => {\n              const loc = (q.locations && q.locations[gid]) ? q.locations[gid] : \"\";\n              const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${gid})\">📍</button>` : \"\";\n              const inp = `<span class=\"q-num\">${gid}</span><input type=\"text\" class=\"gap-input\" data-gid=\"${gid}\" oninput=\"upd(${gid})\">${locBtn}&nbsp;`;\t\n              txt = txt.replace(new RegExp(`${gid}[\\\\s:.)]*(?:[_….\\\\-]\\\\s*){2,}`), inp);\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2.2;font-size:16px\">${txt}</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      }\n      else if(q.type==='mcq-multi') {\n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          const locBtn1 = (q.locations && q.locations[q.gapIds[0]]) ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${q.gapIds[0]})\">📍</button>` : \"\";\n          h += `<div style=\"display:flex;align-items:baseline;margin-bottom:8px;\"><span class=\"q-num\">${q.gapIds[0]}-${q.gapIds[q.gapIds.length-1]}</span> <span>${q.text}</span> ${locBtn1}</div>`;\n          q.options.forEach((o, i) => {\n              const optLetterMatch = o.match(/^([A-Z])/i);\n              const optLetter = optLetterMatch ? optLetterMatch[1].toUpperCase() : o.trim()[0].toUpperCase();\n              h += `<label style=\"display:block;margin:5px 0;cursor:pointer;transition:all 0.2s;\">\n                      <input type=\"checkbox\" name=\"mcq_${q.id}\" value=\"${optLetter}\" onchange=\"updMcqMulti(${q.id}, '${q.gapIds.join(',')}', event)\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span>\n                    </label>`;\n          });\n          h += `<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n          q.gapIds.forEach(gid => {\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n
