<html lang="vi">

  <style>
    :root{--bg:#f6f8fb;--card:#fff;--accent1:#6a11cb;--accent2:#2575fc;--muted:#6b7280;--btn-text:#fff}
    html, body { height: 100%; margin: 0; }
    body{font-family:Inter,system-ui,Arial;background:var(--bg);color:#111}
    .wrap{
      max-width:100%;
      width:100%;
      height:100vh;
      margin:0;
      padding:18px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      gap:12px;
      background:linear-gradient(180deg,rgba(255,255,255,0.7),#fff);
    }
    h2{margin:0 0 6px 0}
    .controls{flex:0 0 auto; display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    select{padding:10px 12px;border-radius:10px;border:1px solid #e6e9ef;background:#fff;min-width:220px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:0;color:var(--btn-text);font-weight:700;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease}
    .btn-primary{background:linear-gradient(90deg,var(--accent1),var(--accent2));box-shadow:0 8px 24px rgba(37,117,252,0.12)}
    .btn-ghost{background:transparent;color:var(--accent2);border:1px solid rgba(37,117,252,0.12);color:var(--accent2);border-radius:10px;padding:8px 12px}
    .btn:hover{transform:translateY(-2px)}
    /* iframe chiếm phần còn lại */
    #frame{flex:1 1 auto;width:100%;min-height:0;border-radius:10px;border:1px solid #e6eef8;background:#fff}
    .meta{color:var(--muted);font-size:13px;margin-top:6px}
    /* fullscreen styles */
    .fullscreen-frame {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 9998 !important;
      border-radius: 0 !important;
      border: none !important;
      box-shadow: none !important;
    }
    .hidden { display: none !important; }
    #closeFullscreen {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10000;
      padding: 10px 14px;
      border-radius: 10px;
      border: 0;
      background: rgba(255,255,255,0.95);
      color: #111;
      font-weight:700;
      box-shadow: 0 6px 18px rgba(16,24,40,0.12);
      cursor: pointer;
    }
    @media (max-width:640px){ .controls{flex-direction:column;align-items:stretch} select{width:100%} }
  </style>
</head>

px 16px; border-radius:12px; background:rgba(255,255,255,0.01); border:2px dashed rgba(255,255,255,0.03); min-height:56px; transition:all 220ms ease; cursor:pointer; position:relative; overflow:visible; }\n  .g-slot .inner{position:relative; z-index:3;}\n  .g-slot.correct{padding-left:12px; font-size:15px; display:flex; align-items:center; border-style:solid; border-width:2px; background:linear-gradient(180deg, rgba(16,185,129,0.03), rgba(16,185,129,0.01));}\n  .g-slot::before{ content:\"\"; position:absolute; inset:-4px; border-radius:16px; z-index:1; background: linear-gradient(90deg, var(--neon-primary), var(--neon-secondary), var(--neon-warm)); filter: blur(8px); opacity:0; transform:scale(0.98); transition:opacity 220ms ease, transform 220ms ease; pointer-events:none; mix-blend-mode:screen; }\n  .g-slot::after{ content:\"\"; position:absolute; inset:-2px; border-radius:14px; z-index:2; background: linear-gradient(90deg, var(--neon-primary), var(--neon-secondary), var(--neon-warm)); background-size:200% 100%; opacity:0; transform:translateZ(0); -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor; mask-composite: exclude; padding:2px; transition:opacity 220ms ease; pointer-events:none; }\n  .g-slot:hover::before, .g-slot:focus::before, .g-slot.active::before, .g-slot.highlight::before{ opacity:0.55; transform:scale(1); animation: neonPulse 2.6s linear infinite; }\n  .g-slot:hover::after, .g-slot:focus::after, .g-slot.active::after, .g-slot.highlight::after{ opacity:1; animation: neonMove 2.2s linear infinite; }\n  .g-slot.correct::before{ background: linear-gradient(90deg, rgba(16,185,129,0.9), rgba(96,165,250,0.06)); opacity:0.6; filter:blur(10px); }\n  .g-slot.correct::after{ background: linear-gradient(90deg, rgba(16,185,129,0.95), rgba(6,182,212,0.06)); opacity:1; }\n\n  @keyframes neonMove{ 0%{background-position:0% 50%} 100%{background-position:200% 50%} }\n  @keyframes neonPulse{ 0%{filter:blur(6px); opacity:0.45} 50%{filter:blur(12px); opacity:0.7} 100%{filter:blur(6px); opacity:0.45} }\n\n  .g-vie-list{display:flex; flex-wrap:wrap; gap:10px; padding-top:6px;}\n  .g-vie-item{cursor:grab; user-select:none; padding:8px 12px; border-radius:10px; background:linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border:1px solid rgba(255,255,255,0.03);}\n  .g-vie-item.dragging{opacity:0.5; transform:scale(0.98);}\n  .g-wrong{animation:shake 300ms; border-color:rgba(239,68,68,0.6);}\n  @keyframes shake{0%{transform:translateX(0)} 25%{transform:translateX(-6px)} 50%{transform:translateX(6px)} 75%{transform:translateX(-4px)} 100%{transform:translateX(0)}}\n  \n  .g-badge{display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; background:rgba(255,255,255,0.02); color:var(--muted); font-weight:600;}\n  .confetti{position:fixed; left:0; top:0; width:100%; height:100%; pointer-events:none; overflow:hidden; z-index: 3000;}\n  .confetti .piece{position:absolute; width:10px; height:14px; opacity:0; transform:translateY(-20px) rotate(0deg); animation:fall 1200ms linear forwards;}\n  @keyframes fall{0%{opacity:1; transform:translateY(-10vh) rotate(0deg)} 100%{opacity:1; transform:translateY(110vh) rotate(720deg)}}\n  \n  .flash-wrap{perspective:1200px; width:100%; max-width:520px;}\n  .flashcard{width:100%; height:140px; position:relative; transform-style:preserve-3d; transition:transform 600ms cubic-bezier(.2,.9,.3,1); border-radius:12px; cursor:pointer;}\n  .flashcard.flipped{transform:rotateY(180deg);}\n  .flash-face{position:absolute; inset:0; backface-visibility:hidden; border-radius:12px; display:flex; align-items:center; justify-content:center; padding:18px; font-size:18px; text-align:center; box-shadow: 0 6px 18px rgba(2,6,23,0.6); border:1px solid rgba(255,255,255,0.03);}\n  .flash-face.front{background:linear-gradient(180deg, rgba(6,182,212,0.08), rgba(96,165,250,0.03)); color:#e6f9fb;}\n  .flash-face.back{transform:rotateY(180deg); background:linear-gradient(180deg, rgba(16,185,129,0.06), rgba(96,165,250,0.02)); color:#eafff0;}\n\n  .fill-list{display:flex; flex-direction:column; gap:10px;}\n  .fill-row{display:flex; gap:12px; align-items:center;}\n  .fill-row .vie{flex:0 0 48%; min-width:160px; color:var(--muted);}\n  .fill-row input{ flex:1; padding:10px 12px; border-radius:10px; border:1px solid var(--input-muted-border); background: var(--input-muted-bg); color:var(--input-muted-text); transition:box-shadow 180ms, border-color 180ms, background-color 180ms; caret-color: var(--neon-primary); }\n  .fill-row input:focus{ outline:none; border-color: rgba(6,182,212,0.45); box-shadow: 0 6px 18px rgba(6,182,212,0.06); background: rgba(255,255,255,0.025); }\n  .fill-row input.correct{ border-color: rgba(16,185,129,0.7); box-shadow: 0 6px 18px rgba(16,185,129,0.04); background: rgba(16,185,129,0.02); }\n  .fill-row input.wrong{ border-color: rgba(244,63,94,0.7); box-shadow: 0 6px 18px rgba(244,63,94,0.03); background: rgba(244,63,94,0.01); }\n  .correct-answer{color: #10b981; font-size:12px; font-weight:700}\n  .wrong-answer{color: #ef4444; font-size:12px; font-weight:700}\n  \n  @media (max-width:880px){ .g-layout{grid-template-columns:1fr; flex-direction: column;} .g-card{flex-basis:100%; width:100%;} }\n  \n  .mif-inline-box { margin-top: 15px; padding: 12px; background: #eef2ff; border: 1px dashed #a5b4fc; border-radius: 8px; }\n  .mif-inline-btn { display: flex; align-items: flex-start; gap: 8px; background: #fff; border: 1px solid #cbd5e1; padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: 0.2s; color: #475569; line-height: 1.4; }\n  .mif-inline-btn:hover { border-color: #6366f1; background: #fafafa; }\n  .mif-inline-btn.selected { background: #6366f1; color: #fff; border-color: #6366f1; box-shadow: 0 2px 4px rgba(99,102,241,0.3); }\n  .mif-inline-btn.selected .q-num-s { color: #fff; }\n  .mif-inline-btn.hidden-by-other { display: none !important; }\n\n</style></head>\n<body>\n<div id=\"hl-toolbar\">\n  <button class=\"hl-btn-item\" onmousedown=\"applyHighlight(event)\">Highlight</button>\n  <button class=\"hl-btn-item\" onmousedown=\"applyNote(event)\">Note</button>\n</div>\n\n<div class=\"top-bar\">\n    <div style=\"display:flex;align-items:center;gap:15px;\">\n        <select id=\"lesson-selector\" onchange=\"switchLesson(this.value)\" style=\"padding:6px 12px; border-radius:6px; font-weight:bold; border:1px solid #cbd5e1; outline:none; cursor:pointer; background:#f8fafc; color:#334155;\"></select>\n        <div class=\"timer\" id=\"timer\">--:--</div>\n        <button class=\"game-btn\" onclick=\"toggleGame()\">🎮 Play Vocab Game</button>\n\t\t<button class=\"game-btn\" onclick=\"toggleMifMode()\" style=\"background:#8b5cf6;color:#fff\">🎯 Luyện Mif</button>\n    </div>\n    <div class=\"progress-container\" id=\"progressBar\"></div>\n    <div style=\"display:flex; align-items:center;\">\n        <button class=\"check-btn\" id=\"saveBtn\" onclick=\"saveResult()\" style=\"display:none; background:#f59e0b; margin-right:8px;\">SAVE RESULT</button>\n        <button class=\"check-btn\" onclick=\"check()\" id=\"submitBtn\">SUBMIT</button>\n    </div>\n</div>\n\n<div id=\"reading-view\" class=\"container\">\n  <div class=\"pane left\" id=\"lp\"><h2 style=\"font-size:18px; font-weight:700; color:#334155; margin-bottom:15px\">Reading Passage</h2><div id=\"articleArea\"></div></div>\n  <div class=\"resizer\" id=\"rs\"></div>\n  <div class=\"pane right\"><h2 style=\"font-size:18px; font-weight:700; color:#334155; margin-bottom:15px\">Questions</h2><div id=\"headingsArea\"></div><div id=\"qs\"></div></div>\n</div>\n\n<div id=\"game-view\">\n  <div class=\"g-container\">\n    <header class=\"g-header\">\n      <h1 class=\"g-h1\">Vocabulary Matching Game</h1>\n      <div class=\"g-controls\">\n        <div class=\"g-badge\" id=\"score\">Đúng: 0 / 0</div>\n        <button class=\"g-btn\" id=\"shuffleBtn\">Trộn</button>\n        <button class=\"g-btn\" id=\"resetBtn\">Làm lại</button>\n        <button class=\"g-btn\" style=\"background:linear-gradient(90deg,#ef4444,#dc2626);color:#fff\" onclick=\"toggleGame()\">Close Game</button>\n      </div>\n    </header>\n\n    <section class=\"g-card\" style=\"margin-bottom:12px;\">\n      <h3 style=\"margin-top:0; color:var(--accent)\">Flashcards Ôn Tập</h3>\n      <div style=\"display:flex; gap:12px; align-items:center; flex-wrap:wrap;\">\n        <div class=\"flash-wrap\">\n          <div id=\"flashcard\" class=\"flashcard\" tabindex=\"0\" role=\"button\" aria-pressed=\"false\">\n            <div class=\"flash-face front\" id=\"flashFront\">Nhấn Next để bắt đầu</div>\n            <div class=\"flash-face back\" id=\"flashBack\">Back</div>\n          </div>\n        </div>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"display:flex; gap:8px;\">\n            <button class=\"g-btn\" id=\"prevCard\">Prev</button>\n            <button class=\"g-btn\" id=\"flipCard\">Flip</button>\n            <button class=\"g-btn\" id=\"nextCard\">Next</button>\n          </div>\n          <div style=\"display:flex; gap:8px;\">\n            <button class=\"g-btn\" id=\"autoPlay\">Auto</button>\n            <button class=\"g-btn\" id=\"showBoth\">Show Both</button>\n          </div>\n        </div>\n      </div>\n      <div class=\"small\" style=\"margin-top:8px; color:var(--muted); font-size:13px\">Nhấn flashcard để lật. Auto sẽ tự chuyển sau 2s. Show Both hiển thị cả 2 mặt tạm thời.</div>\n    </section>\n\n    <section class=\"g-layout\">\n      <div class=\"g-card\">\n        <h3 style=\"margin-top:0; color:var(--accent)\">Phần 1 Matching</h3>\n        <div class=\"small\" style=\"color:var(--muted); font-size:13px\">Kéo nghĩa vào ô tương ứng. Hoặc chạm để chọn rồi chạm vào ô.</div>\n        <div class=\"g-list\" id=\"engList\" style=\"margin-top:12px;\"></div>\n      </div>\n      <div class=\"g-card\">\n        <h3 style=\"margin-top:0; color:var(--accent)\">Phần 2 Vietnamese</h3>\n        <div class=\"g-vie-list\" id=\"vieList\" style=\"margin-top:12px;\"></div>\n      </div>\n    </section>\n\n    <section class=\"g-card\" style=\"margin-top:12px; margin-bottom: 50px;\">\n      <h3 style=\"margin-top:0; color:var(--accent)\">Bài Điền Chữ</h3>\n      <div class=\"small\" style=\"color:var(--muted); font-size:13px\">Bên trái là tiếng Việt, bên phải học sinh điền tiếng Anh. Nhấn Kiểm tra để chấm.</div>\n      <div style=\"margin-top:10px;\">\n        <div class=\"fill-list\" id=\"fillList\"></div>\n        <div style=\"margin-top:10px; display:flex; gap:8px; align-items:center;\">\n          <button class=\"g-btn\" id=\"checkFill\">Kiểm tra</button>\n          <button class=\"g-btn\" id=\"showAnswers\">Hiện đáp án</button>\n          <button class=\"g-btn\" id=\"resetFill\">Làm lại</button>\n          <div class=\"small\" id=\"fillScore\" style=\"align-self:center; color:var(--muted); font-size:13px\">Điểm: 0 / 0</div>\n        </div>\n      </div>\n    </section>\n  </div>\n</div>\n\n<div id=\"mif-view\">\n  <div class=\"mif-header\">\n    <h2 id=\"mif-title\" style=\"margin:0;color:#4338ca;font-size:18px\">Luyện Mif: Đoạn ...</h2>\n    <button class=\"mif-nav-btn\" style=\"background:#ef4444\" onclick=\"toggleMifMode()\">Đóng</button>\n  </div>\n  <div class=\"mif-body\">\n    <div class=\"mif-left\">\n      <div class=\"mif-col-container\">\n        <div class=\"mif-col\" id=\"mif-en-col\"></div>\n        <div class=\"mif-col\" id=\"mif-vi-col\"></div>\n      </div>\n    </div>\n    <div class=\"mif-right\">\n      <div id=\"mif-qs-container\" style=\"flex:1; overflow-y:auto; padding-bottom:20px;\"></div>\n      <div style=\"display:flex; justify-content:space-between; border-top:2px solid #cbd5e1; padding-top:15px; margin-top:10px;\">\n        <button class=\"mif-nav-btn\" id=\"mif-prev\" onclick=\"navMif(-1)\">⬅ Back</button>\n        <button class=\"mif-nav-btn\" id=\"mif-next\" onclick=\"navMif(1)\">Next ➡</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n<div id=\"popup\"></div>\n<div class=\"confetti\" id=\"confetti\"></div>\n\n<script>\n// --- MULTI-LESSON DATA INJECTION ---\nconst lessonsData = [{\"name\":\"Passage 1\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">Gerry Marten and Dona Glee Williams report on \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v0\\\">reliance\\u003c/span> on the Indian village of Punukula, which was nearly destroyed by \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v1\\\">dependence\\u003c/span> on \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v3\\\">pesticides\\u003c/span>. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Gerry Marten và Dona Glee Williams báo cáo về sự phụ thuộc vào ngôi làng Punukula của Ấn Độ, nơi gần như bị phá hủy do phụ thuộc vào thuốc trừ sâu. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">Around 20 years ago, a handful of families \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v2\\\">migrated\\u003c/span> from the Guntur district of Andhra Pradesh, south-east India, to Punukula, a community of approximately 900 people farming plots of 2 to 10 acres. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">The newcomers introduced cotton farming, attracting local farmers with the promise of greater profits than the mixed crops they were growing for food and sale, such as millet, mung beans, chilli, and rice. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">However, cotton farming required the use of \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v3\\\">pesticides\\u003c/span> and fertilisers, which were unfamiliar to the mostly illiterate local farmers. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Khoảng 20 năm trước, một số gia đình đã di cư từ quận Guntur của Andhra Pradesh, phía đông nam Ấn Độ đến Punukula, một cộng đồng khoảng 900 người canh tác trên các mảnh đất rộng từ 2 đến 10 mẫu Anh. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Những người mới đến đã giới thiệu nghề trồng bông, thu hút nông dân địa phương với hứa hẹn mang lại lợi nhuận lớn hơn các loại cây trồng hỗn hợp mà họ trồng để lấy lương thực và bán, chẳng hạn như kê, đậu xanh, ớt và lúa. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Tuy nhiên, việc trồng bông đòi hỏi phải sử dụng thuốc trừ sâu và phân bón, những thứ không quen thuộc với hầu hết nông dân địa phương mù chữ. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">Local agrochemical dealers filled the need for information and \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v4\\\">supplies\\u003c/span>. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">These \\\"middlemen\\\" sold commercial seeds, fertilisers, and \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">insecticides\\u003c/span> on credit, guaranteeing the purchase of the crops. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">They also provided \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v6\\\">technical advice\\u003c/span> supplied by the companies that sold their products. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">Farmers depended on the dealers, and if they wanted to grow cotton — which they did — they had no other option. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Các đại lý hóa chất nông nghiệp địa phương đáp ứng nhu cầu về thông tin và nguồn cung cấp. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Những \\\"người trung gian\\\" này bán tín dụng hạt giống, phân bón và thuốc trừ sâu thương mại để đảm bảo mua được cây trồng. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Họ cũng cung cấp lời khuyên kỹ thuật do các công ty bán sản phẩm của họ cung cấp. \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Nông dân phụ thuộc vào các đại lý, và nếu họ muốn trồng bông - điều họ đã làm - thì họ không có lựa chọn nào khác. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph D\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s0\\\">Initially, the high yields and incomes from cotton farming attracted farmers. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s1\\\">The \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v7\\\">outlay\\u003c/span> for \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">insecticides\\u003c/span> was low, as cotton pests had not yet arrived. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s2\\\">Many farmers were so impressed by the chemicals that they started using them on other crops. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s3\\\">The immediate benefits from cotton farming \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v8\\\">masked\\u003c/span> the environmental \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v9\\\">degradation\\u003c/span> that was happening as a result. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t3')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t3\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p3s0\\\" class=\\\"vi-sent\\\">Ban đầu, sản lượng và thu nhập cao từ trồng bông đã thu hút nông dân. \\u003c/span>\\u003cspan id=\\\"p3s1\\\" class=\\\"vi-sent\\\">Chi phí cho thuốc trừ sâu thấp vì sâu hại bông vẫn chưa xuất hiện. \\u003c/span>\\u003cspan id=\\\"p3s2\\\" class=\\\"vi-sent\\\">Nhiều nông dân bị ấn tượng bởi các loại hóa chất này nên họ bắt đầu sử dụng chúng trên các loại cây trồng khác. \\u003c/span>\\u003cspan id=\\\"p3s3\\\" class=\\\"vi-sent\\\">Những lợi ích trước mắt từ việc trồng bông đã che giấu sự suy thoái môi trường đang diễn ra. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph E\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s0\\\">Soon, cotton-eating pests, like bollworms and aphids, plagued the fields. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s1\\\">Repeated pesticide spraying killed the most \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v10\\\">vulnerable\\u003c/span> pests, leaving the stronger ones to reproduce and pass on their \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v11\\\">resistance\\u003c/span>. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s2\\\">As the pests grew tougher, farmers applied more \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">insecticides\\u003c/span>, sometimes mixing as many as ten different chemicals. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s3\\\">At the same time, cotton farming \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v12\\\">depleted\\u003c/span> the soil of nutrients, forcing farmers to use more fertilisers. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t4')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t4\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p4s0\\\" class=\\\"vi-sent\\\">Chẳng bao lâu sau, các loài gây hại ăn bông, như sâu đục quả bông và rệp, tàn phá các cánh đồng. \\u003c/span>\\u003cspan id=\\\"p4s1\\\" class=\\\"vi-sent\\\">Việc phun thuốc trừ sâu lặp đi lặp lại đã giết chết những loài gây hại dễ bị tổn thương nhất, để lại những loài mạnh hơn sinh sản và truyền lại khả năng kháng thuốc. \\u003c/span>\\u003cspan id=\\\"p4s2\\\" class=\\\"vi-sent\\\">Khi sâu bệnh ngày càng mạnh hơn, nông dân áp dụng nhiều thuốc trừ sâu hơn, đôi khi trộn tới mười loại hóa chất khác nhau. \\u003c/span>\\u003cspan id=\\\"p4s3\\\" class=\\\"vi-sent\\\">Đồng thời, việc trồng bông làm cạn kiệt chất dinh dưỡng trong đất, buộc nông dân phải sử dụng nhiều phân bón hơn. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph F\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s0\\\">By the time some farmers tried to break free from their chemical \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v1\\\">dependence\\u003c/span>, \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">insecticides\\u003c/span> had already wiped out many of the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v13\\\">natural predators\\u003c/span>, such as birds, wasps, and beetles, that previously controlled the pests. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s1\\\">Without these predators, the pests \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v14\\\">flourished\\u003c/span> if the use of \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">insecticides\\u003c/span> was reduced. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s2\\\">As the costs of fertilisers and \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">insecticides\\u003c/span> increased, the cost of cotton production soared, and many farmers fell deeper into debt. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t5')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t5\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p5s0\\\" class=\\\"vi-sent\\\">Vào thời điểm một số nông dân cố gắng thoát khỏi sự phụ thuộc vào hóa chất, thuốc trừ sâu đã tiêu diệt nhiều loài săn mồi tự nhiên như chim, ong bắp cày và bọ cánh cứng, những loài trước đây đã kiểm soát sâu bệnh. \\u003c/span>\\u003cspan id=\\\"p5s1\\\" class=\\\"vi-sent\\\">Nếu không có những kẻ săn mồi này, sâu bệnh sẽ phát triển mạnh nếu việc sử dụng thuốc trừ sâu giảm đi. \\u003c/span>\\u003cspan id=\\\"p5s2\\\" class=\\\"vi-sent\\\">Khi chi phí phân bón và thuốc trừ sâu tăng lên, chi phí sản xuất bông tăng vọt và nhiều nông dân lâm vào cảnh nợ nần chồng chất. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph G\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s0\\\">The cycle of chemical \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v1\\\">dependence\\u003c/span> was broken when a respected village elder decided to \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v15\\\">experiment\\u003c/span> with a different method. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s1\\\">He was one of the first to grow cotton and would become the first to try it without chemicals. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s2\\\">The approach was part of a programme in Non-Pesticide Management (NPM), developed with the help of an NGO called SECURE, which had recognized the environmental and \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v16\\\">financial difficulties\\u003c/span> caused by chemical farming. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t6')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t6\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p6s0\\\" class=\\\"vi-sent\\\">Chu kỳ phụ thuộc vào hóa chất đã bị phá vỡ khi một già làng đáng kính quyết định thử nghiệm một phương pháp khác. \\u003c/span>\\u003cspan id=\\\"p6s1\\\" class=\\\"vi-sent\\\">Ông là một trong những người đầu tiên trồng bông và sẽ là người đầu tiên thử trồng bông mà không dùng hóa chất. \\u003c/span>\\u003cspan id=\\\"p6s2\\\" class=\\\"vi-sent\\\">Cách tiếp cận này là một phần của chương trình Quản lý không dùng thuốc trừ sâu (NPM), được phát triển với sự giúp đỡ của một tổ chức phi chính phủ có tên là SECURE, tổ chức đã nhận ra những khó khăn về môi trường và tài chính do canh tác bằng hóa chất gây ra. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph H\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s0\\\">NPM involved the use of neem, a fast-growing evergreen tree related to mahogany, which naturally \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v17\\\">repels\\u003c/span> insects. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p7s1\\\">Neem produces \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v3\\\">pesticides\\u003c/span> that are harmless to humans and animals, including the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v18\\\">beneficial insects\\u003c/span> that eat pests. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t7')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t7\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p7s0\\\" class=\\\"vi-sent\\\">NPM liên quan đến việc sử dụng cây neem, một loại cây thường xanh phát triển nhanh có họ hàng với gỗ gụ, có tác dụng xua đuổi côn trùng một cách tự nhiên. \\u003c/span>\\u003cspan id=\\\"p7s1\\\" class=\\\"vi-sent\\\">Neem sản xuất thuốc trừ sâu vô hại với con người và động vật, bao gồm cả các côn trùng có ích ăn sâu bệnh. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph I\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p8s0\\\">Neem is native to India and Burma, where it has been used for centuries for pest control and health benefits. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p8s1\\\">To use neem for cotton farming, seeds are ground into a powder, \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v19\\\">soaked\\u003c/span> overnight in water, and sprayed onto the crop every 10 days. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p8s2\\\">Neem cake, which is applied to the soil, kills pests and acts as an organic fertiliser rich in nitrogen. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p8s3\\\">Neem is locally grown and \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v20\\\">inexpensive\\u003c/span> compared to chemical \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">insecticides\\u003c/span>, making it a cost-effective alternative. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t8')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t8\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p8s0\\\" class=\\\"vi-sent\\\">Neem có nguồn gốc từ Ấn Độ và Miến Điện, nơi nó đã được sử dụng trong nhiều thế kỷ để kiểm soát sâu bệnh và mang lại lợi ích cho sức khỏe. \\u003c/span>\\u003cspan id=\\\"p8s1\\\" class=\\\"vi-sent\\\">Để sử dụng cây neem để trồng bông, hạt được nghiền thành bột, ngâm qua đêm trong nước và phun lên cây trồng 10 ngày một lần. \\u003c/span>\\u003cspan id=\\\"p8s2\\\" class=\\\"vi-sent\\\">Bánh neem được bón vào đất có tác dụng tiêu diệt sâu bệnh và hoạt động như một loại phân bón hữu cơ giàu nitơ. \\u003c/span>\\u003cspan id=\\\"p8s3\\\" class=\\\"vi-sent\\\">Neem được trồng tại địa phương và rẻ tiền so với thuốc trừ sâu hóa học, khiến nó trở thành một giải pháp thay thế hiệu quả về mặt chi phí. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph J\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p9s0\\\">Farmers quickly saw the benefits of NPM, with harvests as good as those from \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v21\\\">chemical-dependent\\u003c/span> cotton farming, and they saved money by not buying \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">insecticides\\u003c/span>. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p9s1\\\">Instead of spending \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v22\\\">scarce\\u003c/span> cash on chemicals, they invested time and effort into NPM practices. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p9s2\\\">By the end of 2000, all farmers in Punukula had switched to NPM, and they began using it on other crops as well. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p9s3\\\">The status and economic opportunities for women improved, and NPM practices spread, as women began gathering neem seeds to sell to other villages. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t9')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t9\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p9s0\\\" class=\\\"vi-sent\\\">Nông dân nhanh chóng nhận thấy lợi ích của NPM, với thu hoạch tốt như trồng bông phụ thuộc vào hóa chất và họ tiết kiệm tiền bằng cách không mua thuốc trừ sâu. \\u003c/span>\\u003cspan id=\\\"p9s1\\\" class=\\\"vi-sent\\\">Thay vì chi tiền mặt khan hiếm cho hóa chất, họ đầu tư thời gian và công sức vào các hoạt động NPM. \\u003c/span>\\u003cspan id=\\\"p9s2\\\" class=\\\"vi-sent\\\">Đến cuối năm 2000, tất cả nông dân ở Punukula đã chuyển sang sử dụng NPM và họ cũng bắt đầu sử dụng nó trên các loại cây trồng khác. \\u003c/span>\\u003cspan id=\\\"p9s3\\\" class=\\\"vi-sent\\\">Địa vị và cơ hội kinh tế cho phụ nữ được cải thiện và các hoạt động NPM lan rộng khi phụ nữ bắt đầu thu thập hạt neem để bán cho các làng khác. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph K\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p10s0\\\">In 2004, the village government \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v23\\\">declared\\u003c/span> Punukula a pesticide-free village. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p10s1\\\">The village now serves as a model for spreading NPM to other communities, with approximately 2,000 farmers visiting each year. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p10s2\\\">What began with a few farmers trying to escape the dangers of \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v3\\\">pesticides\\u003c/span> has grown into a movement with the potential to help an entire region \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v24\\\">recover\\u003c/span> from \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v25\\\">ecological disaster\\u003c/span>. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t10')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t10\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p10s0\\\" class=\\\"vi-sent\\\">Năm 2004, chính quyền làng tuyên bố Punukula là ngôi làng không có thuốc trừ sâu. \\u003c/span>\\u003cspan id=\\\"p10s1\\\" class=\\\"vi-sent\\\">Ngôi làng hiện đóng vai trò là hình mẫu để truyền bá NPM đến các cộng đồng khác, với khoảng 2.000 nông dân đến thăm mỗi năm. \\u003c/span>\\u003cspan id=\\\"p10s2\\\" class=\\\"vi-sent\\\">Bắt đầu từ việc một số nông dân cố gắng thoát khỏi sự nguy hiểm của thuốc trừ sâu đã phát triển thành một phong trào có khả năng giúp cả một khu vực phục hồi sau thảm họa sinh thái. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"tfng\",\"text\":\"Cotton growing was expected to raise more money than other crops.\",\"options\":[],\"correctAnswer\":\"TRUE\",\"location\":\"The newcomers introduced cotton farming\",\"_orderId\":1},{\"id\":2,\"type\":\"tfng\",\"text\":\"Some of the local agro-chemical dealers had been farmers in the past.\",\"options\":[],\"correctAnswer\":\"NOT GIVEN\",\"location\":\"\",\"_orderId\":2},{\"id\":3,\"type\":\"tfng\",\"text\":\"Initially the farmers’ cotton yields were low.\",\"options\":[],\"correctAnswer\":\"FALSE\",\"location\":\"Initially, the high yields and incomes from cotton farming attracted\",\"_orderId\":3},{\"id\":4,\"type\":\"tfng\",\"text\":\"At first, the farmers failed to notice the negative effects on their fields of pesticide use.\",\"options\":[],\"correctAnswer\":\"TRUE\",\"location\":\"The immediate benefits\",\"_orderId\":4},{\"type\":\"gap-fill-block\",\"id\":5,\"text\":\"Complete the notes below.\\nChoose <b>NO MORE THAN TWO WORDS</b> from the passage for each answer.\\nNon-Pesticide-Management Programme\\n•\\tDeveloped with the aid of SECURE\\n•\\tBased on the use of an 5) _____________\\n•\\tNeem contains many 6) _____________ that target plant-eating predators\\n•\\tNeem:\\n•\\tUsed as a pesticide\\n•\\t7) _____________ formed by grinding seeds\\n•\\tLeft 8) _____________ to soak in water\\n•\\tSprayed regularly\\n•\\tUsed as a pesticide and as a fertilizer\\n•\\tAdded in 9) _____________ form to soil\\n•\\tContains a lot of 10) _____________\\n<b>Questions 11-13</b>\\nChoose <b>NO MORE THAN TWO WORDS AND/OR A NUMBER</b> from the passage for each answer.\\n11 _____________ In which year did farmers finally stop using chemicals on cotton crops in Punukula?\\n12 _____________ What did the women of Punukula collect to make money?\\n13 _____________ What project do the authorities in Punukula hope to set up in the future?\",\"gapIds\":[5,6,7,8,9,10,11,12,13],\"answers\":{\"5\":\"Evergreen tree\",\"6\":\"Natural pesticides\",\"7\":\"A powder\",\"8\":\"Overnight\",\"9\":\"Cake\",\"10\":\"Nitrogen\",\"11\":\"2000\",\"12\":\"Neem seeds\",\"13\":\"Water purification\"},\"locations\":{\"5\":\"a fast-growing evergreen tree\",\"6\":\"Neem produces pesticides that are harmless\",\"7\":\"Seeds are ground into a powder\",\"8\":\"Soaked overnight in water\",\"9\":\"applied to the soil\",\"10\":\"acts as an organic fertiliser rich in nitrogen\",\"11\":\"By the end of 2000, all farmers\",\"12\":\"Women began gathering neem seeds to\",\"13\":\"the village government declared Punukula\"},\"_orderId\":5}],\"vocab\":[{\"id\":\"v0\",\"word\":\"reliance\",\"meaning\":\"sự phụ thuộc (dependence, trust)\",\"synonym\":\"His reliance on technology is increasing. (Sự phụ thuộc của anh ấy vào công nghệ ngày càng tăng.)\",\"example\":\"\"},{\"id\":\"v1\",\"word\":\"dependence\",\"meaning\":\"sự lệ thuộc (reliance, addiction)\",\"synonym\":\"The country’s dependence on imports is high. (Sự lệ thuộc của đất nước vào nhập khẩu rất lớn.)\",\"example\":\"\"},{\"id\":\"v2\",\"word\":\"migrated\",\"meaning\":\"di cư (moved, relocated)\",\"synonym\":\"Birds migrated south for winter. (Chim di cư về phía nam để tránh rét.)\",\"example\":\"\"},{\"id\":\"v3\",\"word\":\"pesticides\",\"meaning\":\"thuốc trừ sâu (chemicals for crops)\",\"synonym\":\"Farmers use pesticides to protect plants. (Nông dân dùng thuốc trừ sâu để bảo vệ cây trồng.)\",\"example\":\"\"},{\"id\":\"v4\",\"word\":\"supplies\",\"meaning\":\"nguồn cung, vật tư (provisions, resources)\",\"synonym\":\"The army received food supplies. (Quân đội nhận được nguồn cung thực phẩm.)\",\"example\":\"\"},{\"id\":\"v5\",\"word\":\"insecticides\",\"meaning\":\"thuốc diệt côn trùng (bug killers)\",\"synonym\":\"Insecticides help reduce crop damage. (Thuốc diệt côn trùng giúp giảm hại mùa màng.)\",\"example\":\"\"},{\"id\":\"v6\",\"word\":\"technical advice\",\"meaning\":\"lời khuyên kỹ thuật (expert guidance)\",\"synonym\":\"He gave technical advice on farming. (Anh ấy đưa lời khuyên kỹ thuật về nông nghiệp.)\",\"example\":\"\"},{\"id\":\"v7\",\"word\":\"outlay\",\"meaning\":\"chi phí, khoản chi (expense, expenditure)\",\"synonym\":\"The project required a huge outlay. (Dự án cần khoản chi lớn.)\",\"example\":\"\"},{\"id\":\"v8\",\"word\":\"masked\",\"meaning\":\"che giấu, ngụy trang (hidden, disguised)\",\"synonym\":\"His anger was masked by a smile. (Cơn giận của anh ấy bị che giấu bằng nụ cười.)\",\"example\":\"\"},{\"id\":\"v9\",\"word\":\"degradation\",\"meaning\":\"sự suy thoái, xuống cấp (decline, deterioration)\",\"synonym\":\"Soil degradation affects farming. (Sự suy thoái đất ảnh hưởng đến nông nghiệp.)\",\"example\":\"\"},{\"id\":\"v10\",\"word\":\"vulnerable\",\"meaning\":\"dễ bị tổn thương (susceptible, exposed)\",\"synonym\":\"Children are vulnerable to disease. (Trẻ em dễ bị tổn thương trước bệnh tật.)\",\"example\":\"\"},{\"id\":\"v11\",\"word\":\"resistance\",\"meaning\":\"sự kháng cự, chống lại (opposition, immunity)\",\"synonym\":\"The bacteria developed resistance to antibiotics. (Vi khuẩn phát triển khả năng kháng thuốc.)\",\"example\":\"\"},{\"id\":\"v12\",\"word\":\"depleted\",\"meaning\":\"cạn kiệt (exhausted, reduced)\",\"synonym\":\"The forest resources are depleted. (Nguồn tài nguyên rừng đã cạn kiệt.)\",\"example\":\"\"},{\"id\":\"v13\",\"word\":\"natural predators\",\"meaning\":\"kẻ săn mồi tự nhiên (hunters in nature)\",\"synonym\":\"Owls are natural predators of mice. (Cú mèo là kẻ săn mồi tự nhiên của chuột.)\",\"example\":\"\"},{\"id\":\"v14\",\"word\":\"flourished\",\"meaning\":\"phát triển mạnh mẽ (thrived, prospered)\",\"synonym\":\"The town flourished during trade. (Thị trấn phát triển mạnh trong thời kỳ buôn bán.)\",\"example\":\"\"},{\"id\":\"v15\",\"word\":\"experiment\",\"meaning\":\"thí nghiệm (test, trial)\",\"synonym\":\"The scientist conducted an experiment. (Nhà khoa học tiến hành thí nghiệm.)\",\"example\":\"\"},{\"id\":\"v16\",\"word\":\"financial difficulties\",\"meaning\":\"khó khăn tài chính (money problems)\",\"synonym\":\"The company faced financial difficulties. (Công ty gặp khó khăn tài chính.)\",\"example\":\"\"},{\"id\":\"v17\",\"word\":\"repels\",\"meaning\":\"đẩy lùi, xua đuổi (drives away, resists)\",\"synonym\":\"This spray repels mosquitoes. (Loại thuốc xịt này xua đuổi muỗi.)\",\"example\":\"\"},{\"id\":\"v18\",\"word\":\"beneficial insects\",\"meaning\":\"côn trùng có lợi (helpful bugs)\",\"synonym\":\"Bees are beneficial insects for pollination. (Ong là côn trùng có lợi cho việc thụ phấn.)\",\"example\":\"\"},{\"id\":\"v19\",\"word\":\"soaked\",\"meaning\":\"ướt sũng, ngâm (wet, saturated)\",\"synonym\":\"The clothes were soaked in rain. (Quần áo bị ướt sũng trong mưa.)\",\"example\":\"\"},{\"id\":\"v20\",\"word\":\"inexpensive\",\"meaning\":\"rẻ, không đắt (cheap, affordable)\",\"synonym\":\"The book was inexpensive. (Cuốn sách khá rẻ.)\",\"example\":\"\"},{\"id\":\"v21\",\"word\":\"chemical-dependent\",\"meaning\":\"phụ thuộc hóa chất (reliant on chemicals)\",\"synonym\":\"The crops are chemical-dependent. (Cây trồng phụ thuộc vào hóa chất.)\",\"example\":\"\"},{\"id\":\"v22\",\"word\":\"scarce\",\"meaning\":\"khan hiếm (rare, limited)\",\"synonym\":\"Water is scarce in deserts. (Nước khan hiếm ở sa mạc.)\",\"example\":\"\"},{\"id\":\"v23\",\"word\":\"declared\",\"meaning\":\"tuyên bố (announced, proclaimed)\",\"synonym\":\"The results were officially declared. (Kết quả được tuyên bố chính thức.)\",\"example\":\"\"},{\"id\":\"v24\",\"word\":\"recover\",\"meaning\":\"hồi phục (heal, regain)\",\"synonym\":\"He will recover soon. (Anh ấy sẽ hồi phục sớm.)\",\"example\":\"\"},{\"id\":\"v25\",\"word\":\"ecological disaster\",\"meaning\":\"thảm họa sinh thái (environmental catastrophe)\",\"synonym\":\"Oil spills cause ecological disasters. (Tràn dầu gây thảm họa sinh thái.)\",\"example\":\"\"}],\"headings\":[],\"headingKey\":{},\"mifRange\":\"\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[{\"eng\":\"reliance\",\"vie\":\"sự phụ thuộc (dependence, trust)\"},{\"eng\":\"dependence\",\"vie\":\"sự lệ thuộc (reliance, addiction)\"},{\"eng\":\"migrated\",\"vie\":\"di cư (moved, relocated)\"},{\"eng\":\"pesticides\",\"vie\":\"thuốc trừ sâu (chemicals for crops)\"},{\"eng\":\"supplies\",\"vie\":\"nguồn cung, vật tư (provisions, resources)\"},{\"eng\":\"insecticides\",\"vie\":\"thuốc diệt côn trùng (bug killers)\"},{\"eng\":\"technical advice\",\"vie\":\"lời khuyên kỹ thuật (expert guidance)\"},{\"eng\":\"outlay\",\"vie\":\"chi phí, khoản chi (expense, expenditure)\"},{\"eng\":\"masked\",\"vie\":\"che giấu, ngụy trang (hidden, disguised)\"},{\"eng\":\"degradation\",\"vie\":\"sự suy thoái, xuống cấp (decline, deterioration)\"},{\"eng\":\"vulnerable\",\"vie\":\"dễ bị tổn thương (susceptible, exposed)\"},{\"eng\":\"resistance\",\"vie\":\"sự kháng cự, chống lại (opposition, immunity)\"},{\"eng\":\"depleted\",\"vie\":\"cạn kiệt (exhausted, reduced)\"},{\"eng\":\"natural predators\",\"vie\":\"kẻ săn mồi tự nhiên (hunters in nature)\"},{\"eng\":\"flourished\",\"vie\":\"phát triển mạnh mẽ (thrived, prospered)\"},{\"eng\":\"experiment\",\"vie\":\"thí nghiệm (test, trial)\"},{\"eng\":\"financial difficulties\",\"vie\":\"khó khăn tài chính (money problems)\"},{\"eng\":\"repels\",\"vie\":\"đẩy lùi, xua đuổi (drives away, resists)\"},{\"eng\":\"beneficial insects\",\"vie\":\"côn trùng có lợi (helpful bugs)\"},{\"eng\":\"soaked\",\"vie\":\"ướt sũng, ngâm (wet, saturated)\"},{\"eng\":\"inexpensive\",\"vie\":\"rẻ, không đắt (cheap, affordable)\"},{\"eng\":\"chemical-dependent\",\"vie\":\"phụ thuộc hóa chất (reliant on chemicals)\"},{\"eng\":\"scarce\",\"vie\":\"khan hiếm (rare, limited)\"},{\"eng\":\"declared\",\"vie\":\"tuyên bố (announced, proclaimed)\"},{\"eng\":\"recover\",\"vie\":\"hồi phục (heal, regain)\"},{\"eng\":\"ecological disaster\",\"vie\":\"thảm họa sinh thái (environmental catastrophe)\"}],\"pData\":[{\"en\":[\"Gerry Marten and Dona Glee Williams report on reliance on the Indian village of Punukula, which was nearly destroyed by dependence on pesticides.\"],\"vi\":[\"Gerry Marten và Dona Glee Williams báo cáo về sự phụ thuộc vào ngôi làng Punukula của Ấn Độ, nơi gần như bị phá hủy do phụ thuộc vào thuốc trừ sâu.\"]},{\"en\":[\"Around 20 years ago, a handful of families migrated from the Guntur district of Andhra Pradesh, south-east India, to Punukula, a community of approximately 900 people farming plots of 2 to 10 acres.\",\"The newcomers introduced cotton farming, attracting local farmers with the promise of greater profits than the mixed crops they were growing for food and sale, such as millet, mung beans, chilli, and rice.\",\"However, cotton farming required the use of pesticides and fertilisers, which were unfamiliar to the mostly illiterate local farmers.\"],\"vi\":[\"Khoảng 20 năm trước, một số gia đình đã di cư từ quận Guntur của Andhra Pradesh, phía đông nam Ấn Độ đến Punukula, một cộng đồng khoảng 900 người canh tác trên các mảnh đất rộng từ 2 đến 10 mẫu Anh.\",\"Những người mới đến đã giới thiệu nghề trồng bông, thu hút nông dân địa phương với hứa hẹn mang lại lợi nhuận lớn hơn các loại cây trồng hỗn hợp mà họ trồng để lấy lương thực và bán, chẳng hạn như kê, đậu xanh, ớt và lúa.\",\"Tuy nhiên, việc trồng bông đòi hỏi phải sử dụng thuốc trừ sâu và phân bón, những thứ không quen thuộc với hầu hết nông dân địa phương mù chữ.\"]},{\"en\":[\"Local agrochemical dealers filled the need for information and supplies.\",\"These \\\"middlemen\\\" sold commercial seeds, fertilisers, and insecticides on credit, guaranteeing the purchase of the crops.\",\"They also provided technical advice supplied by the companies that sold their products.\",\"Farmers depended on the dealers, and if they wanted to grow cotton — which they did — they had no other option.\"],\"vi\":[\"Các đại lý hóa chất nông nghiệp địa phương đáp ứng nhu cầu về thông tin và nguồn cung cấp.\",\"Những \\\"người trung gian\\\" này bán tín dụng hạt giống, phân bón và thuốc trừ sâu thương mại để đảm bảo mua được cây trồng.\",\"Họ cũng cung cấp lời khuyên kỹ thuật do các công ty bán sản phẩm của họ cung cấp.\",\"Nông dân phụ thuộc vào các đại lý, và nếu họ muốn trồng bông - điều họ đã làm - thì họ không có lựa chọn nào khác.\"]},{\"en\":[\"Initially, the high yields and incomes from cotton farming attracted farmers.\",\"The outlay for insecticides was low, as cotton pests had not yet arrived.\",\"Many farmers were so impressed by the chemicals that they started using them on other crops.\",\"The immediate benefits from cotton farming masked the environmental degradation that was happening as a result.\"],\"vi\":[\"Ban đầu, sản lượng và thu nhập cao từ trồng bông đã thu hút nông dân.\",\"Chi phí cho thuốc trừ sâu thấp vì sâu hại bông vẫn chưa xuất hiện.\",\"Nhiều nông dân bị ấn tượng bởi các loại hóa chất này nên họ bắt đầu sử dụng chúng trên các loại cây trồng khác.\",\"Những lợi ích trước mắt từ việc trồng bông đã che giấu sự suy thoái môi trường đang diễn ra.\"]},{\"en\":[\"Soon, cotton-eating pests, like bollworms and aphids, plagued the fields.\",\"Repeated pesticide spraying killed the most vulnerable pests, leaving the stronger ones to reproduce and pass on their resistance.\",\"As the pests grew tougher, farmers applied more insecticides, sometimes mixing as many as ten different chemicals.\",\"At the same time, cotton farming depleted the soil of nutrients, forcing farmers to use more fertilisers.\"],\"vi\":[\"Chẳng bao lâu sau, các loài gây hại ăn bông, như sâu đục quả bông và rệp, tàn phá các cánh đồng.\",\"Việc phun thuốc trừ sâu lặp đi lặp lại đã giết chết những loài gây hại dễ bị tổn thương nhất, để lại những loài mạnh hơn sinh sản và truyền lại khả năng kháng thuốc.\",\"Khi sâu bệnh ngày càng mạnh hơn, nông dân áp dụng nhiều thuốc trừ sâu hơn, đôi khi trộn tới mười loại hóa chất khác nhau.\",\"Đồng thời, việc trồng bông làm cạn kiệt chất dinh dưỡng trong đất, buộc nông dân phải sử dụng nhiều phân bón hơn.\"]},{\"en\":[\"By the time some farmers tried to break free from their chemical dependence, insecticides had already wiped out many of the natural predators, such as birds, wasps, and beetles, that previously controlled the pests.\",\"Without these predators, the pests flourished if the use of insecticides was reduced.\",\"As the costs of fertilisers and insecticides increased, the cost of cotton production soared, and many farmers fell deeper into debt.\"],\"vi\":[\"Vào thời điểm một số nông dân cố gắng thoát khỏi sự phụ thuộc vào hóa chất, thuốc trừ sâu đã tiêu diệt nhiều loài săn mồi tự nhiên như chim, ong bắp cày và bọ cánh cứng, những loài trước đây đã kiểm soát sâu bệnh.\",\"Nếu không có những kẻ săn mồi này, sâu bệnh sẽ phát triển mạnh nếu việc sử dụng thuốc trừ sâu giảm đi.\",\"Khi chi phí phân bón và thuốc trừ sâu tăng lên, chi phí sản xuất bông tăng vọt và nhiều nông dân lâm vào cảnh nợ nần chồng chất.\"]},{\"en\":[\"The cycle of chemical dependence was broken when a respected village elder decided to experiment with a different method.\",\"He was one of the first to grow cotton and would become the first to try it without chemicals.\",\"The approach was part of a programme in Non-Pesticide Management (NPM), developed with the help of an NGO called SECURE, which had recognized the environmental and financial difficulties caused by chemical farming.\"],\"vi\":[\"Chu kỳ phụ thuộc vào hóa chất đã bị phá vỡ khi một già làng đáng kính quyết định thử nghiệm một phương pháp khác.\",\"Ông là một trong những người đầu tiên trồng bông và sẽ là người đầu tiên thử trồng bông mà không dùng hóa chất.\",\"Cách tiếp cận này là một phần của chương trình Quản lý không dùng thuốc trừ sâu (NPM), được phát triển với sự giúp đỡ của một tổ chức phi chính phủ có tên là SECURE, tổ chức đã nhận ra những khó khăn về môi trường và tài chính do canh tác bằng hóa chất gây ra.\"]},{\"en\":[\"NPM involved the use of neem, a fast-growing evergreen tree related to mahogany, which naturally repels insects.\",\"Neem produces pesticides that are harmless to humans and animals, including the beneficial insects that eat pests.\"],\"vi\":[\"NPM liên quan đến việc sử dụng cây neem, một loại cây thường xanh phát triển nhanh có họ hàng với gỗ gụ, có tác dụng xua đuổi côn trùng một cách tự nhiên.\",\"Neem sản xuất thuốc trừ sâu vô hại với con người và động vật, bao gồm cả các côn trùng có ích ăn sâu bệnh.\"]},{\"en\":[\"Neem is native to India and Burma, where it has been used for centuries for pest control and health benefits.\",\"To use neem for cotton farming, seeds are ground into a powder, soaked overnight in water, and sprayed onto the crop every 10 days.\",\"Neem cake, which is applied to the soil, kills pests and acts as an organic fertiliser rich in nitrogen.\",\"Neem is locally grown and inexpensive compared to chemical insecticides, making it a cost-effective alternative.\"],\"vi\":[\"Neem có nguồn gốc từ Ấn Độ và Miến Điện, nơi nó đã được sử dụng trong nhiều thế kỷ để kiểm soát sâu bệnh và mang lại lợi ích cho sức khỏe.\",\"Để sử dụng cây neem để trồng bông, hạt được nghiền thành bột, ngâm qua đêm trong nước và phun lên cây trồng 10 ngày một lần.\",\"Bánh neem được bón vào đất có tác dụng tiêu diệt sâu bệnh và hoạt động như một loại phân bón hữu cơ giàu nitơ.\",\"Neem được trồng tại địa phương và rẻ tiền so với thuốc trừ sâu hóa học, khiến nó trở thành một giải pháp thay thế hiệu quả về mặt chi phí.\"]},{\"en\":[\"Farmers quickly saw the benefits of NPM, with harvests as good as those from chemical-dependent cotton farming, and they saved money by not buying insecticides.\",\"Instead of spending scarce cash on chemicals, they invested time and effort into NPM practices.\",\"By the end of 2000, all farmers in Punukula had switched to NPM, and they began using it on other crops as well.\",\"The status and economic opportunities for women improved, and NPM practices spread, as women began gathering neem seeds to sell to other villages.\"],\"vi\":[\"Nông dân nhanh chóng nhận thấy lợi ích của NPM, với thu hoạch tốt như trồng bông phụ thuộc vào hóa chất và họ tiết kiệm tiền bằng cách không mua thuốc trừ sâu.\",\"Thay vì chi tiền mặt khan hiếm cho hóa chất, họ đầu tư thời gian và công sức vào các hoạt động NPM.\",\"Đến cuối năm 2000, tất cả nông dân ở Punukula đã chuyển sang sử dụng NPM và họ cũng bắt đầu sử dụng nó trên các loại cây trồng khác.\",\"Địa vị và cơ hội kinh tế cho phụ nữ được cải thiện và các hoạt động NPM lan rộng khi phụ nữ bắt đầu thu thập hạt neem để bán cho các làng khác.\"]},{\"en\":[\"In 2004, the village government declared Punukula a pesticide-free village.\",\"The village now serves as a model for spreading NPM to other communities, with approximately 2,000 farmers visiting each year.\",\"What began with a few farmers trying to escape the dangers of pesticides has grown into a movement with the potential to help an entire region recover from ecological disaster.\"],\"vi\":[\"Năm 2004, chính quyền làng tuyên bố Punukula là ngôi làng không có thuốc trừ sâu.\",\"Ngôi làng hiện đóng vai trò là hình mẫu để truyền bá NPM đến các cộng đồng khác, với khoảng 2.000 nông dân đến thăm mỗi năm.\",\"Bắt đầu từ việc một số nông dân cố gắng thoát khỏi sự nguy hiểm của thuốc trừ sâu đã phát triển thành một phong trào có khả năng giúp cả một khu vực phục hồi sau thảm họa sinh thái.\"]}],\"timeLimit\":20}];\n\nlet currentLessonIndex = 0;\nlet qs, vocab, headings, headingKey, mifRange, removeOpt, removeFeatureOpt, pairs, pData;\n\nlet timeLeft = 0;\nlet timerInterval;\nconst timerEl = document.getElementById('timer');\n\nfunction startTimer() {\n    timerInterval = setInterval(() => {\n        if(timeLeft <= 0) {\n            clearInterval(timerInterval);\n            timerEl.innerText = \"00:00\";\n            alert(\"Time is up!\");\n            return;\n        }\n        timeLeft--;\n        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');\n        const s = (timeLeft % 60).toString().padStart(2, '0');\n        timerEl.innerText = `${m}:${s}`;\n    }, 1000);\n}\n\nfunction switchLesson(idx) {\n    currentLessonIndex = parseInt(idx);\n    const l = lessonsData[currentLessonIndex];\n    qs = l.qs; vocab = l.vocab; headings = l.headings; headingKey = l.headingKey;\n    mifRange = l.mifRange; removeOpt = l.removeOpt; removeFeatureOpt = l.removeFeatureOpt;\n    pairs = l.pairs; pData = l.pData;\n\n    // Reset UI\n    document.getElementById('articleArea').innerHTML = l.articleHtml;\n    document.getElementById('headingsArea').innerHTML = l.headingsHtml;\n    document.getElementById('qs').innerHTML = '';\n    document.getElementById('progressBar').innerHTML = '';\n    document.getElementById('saveBtn').style.display = 'none';\n    \n    // Reset Timer\n    clearInterval(timerInterval);\n    timeLeft = l.timeLimit * 60;\n    timerEl.innerText = \"--:--\";\n    startTimer();\n\n    // Render Questions & Attach Events\n    renderStudentQuestions();\n    attachEvents();\n\n    // Manage Views\n    if(document.getElementById('game-view').style.display === 'block') initGame();\n    if(document.getElementById('mif-view').style.display === 'flex') {\n        document.getElementById('mif-view').style.display = 'none';\n    }\n}\n\n// --- RENDERING QUESTIONS ---\nfunction renderStudentQuestions() {\n    const qDiv=document.getElementById('qs');\n    qDiv.innerHTML = '';\n    \n    qs.forEach(q=>{\n      if(q.type==='text-only'){ qDiv.innerHTML+=`<div class=\"text-only\">${q.text}</div>`; }\n      else if(q.type==='summary') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>');\n          q.gapIds.forEach(gid => {\n              const isFeat = q.isFeature ? 'true' : 'false';\n              const dz = `<span class=\"drop-zone\" id=\"dz-${gid}\" data-gid=\"${gid}\" data-isfeat=\"${isFeat}\" ondragover=\"allowDrop(event)\" ondrop=\"drop(event)\" onclick=\"clearDrop(${gid})\"></span><span class=\"q-num\" style=\"vertical-align:super;font-size:10px\">${gid}</span>&nbsp;`;\n              let replaced = txt.replace(new RegExp(`${gid}\\\\s*([._…-]{2,}|_{2,}|…+)`), dz);\n              if(replaced === txt) replaced = txt.replace(new RegExp(`${gid}[.]\\\\s+`), dz + ' ');\n              txt = replaced;\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2;font-size:15px\">${txt}</div><div style=\"margin-top:15px;display:flex;flex-wrap:wrap;gap:8px;padding-top:10px;border-top:1px dashed #e2e8f0\">`;\n          q.options.forEach(optLine => {\n              const m = optLine.match(/^([A-Z])\\s*[.)]?\\s*(.+)/);\n              if(m) h += `<div class=\"heading-item\" id=\"opt-${q.id}-${m[1]}\" style=\"display:inline-flex;width:auto;margin:0\" draggable=\"true\" ondragstart=\"drag(event)\" data-val=\"${m[1]}\"><span style=\"font-weight:bold;color:#2563eb\">${m[1]}</span> ${m[2]}</div>`;\n          });\n          h += `</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      } \n      else if(q.type==='gap-fill-block') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>'); \n          q.gapIds.forEach(gid => {\n              const loc = (q.locations && q.locations[gid]) ? q.locations[gid] : \"\";\n              const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${gid})\">📍</button>` : \"\";\n              const inp = `<span class=\"q-num\">${gid}</span><input type=\"text\" class=\"gap-input\" data-gid=\"${gid}\" oninput=\"upd(${gid})\">${locBtn}&nbsp;`;\t\n              txt = txt.replace(new RegExp(`${gid}[\\\\s:.)]*(?:[_….\\\\-]\\\\s*){2,}`), inp);\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2.2;font-size:16px\">${txt}</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      }\n      else if(q.type==='mcq-multi') {\n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          const locBtn1 = (q.locations && q.locations[q.gapIds[0]]) ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${q.gapIds[0]})\">📍</button>` : \"\";\n          h += `<div style=\"display:flex;align-items:baseline;margin-bottom:8px;\"><span class=\"q-num\">${q.gapIds[0]}-${q.gapIds[q.gapIds.length-1]}</span> <span>${q.text}</span> ${locBtn1}</div>`;\n          q.options.forEach((o, i) => {\n              const optLetterMatch = o.match(/^([A-Z])/i);\n              const optLetter = optLetterMatch ? optLetterMatch[1].toUpperCase() : o.trim()[0].toUpperCase();\n              h += `<label style=\"display:block;margin:5px 0;cursor:pointer;transition:all 0.2s;\">\n                      <input type=\"checkbox\" name=\"mcq_${q.id}\" value=\"${optLetter}\" onchange=\"updMcqMulti(${q.id}, '${q.gapIds.join(',')}', event)\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span>\n                    </label>`;\n          });\n          h += `<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n          q.gapIds.forEach(gid => {\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n      }\n      else { \n        let h=`<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n        const loc = q.location || \"\";\n        const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id})\">📍</button>` : \"\";\n        \n        if(q.type==='gap-fill'){\n           let t=q.text.replace(/(\\d+)[\\s:.)]*(?:[_….\\-]\\s*){2,}/g, '<span class=\"q-num\">$1</span><input type=\"text\" class=\"gap-input\" data-id=\"'+q.id+'\" oninput=\"upd('+q.id+')\">'+locBtn+'&nbsp;');\n           h+=`<div>${t}</div>`;\n        } else {\n           h+=`<div style=\"display:flex;align-items:baseline\"><span class=\"q-num\">${q.id}.</span> <span>${q.text}</span> ${locBtn}</div>`;\n           if(q.type==='mcq') q.options.forEach((o, i) => { h += `<label class=\"mcq-label\" style=\"display:block;margin:5px 0;cursor:pointer\"><input type=\"radio\" name=\"q${q.id}\" value=\"${o.trim()[0]}\" onchange=\"upd(${q.id})\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span></label>`; });\n           if(q.type==='tfng') {\n               h+='<div class=\"tfng-container\">';\n               ['TRUE', 'FALSE', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"tfng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='ynng') {\n               h+='<div class=\"tfng-container\">';\n               ['YES', 'NO', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"ynng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='mif') {\n               h+='<div class=\"mif-container\">';\n               mifRange.split('').forEach(char => {\n                   h+=`<label class=\"mif-label\"><input type=\"radio\" name=\"mif${q.id}\" value=\"${char}\" onchange=\"upd(${q.id})\"><span class=\"mif-circle\">${char}</span></label>`;\n               });\n               h+='</div>';\n           }\n        }\n        h+=`<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n        qDiv.innerHTML+=h;\n        const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+q.id; d.innerText=q.id;\n        d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n        document.getElementById('progressBar').appendChild(d);\n      }\n    });\n\n    document.querySelectorAll('input[type=\"radio\"][name^=\"mif\"]').forEach(radio => {\n        radio.addEventListener('change', (e) => {\n            const qId = radio.name.replace('mif', '');\n            const pChar = radio.value;\n            document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(btn => {\n                const btnPara = btn.closest('.mif-inline-box').dataset.para;\n                if(btnPara === pChar) {\n                    btn.classList.remove('hidden-by-other');\n                    btn.classList.add('selected');\n                } else {\n                    btn.classList.remove('selected');\n                    btn.classList.add('hidden-by-other');\n                }\n            });\n        });\n    });\n}\n\nfunction attachEvents() {\n    const pp = document.getElementById('popup');\n    document.querySelectorAll('.vocab').forEach(s => {\n      s.onclick = e => {\n        const v = vocab.find(x => x.id === s.dataset.vid); if(!v) return;\n        pp.innerHTML = `<div style=\"background:#1e293b;color:#fff;padding:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center\"><span>${v.word}</span><span onclick=\"speak('${v.word}')\" style=\"cursor:pointer;background:#334155;padding:4px;border-radius:50%\">🔊</span></div><div style=\"padding:16px;font-size:14px;color:#334155\"><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Meaning:</b> ${v.meaning}</p><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Synonyms:</b> ${v.synonym}</p><div style=\"background:#f1f5f9;padding:8px;border-radius:6px;margin-top:8px;color:#475569;font-style:italic\">\"${v.example}\"</div></div>`;\n        pp.style.display = 'block'; pp.style.top = (e.clientY+10) + 'px'; pp.style.left = Math.min(e.clientX, window.innerWidth-330) + 'px';\n        e.stopPropagation();\n      }\n    });\n\n    document.querySelectorAll('.sent').forEach(el => {\n        el.addEventListener('mouseenter', () => {\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\n            if(t) t.style.backgroundColor = '#fef08a'; \n        });\n        el.addEventListener('mouseleave', () => {\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\n            if(t) t.style.backgroundColor = 'transparent';\n        });\n    });\n}\n\nfunction allowDrop(ev) { ev.preventDefault(); }\nfunction drag(ev) { \n    const el = ev.target.closest('[draggable=\"true\"]') || ev.target;\n    const val = el.dataset.val || el.innerText.split('.')[0].trim();\n    ev.dataTransfer.setData(\"text\", val); \n    ev.dataTransfer.setData(\"srcId\", el.id); \n}\nfunction dragHeading(ev) { \n    const el = ev.target.closest('.heading-item');\n    ev.dataTransfer.setData(\"hid\", el.dataset.hid); \n    ev.dataTransfer.setData(\"srcId\", el.id); \n}\nfunction drop(ev) {\n    ev.preventDefault();\n    const zone = ev.target.closest('.drop-zone');\n    if(!zone) return;\n    \n    const type = zone.dataset.type;\n    if (type === 'heading') {\n        const hid = ev.dataTransfer.getData(\"hid\");\n        if(!hid) return; \n        zone.innerHTML = hid.toUpperCase(); \n        zone.dataset.val = hid; \n        zone.classList.add('filled');\n        \n        const srcId = ev.dataTransfer.getData(\"srcId\");\n        document.getElementById(srcId).classList.add('used');\n        if(zone.dataset.prevSrc && zone.dataset.prevSrc !== srcId) document.getElementById(zone.dataset.prevSrc).classList.remove('used');\n        zone.dataset.prevSrc = srcId;\n        return;\n    }\n    const val = ev.dataTransfer.getData(\"text\");\n    if(val) {\n        zone.innerText = val; \n        zone.classList.add('filled');\n        const gid = zone.dataset.gid;\n        document.getElementById('prog-'+gid).classList.add('filled');\n        \n        const isFeat = zone.dataset.isfeat === 'true';\n        const doRemove = isFeat ? removeFeatureOpt : removeOpt;\n        \n        if(doRemove) {\n            const srcId = ev.dataTransfer.getData(\"srcId\");\n            if(srcId) {\n                const srcEl = document.getElementById(srcId);\n                if(srcEl) srcEl.classList.add('used');\n                if(zone.dataset.prevSrc && zone.dataset.prevSrc !== srcId) {\n                    const prevEl = document.getElementById(zone.dataset.prevSrc);\n                    if(prevEl) prevEl.classList.remove('used');\n                }\n                zone.dataset.prevSrc = srcId;\n            }\n        }\n    }\n}\n\nfunction clearHeading(idx) {\n    const el = document.querySelector(`.heading-drop[data-para=\"${idx}\"]`);\n    if(el.dataset.prevSrc) document.getElementById(el.dataset.prevSrc).classList.remove('used');\n    el.innerHTML = '<span class=\"placeholder\">Drop Heading Here</span>'; el.classList.remove('filled'); delete el.dataset.val;\n}\nfunction clearDrop(gid) {\n    const el = document.getElementById('dz-'+gid);\n    const isFeat = el.dataset.isfeat === 'true';\n    const doRemove = isFeat ? removeFeatureOpt : removeOpt;\n    \n    if(doRemove && el.dataset.prevSrc) {\n        const prevEl = document.getElementById(el.dataset.prevSrc);\n        if(prevEl) prevEl.classList.remove('used');\n        delete el.dataset.prevSrc;\n    }\n    \n    el.innerText=''; el.classList.remove('filled'); document.getElementById('prog-'+gid).classList.remove('filled');\n}\n\nconst hlToolbar = document.getElementById('hl-toolbar');\nlet currentRange = null;\ndocument.addEventListener('mouseup', (e) => {\n    if(e.target.closest('#hl-toolbar')) return;\n    if(e.target.closest('#game-view')) return;\n    setTimeout(() => {\n        const sel = window.getSelection();\n        if(sel.toString().trim().length > 0) {\n            const range = sel.getRangeAt(0);\n            const parent = range.commonAncestorContainer.parentElement;\n            if(parent.closest('.en-text') || parent.closest('.q-block') || parent.closest('.text-only')) {\n                currentRange = range;\n                const rect = range.getBoundingClientRect();\n                hlToolbar.style.display = 'flex'; \n                hlToolbar.style.top = (rect.top + window.scrollY - 40) + 'px'; \n                hlToolbar.style.left = (rect.left + (rect.width/2)) + 'px';\n                return;\n            }\n        }\n        hlToolbar.style.display = 'none';\n    }, 10);\n});\n\nwindow.applyHighlight = (e) => {\n    e.preventDefault(); e.stopPropagation();\n    if(currentRange) {\n        const span = document.createElement('span'); span.className = 'user-highlight'; span.setAttribute('onclick', 'removeHighlight(this, event)');\n        try { currentRange.surroundContents(span); window.getSelection().removeAllRanges(); } catch(err) { alert('Selection quá phức tạp, vui lòng bôi đen gọn hơn.'); }\n        hlToolbar.style.display = 'none';\n    }\n};\n\nwindow.applyNote = (e) => {\n    e.preventDefault(); e.stopPropagation();\n    if(currentRange) {\n        const noteText = prompt('Nhập ghi chú của bạn:');\n        if(noteText) {\n            const span = document.createElement('span'); \n            span.className = 'user-highlight has-note'; \n            span.setAttribute('onclick', 'removeHighlight(this, event)');\n            span.title = noteText;\n            try { currentRange.surroundContents(span); window.getSelection().removeAllRanges(); } catch(err) { alert('Selection quá phức tạp, vui lòng bôi đen gọn hơn.'); }\n        }\n        hlToolbar.style.display = 'none';\n    }\n};\n\nwindow.removeHighlight = (el, e) => { \n    e.stopPropagation(); \n    if(el.classList.contains('has-note') && !confirm('Xóa ghi chú này?')) return;\n    const txt = document.createTextNode(el.innerText); \n    el.parentNode.replaceChild(txt, el); \n    hlToolbar.style.display = 'none'; \n};\n\nwindow.showLoc = (qId, subId) => {\n    document.querySelectorAll('.loc-highlight').forEach(el => el.classList.remove('loc-highlight'));\n    const q = qs.find(x => x.id === qId); if(!q) return;\n    let text = \"\";\n    if(subId && q.locations && q.locations[subId]) text = q.locations[subId]; else if(q.location) text = q.location;\n    if(!text) return alert(\"No location data found.\");\n    \n    const cleanText = text.trim().replace(/\\s+/g, ' ').toLowerCase();\n    const sents = document.querySelectorAll('.sent'); let found = false;\n    sents.forEach(s => {\n        const sText = s.innerText.trim().replace(/\\s+/g, ' ').toLowerCase();\n        if(sText.includes(cleanText) || (cleanText.length > 20 && cleanText.includes(sText))) {\n            s.classList.add('loc-highlight');\n            if(!found) { s.scrollIntoView({behavior: 'smooth', block: 'center'}); found = true; }\n        }\n    });\n    if(!found) alert(\"Could not find exact text match in passage.\");\n};\n\nwindow.upd = (id) => document.getElementById('prog-'+id).classList.add('filled');\nwindow.updMcqMulti = (qId, gapIdsStr, ev) => {\n    const gapIds = gapIdsStr.split(',');\n    const checkboxes = document.querySelectorAll(`input[name=\"mcq_${qId}\"]`);\n    const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;\n    const maxAllowed = gapIds.length;\n    if (checkedCount > maxAllowed) { ev.target.checked = false; alert(\"Bạn chỉ được chọn tối đa \" + maxAllowed + \" đáp án!\"); return; }\n    gapIds.forEach((gid, index) => {\n        const p = document.getElementById('prog-'+gid);\n        if(p) { if(index < checkedCount) p.classList.add('filled'); else p.classList.remove('filled'); }\n    });\n};\n\nwindow.check = () => {\n    document.querySelectorAll('.ans-key').forEach(e=>e.remove());\n    document.querySelectorAll('.input-correct, .input-wrong, .correct-zone, .wrong-zone, .correct-opt, .wrong-opt').forEach(e=>e.classList.remove('input-correct','input-wrong','correct-zone','wrong-zone','correct-opt','wrong-opt'));\n\tdocument.querySelectorAll('.prog-correct, .prog-wrong').forEach(e=>e.classList.remove('prog-correct','prog-wrong'));\n    document.querySelectorAll('.mcq-mark').forEach(e=>e.innerText='');\n\n    let score = 0, total = 0; let allAnswered = true;\n    \n    if(headings.length > 0) {\n        document.querySelectorAll('.heading-drop').forEach(z => {\n            const pIdx = z.dataset.para, userVal = (z.dataset.val || \"\").toUpperCase(), correctVal = (headingKey[pIdx] || \"\").toUpperCase();\n            if(correctVal) { \n                total++; const fb = document.getElementById('fb-h-'+pIdx);\n                if(userVal === correctVal) { fb.innerHTML = '<span class=\"correct\">✓</span>'; score++; } \n                else { fb.innerHTML = `<span class=\"wrong\">✗</span> <span class=\"correct\">${correctVal}</span>`; }\n            }\n        });\n    }\n\n    qs.forEach(q => {\n        if(q.type === 'summary' || q.type === 'gap-fill-block') {\n            total += q.gapIds.length;\n            q.gapIds.forEach(gid => {\n                let userVal = \"\"; let el = null; const keyVal = (q.answers[gid] || \"\").trim();\n                if(q.type==='summary') { \n                    el=document.getElementById('dz-'+gid); userVal = el?el.innerText.trim():\"\"; \n                    if(el) {\n                        if(userVal.toLowerCase() === keyVal.toLowerCase()) { el.classList.add('correct-zone'); score++; document.getElementById('prog-'+gid).classList.add('prog-correct'); }\n                        else { el.classList.add('wrong-zone'); el.insertAdjacentHTML('afterend', `<span class=\"ans-key\">${keyVal}</span>`); document.getElementById('prog-'+gid).classList.add('prog-wrong'); }\n                    }\n                }\n                if(q.type==='gap-fill-block') { \n                    el=document.querySelector(`input[data-gid=\"${gid}\"]`); userVal = el?el.value.trim():\"\"; \n                    if(el) {\n                         if(userVal.toLowerCase() === keyVal.toLowerCase()) { el.classList.add('input-correct'); score++; document.getElementById('prog-'+gid).classList.add('prog-correct'); }\n                        else { el.classList.add('input-wrong'); el.insertAdjacentHTML('afterend', `<span class=\"ans-key\">${keyVal}</span>`); document.getElementById('prog-'+gid).classList.add('prog-wrong'); }\n                    }\n                }\n            });\n        } \n        else if (q.type === 'mcq-multi') {\n            const count = q.gapIds.length;\n            total += count;\n            const checkboxes = document.querySelectorAll(`input[name=\"mcq_${q.id}\"]:checked`);\n            let userVals = Array.from(checkboxes).map(cb => cb.value.toUpperCase());\n            let correctVals = q.gapIds.map(gid => (q.answers[gid] || \"\").toUpperCase().trim());\n            let origCorrectVals = [...correctVals].filter(v=>v);\n\n            let localScore = 0;\n            userVals.forEach(uv => { const idx = correctVals.indexOf(uv); if (idx > -1) { localScore++; correctVals[idx] = null; } });\n            score += localScore;\n\n            const allCheckboxes = document.querySelectorAll(`input[name=\"mcq_${q.id}\"]`);\n            allCheckboxes.forEach((cb, i) => {\n                const val = cb.value.toUpperCase(); \n                const markSpan = document.getElementById(`mcq-mark-${q.id}-${i}`); \n                const label = cb.closest('label');\n                label.style.border = 'none'; label.style.padding = '0'; label.style.backgroundColor = 'transparent'; \n                if(markSpan) markSpan.innerHTML = '';\n                \n                const isCorrectOption = origCorrectVals.includes(val);\n\n                if (cb.checked) {\n                    if (isCorrectOption) { \n                        if(markSpan) markSpan.innerHTML = '<span style=\"color:#16a34a; font-weight:bold;\">✓</span>'; \n                        label.style.border = '2px dashed #16a34a'; label.style.padding = '4px 8px'; label.style.borderRadius = '6px'; label.style.backgroundColor = '#f0fdf4'; \n                    } else { \n                        if(markSpan) markSpan.innerHTML = '<span style=\"color:#dc2626; font-weight:bold;\">✗</span>'; \n                        label.style.border = '2px dashed #dc2626'; label.style.padding = '4px 8px'; label.style.borderRadius = '6px'; label.style.backgroundColor = '#fef2f2'; \n                    }\n                } else if (isCorrectOption) {\n                    if(markSpan) markSpan.innerHTML = '<span style=\"color:#16a34a; font-weight:bold; font-size:11px; margin-left:4px;\">(Key)</span>'; \n                    label.style.border = '2px dashed #16a34a'; label.style.padding = '4px 8px'; label.style.borderRadius = '6px'; label.style.backgroundColor = '#f0fdf4';\n                }\n            });\n\n            let
